<script>
"use strict";

/* ============================================================
   ORBITAL OVERHAUL — v3.3
   A vector-style arcade shooter in the spirit of Asteroids Deluxe
   - Energy shield (hold SHIFT) that deflects debris
   - Killer satellite that splits into homing wedge ships
   - Large & small saucers
   v1.1: Radioactive salvage — destroyed debris drops garbage canisters;
   fly over them to hook them into a physics-simulated tow chain, then
   haul the chain into the recycling dock for escalating bonus points.
   Cargo has mass: it cuts thrust/top speed and tugs the ship around.
   v1.2: Larger 3840x2160 wrapping world with a scrolling camera that keeps
   the ship centered; the 1280x720 canvas is now a viewport onto that world.
   v1.3: Discrete lives replaced by a single HP pool (SHIP_MAX_HP). Unshielded
   hits deal source-specific damage, shove the ship away (knockback), and grant
   ~1s of hit-stun i-frames; 0 HP is a permanent game over (no respawn). Score
   milestones now repair the hull instead of granting extra lives.
   v1.4: Asteroids redesigned as Debris Satellites — a broken-satellite silhouette
   with 3-way splits at large/medium (small tier is destroyed). Every tier's
   destruction emits exactly 3 garbage canisters (replacing the old probabilistic
   single drop), so the field carries far more salvage — garbage decay (since
   removed in v3.2 P3) and the wave spawn count were trimmed to compensate at the
   time. Garbage and chain nodes gained a
   `mass` field; chain thrust/top-speed/tug now scale with the chain's total mass
   (sum of node.mass), not its node count.
   v1.5: Global difficulty ramp — difficultyFactor(wave) climbs from ~0 at wave 1
   toward 1 over many waves (RAMP_WAVES is the single knob), and threat parameters
   interpolate floor->ceiling through it via ramp(). Applied to the saucers so early
   waves are calmer: longer gaps between saucers, slower fire, wider small-saucer aim,
   and a rarer (wave-driven, not score-gated) small saucer — all easing to the shipped
   intensity at full difficulty. Hunter/Satellite scaling is deferred to its Phase-5
   redesign.
   v1.6: Killer satellite + homing wedges redesigned into the Hunter Satellite — one diamond
   family with three tiers (3 large / 2 medium / 1 small). The large core drifts passively
   toward the ship (spawn-time aim, no re-aim); shooting it splits it 3-ways into medium then
   small children that actively home, each faster/more agile than the last. Every tier emits
   garbage; the small tier drops a larger burst of LOW-mass (0.5) scrap that tows easily and
   renders in a paler tint. All Hunter speeds/turn rates wire into the v1.5 difficulty ramp
   from the start (gentle wave-1 floor at HUNTER_FLOOR_FRAC of the ceiling, ramping up over
   ~20 waves). Hunter contact damage is 60/45/30 by tier; homers still die on shield contact
   (and split), the core bounces; Hunters still sever the tow chain.
   v1.7: Powerups — five free-floating pickups (each a distinct vector-glow icon). Health spawns
   ambiently on a saucer-like timer and instantly repairs +25 HP (capped); Rapid Fire, Triple Shot,
   Magnet and Engine drop from small-tier Debris/Hunter kills at POWERUP_DROP_CHANCE and last
   POWERUP_DURATION seconds. Rapid Fire doubles the bullet cap (4->8); Triple Shot fires a 3-bullet
   spread and triples the cap (4->12) — both active uses the higher cap (12), not 24. Magnet pulls
   free garbage toward the ship inside an extended radius (and widens the pickup radius); Engine
   halves the effective towed-mass sum (chainMass) so thrust/top-speed/tug all lighten. Same-type
   pickups refresh the duration (no magnitude stacking); different types stack. A HUD row shows each
   active timed effect with a shield-bar-style remaining-duration bar.
   v1.8: Gamepad support — the input layer now checks either keyboard OR the first connected gamepad
   through a data-driven `bindings` table (one entry per action, listing keyboard keys + gamepad
   buttons/axis), polled once per frame via navigator.getGamepads(). Defaults: D-Pad / Left Stick for
   rotate + thrust (25% deadzone), A to fire, right trigger/bumper for shield (a gap-fill — no shield
   binding was spec'd). Fixed menu/system reads wired now for later phases: A = confirm, B = back
   (reserved for F8's menus), Start = start/pause/unpause (Start toggles pause like P today). Call
   sites are unchanged (still input.left() etc.). Rebinding UI is Phase 8; these are hardcoded defaults.
   v1.9: Pause menu / options / control rebinding — the first nested menu state machine (pause -> root
   -> options -> controls), navigable by keyboard OR gamepad. AudioSys refactored to a gain-routing
   graph (voice -> sfx -> master) so the SFX/Music/Master sliders attenuate real output (Music has no
   source connected — there is no music track). Live rebinding of the five gameplay actions for both
   keyboard and gamepad, Return to Defaults, and localStorage persistence of volumes + custom bindings
   (guarded so a storage failure never crashes).
   v2.0: Achievements — 15 weekly (a calendar-deterministic 5-wide slice active each ISO week) + 12
   lifetime (cumulative across games). The Achievements module OBSERVES stats the game already
   produces (kills by type/tier, dock deliveries, HP thresholds, powerup usage, wave reached,
   damage-free waves, play time) via light hooks at each event site; unlocks pop a non-blocking toast
   and are browsable in a viewer (Pause -> Options -> Achievements). Weekly rotation index =
   (isoYear*52 + isoWeek) % 15; progress + unlock state persist to their own localStorage key. This
   completes the v2.0 feature set (Phases 1-9).
   ============================================================ */

// ---------- Constants ----------
// The world is a large wrapping torus; the viewport is a camera window onto it.
const WORLD_W = 2560, WORLD_H = 1440;   // simulation space (the wrap boundary)
const VIEW_W = 1280, VIEW_H = 720;      // visible viewport = canvas size
const TAU = Math.PI * 2;

const SHIP_TURN = 4.2;          // rad/sec
const SHIP_THRUST = 340;        // px/sec^2
const SHIP_DRAG = 0.35;         // fraction of velocity lost per second
const SHIP_MAX_SPEED = 520;
const SHIP_RADIUS = 13;

const BULLET_SPEED = 620;
const BULLET_LIFE = 1.05;       // seconds
const MAX_BULLETS = 4;
const FIRE_COOLDOWN = 0.20;         // base gun cadence
const RAPID_FIRE_COOLDOWN = 0.09;   // Rapid Fire cadence — genuinely faster, not just a bigger cap (B-6)

const SHIELD_DRAIN = 0.55;      // energy/sec while on
const SHIELD_RECHARGE = 0.12;   // energy/sec while off
const SHIELD_HIT_COST = 0.22;   // energy per deflection
const SHIELD_RADIUS = 26;

const DEBRIS_SPEEDS = { 3: 70, 2: 110, 1: 160 };  // base drift speed by size
const DEBRIS_RADII  = { 3: 46, 2: 26, 1: 13 };
const DEBRIS_SCORE  = { 3: 20, 2: 50, 1: 100 };
const DEBRIS_GARBAGE = 4;       // canisters emitted at EVERY tier's destruction (F3). PLAYTEST KNOB:
                                 // 3->4 in v3.4 P1, compensating field supply for the Hunter-side garbage cut (FORK-1(b)).

const SAUCER_SCORE = { big: 200, small: 1000 };

// Hunter Satellites (F4) — the reshaped killer-satellite/wedge system: a diamond core that
// drifts passively toward the ship, then splits 3-ways into actively-homing children,
// emitting garbage at every tier. All speeds/turn rates are CEILINGS the difficulty ramp
// (§2.13) climbs toward; at wave 1 the whole family moves at HUNTER_FLOOR_FRAC of them, so
// early waves are gentle and full pressure arrives ~wave 20.
const HUNTER_RADII      = { 3: 24, 2: 15, 1: 10 };    // collision radius by tier
const HUNTER_SCORE      = { 3: 200, 2: 150, 1: 250 }; // large core / medium / small (small worth most — hardest to hit)
const HUNTER_DAMAGE     = { 3: 60, 2: 45, 1: 30 };    // contact damage — harder than the equivalent Debris tier (F2/F4)
const HUNTER_SPEED_CEIL = { 3: 70, 2: 120, 1: 175 };  // full-difficulty px/s: large drifts, medium/small home (anchored on the old wedge 120/175)
const HUNTER_TURN_CEIL  = { 3: 0, 2: 1.6, 1: 2.6 };   // full-difficulty homing turn rate (rad/s); large never turns (passive drift)
const HUNTER_FLOOR_FRAC = 0.58;   // wave-1 speeds & turn rates = this × ceiling (THE knob for early-game Hunter calm)
const HUNTER_SCATTER    = 0.6;    // sec a freshly-split homer scatters outward before homing engages
// PLAYTEST KNOB (v3.4 P1): canisters per Hunter KILL, by tier — was a flat HUNTER_GARBAGE=3 for
// both large/medium plus a separate HUNTER_SMALL_GARBAGE=6 for the small tier; now one per-tier
// table shaped like HUNTER_RADII/HUNTER_SCORE/HUNTER_DAMAGE.
const HUNTER_GARBAGE       = { 3: 3, 2: 2, 1: 1 };
const HUNTER_SMALL_MASS    = 0.5; // small-tier canister(s) stay LOW-mass scrap (tows easier — a valuable bonus for finishing a Hunter line)

// Health, damage & knockback (F2) — a single HP pool replaces discrete lives
const SHIP_MAX_HP = 250;        // full hull integrity at game start; no respawns
const DMG_SMALL = 20;           // contact damage from a small hazard
const DMG_MEDIUM = 35;          // contact damage from a medium hazard
const DMG_LARGE = 50;           // contact damage from a large hazard
const DMG_BULLET = 15;          // damage from a hostile (saucer) bullet
const DEBRIS_DAMAGE = { 3: DMG_LARGE, 2: DMG_MEDIUM, 1: DMG_SMALL };
const KNOCKBACK_SPEED = 250;    // px/sec shove directly away from a hazard on an unshielded hit
const HIT_STUN_DURATION = 1.0;  // sec of hit-stun invulnerability granted after any non-lethal hit
const LOW_HP_THRESHOLD = 100;   // PLAYTEST KNOB. HP at or below which the low-health warning
                                // engages. 100 = 5 small hits / ~3 medium / 2 large — "five
                                // bad seconds from dead." 40% of SHIP_MAX_HP. (FORK-8, confirmed; v3.4 P5)
// v3.5 P3 PLAYTEST KNOBS — the low-health voice (AudioSys.lowhp/lowhpSet). Urgency t = 1 -
// hp/LOW_HP_THRESHOLD (0 at the threshold, ~1 near death) scales pulse rate and gain between
// these min/max pairs; the harmonic partner tracks the root at a fixed fraction.
const LOWHP_ROOT_FREQ        = 220;   // Hz — unchanged root pitch of the old constant-tone voice
const LOWHP_HARMONIC_RATIO   = 1.5;   // a fifth above the root (2.0 would be an octave)
const LOWHP_HARMONIC_GAIN_FRAC = 0.35; // harmonic partner's level as a fraction of the root's
const LOWHP_PULSE_RATE_MIN   = 0.9;   // Hz — gentle "hey" pulse at the threshold (t=0)
const LOWHP_PULSE_RATE_MAX   = 2.4;   // Hz — real alarm pulse near death (t=1)
const LOWHP_PULSE_DEPTH      = 0.5;   // amplitude-LFO depth/offset — pulseGain swings ~0..1
const LOWHP_GAIN_MIN         = 0.08;  // peak root gain at t=0 — in thrust's (0.10) neighborhood
const LOWHP_GAIN_MAX         = 0.13;  // peak root gain at t=1 — pulsing carries most of the urgency
const LOWHP_PARAM_RAMP       = 0.15;  // s — click-free per-frame param ramp (matches MUSIC_DUCK_RAMP)
const REPAIR_MILESTONE = 10000; // score interval that grants a hull-repair bonus (was: extra life)
const REPAIR_AMOUNT = 25;       // +HP granted at each milestone (capped at max)
const REPAIR_FULL_BONUS = 2500; // flat score awarded instead when already at full HP

// Radioactive salvage / tow chain / recycling dock
// v3.3 P4 (9a): loose SINGLE canisters decay again (GARBAGE_DECAY) — decay is the GOVERNOR that keeps
// the field readable now that Hunters always drop garbage (9b) reopens the 12-in/66-out amplifier.
// This REVERSES the v3.2 P3 "garbage is permanent" rule (Paul signed off). Exits for a single are now
// three: RECYCLED (towed to the dock), CONSUMED INTO A HUNTER (coalescence), or AGED OUT (decay).
// A CLUMP (pieces > 1) still never decays — it is a target AND, as of 9c, a scoopable pickup, so
// aging it out would steal the player's loot and their Hunter-prevention window (FORK-4: singles only).
// Chain nodes never decay (they're game.chain, not game.garbage). Severed garbage (Garbage.fromNode)
// inherits this same one GARBAGE_DECAY — the old separate GARBAGE_SEVER_DECAY stays deleted. See §2.10.1.
const GARBAGE_PICKUP = 18;      // pickup radius from ship center
const GARBAGE_DECAY = 22;       // PLAYTEST KNOB (v3.3 P4, reintroduced). sec a loose SINGLE lives before it
                                // ages out; must exceed GARBAGE_COALESCE_DELAY by a wide margin or nothing
                                // ever clumps. The last ~GARBAGE_FADE sec it blinks as an expiry tell.
const GARBAGE_FADE = 2.0;       // sec of blink-out before a decaying single dies (look-call)

// Garbage coalescence (v3.1 P3): uncollected canisters mutually attract and, on contact, fuse into a
// growing clump; at HUNTER_COALESCE_COUNT pieces the clump collapses into a fresh large Hunter core
// (neglect breeds danger). A piece stays inert for GARBAGE_COALESCE_DELAY sec after emission so a
// fresh burst rides its explosion kick APART first — both the attraction AND the merge are gated on
// it. This is a separate, weaker, always-on force from the Magnet powerup (that pulls garbage→ship);
// Magnet is the natural anti-coalescence tool (vacuum pieces before they clump). All math wrap-aware.
const GARBAGE_COALESCE_DELAY = 3.0;    // PLAYTEST KNOB (v3.3 P4: 6.0→3.0). sec a fresh piece stays inert
                                       // before it attracts/merges. 6.0 was tuned FOR permanent garbage;
                                       // with a ~22 s single life (9a), a third of that spent inert means
                                       // pieces age out before they can ever clump — so it drops back to
                                       // ~3 s. Still gates BOTH attraction and merge; the shatter path
                                       // reuses this same constant — one knob, not two.
const GARBAGE_MAGNET_RANGE = 180;      // PLAYTEST KNOB — TUNE THIS FIRST BY FEEL (v3.3 P4: 260→180).
                                       // px: garbage↔garbage mutual-attraction range. 260 was raised only
                                       // because garbage was permanent and had to find far-flung strangers;
                                       // with singles decaying again (9a) a tighter range clumps a fresh
                                       // burst without dragging the whole field into one super-clump.
                                       // Most likely number to be wrong.
const GARBAGE_MAGNET_PULL = 40;        // px/s² each active piece accelerates toward a nearby active piece
const GARBAGE_MERGE_DIST = 12;         // px: two active pieces this close fuse into one clump
const HUNTER_COALESCE_COUNT = 12;      // pieces fused into one clump -> a new large Hunter core forms
const GARBAGE_CLUMP_MAXSPD = Infinity; // off-by-default playtest clamp on a piece's coalescence speed
const GARBAGE_SHATTER_KICK = [40, 90]; // v3.2 P2: px/s outward kick range for shatterClump's emitted pieces (playtest knob)

const CHAIN_LINK = 20;          // px between chain nodes
const CHAIN_ITER = 4;           // verlet constraint relaxation passes/frame (B-8: 3→4 to keep a 20-node chain from sagging; §3.4 rule 7)
// Tow capacity (B-8): the cap is a runtime value (game.cargoMax) that GROWS during a run from
// CARGO_BASE toward CARGO_CAP_MAX — capacity is earned by engaging the salvage loop (Pillar 5),
// not handed out. The old fixed `CHAIN_MAX` (12) is now CARGO_BASE.
const CARGO_BASE = 12;          // starting tow cap (was CHAIN_MAX)
const CARGO_CAP_MAX = 24;       // ceiling (v3.4 P1: 20->24); the physics retune below targets "full chain here" ≈ old 12-node feel
const CARGO_GROW_PER = 30;      // +1 cap per this many canisters recycled (delivered) in the current run
const CHAIN_TUG = 26;           // ship pull-back accel per px of chain stretch
// Mass-penalty coefficients (B-8 retune). With a 20-node ceiling, the per-node penalty is SOFTENED
// so a full chain at CARGO_CAP_MAX lands near the old 12-node feel (~45% thrust / ~63% top speed)
// instead of the "broken" ~33%/50% a naive m=20 gave under the old 0.10/0.05 (§2.10.1). Solved so
// 1/(1+20·k)=old-12 value: thrust k=0.06 (1/2.2), top-speed k=0.03 (1/1.6). Tug coeff dropped
// 0.12→0.07 so its 1.4 cap is reached at m≈20 (was m≈12) — the tug scales down in lock-step, so a
// base 12-chain is genuinely lighter across ALL three penalties, with headroom to grow into.
const CARGO_MASS = 0.07;        // tug mass-factor grows by this per unit of towed mass (F5: mass sum, not count)
const CARGO_THRUST = 0.06;      // thrust divisor grows by this per unit of towed mass
const CARGO_MAXSPD = 0.03;      // max-speed divisor grows by this per unit of towed mass

const DOCK_RADIUS = 44;
// v3.4 P2: difficulty lever — scales DOCK_RADIUS from 2x at wave 1 down to the shipped 1x
// baseline as difficulty ramps. Ships DISABLED (pinned at start=2.0). See DIFFICULTY-LEVERS.md.
const LEVER_DOCK_SIZE = { enabled: false, start: 2.0, floor: 1.0 };
const DOCK_BASE_SCORE = 50;     // 1st canister of a visit
const DOCK_BONUS_STEP = 25;     // each additional canister: +25 over the last
const DOCK_OFFLOAD_INTERVAL = 0.05; // PLAYTEST KNOB (v3.4 P1; was a bare literal 0.13). sec between
                                     // canisters peeling off at the dock.

// Larger world & scrolling camera (v1.2)
const CULL_MARGIN = 100;        // px beyond the viewport edge still worth drawing
const SPAWN_MIN_DIST = 220;     // new debris satellites: nearest allowed to the ship
const SPAWN_MAX_DIST = 640;     // new debris satellites: farthest from the ship (stay reachable; clamped to min(WORLD_W,WORLD_H)/2-60 = 660 for the 2560x1440 world)
const DOCK_MIN_DIST = 260;      // recycling dock: nearest allowed to the ship
const DOCK_MAX_DIST = 620;      // recycling dock: farthest from the ship (stay reachable; kept below SPAWN_MAX_DIST)
const STAR_DENSITY = 80;        // background stars per viewport-sized area of world
const STAR_PARALLAX_FACTOR = 0.5; // near layer's camera-offset fraction (screen-space tiled, not world-fixed)
const STAR_BRIGHT_MIN = 0.35;   // per-star alpha range, far (world-fixed) layer
const STAR_BRIGHT_MAX = 1.0;
const STAR_NEAR_DENSITY = 22;   // near parallax layer: sparse, per viewport-sized screen area
const STAR_NEAR_BRIGHT_MIN = 0.55; // near layer reads brighter (closer) than the far layer
const STAR_NEAR_BRIGHT_MAX = 1.0;

// World-boundary visibility line (v2.1) — a dim dashed rectangle at the wrap seam so the
// player can see the wrap-around coming. Purely cosmetic (no collision); drawn in world
// space beneath entities, at the seam's nearest wrapped image relative to the camera.
const BOUNDARY_DASH  = 16;      // dash segment length (world units)
const BOUNDARY_GAP   = 24;      // gap between dashes (world units)
const BOUNDARY_WIDTH = 2;       // stroke width
const BOUNDARY_GLOW  = 5;       // shadowBlur — kept low so it reads as a boundary, not a hazard

// Difficulty ramp & early-game pacing (F10) — one shared curve scales every wave-driven
// threat parameter from an easy wave-1 floor up to a full-intensity ceiling (see §2.6/§2.13).
const RAMP_WAVES = 8;           // THE knob: larger = slower ramp. Feeds difficultyFactor(wave);
                                // ~0 at wave 1, ~0.9 by wave 20, plateauing near 1 by ~wave 25.
// Saucer spawn gap (sec between saucers): wide early, tightening with difficulty.
// Re-expresses the old `rand(12,22) - min(6,wave)` as an interpolated rand(min,max) range.
const SAUCER_GAP_FLOOR_MIN = 20;  // wave-1 shortest gap between saucers
const SAUCER_GAP_FLOOR_MAX = 30;  // wave-1 longest gap
const SAUCER_GAP_CEIL_MIN  = 12;  // full-difficulty shortest gap (≈ shipped v1.1 cadence)
const SAUCER_GAP_CEIL_MAX  = 16;  // full-difficulty longest gap
// Saucer between-shot intervals: base [min,max] ranges, multiplied by the fire multiplier.
const SAUCER_FIRE_INIT  = [0.6, 1.4]; // delay before a saucer's first shot after entering
const SAUCER_FIRE_BIG   = [0.9, 1.6]; // big saucer reload (fires randomly)
const SAUCER_FIRE_SMALL = [0.7, 1.1]; // small saucer reload (fires aimed)
const SAUCER_FIRE_MULT_FLOOR = 1.8;   // wave-1: fire ~1.8× slower (longer between shots)
const SAUCER_FIRE_MULT_CEIL  = 1.0;   // full difficulty: shipped cadence
// Small-saucer aim error (rad): wide barely-aimed spray early, tightening to precise late.
const SAUCER_AIM_ERR_FLOOR = 0.35;    // wave-1 aim error
const SAUCER_AIM_ERR_CEIL  = 0.09;    // full-difficulty aim error (shipped precision)
// Small-saucer appearance chance: rare early, common late. Folds in the old >8000-pt gate
// so there's one wave-driven escalation system instead of two (F10 cleanup).
const SAUCER_SMALL_CHANCE_FLOOR = 0.15; // wave-1: mostly the harmless random-fire big saucer
const SAUCER_SMALL_CHANCE_CEIL  = 0.60; // full difficulty: the dangerous aimed 1000-pt saucer common

// Powerups (F6) — five free-floating pickups. Health spawns ambiently on a saucer-like timer
// and is instant; the other four (rapid/triple/magnet/engine) are timed effects that drop from
// small-tier Debris/Hunter kills. Same-type pickups refresh the timer (no magnitude stacking);
// different types run independently. Icons/labels/colors live with COLOR (below the helpers).
const POWERUP_DURATION = 15;        // sec a timed effect (rapid/triple/magnet/engine) stays active — SHARED
const MAGNET_DURATION = POWERUP_DURATION * 2;   // 30 s — Magnet is the one long effect (v3.4 P4). Do NOT
                                    // fold this back into POWERUP_DURATION, which is shared by the other three.
const POWERUP_RADIUS = 15;          // pickup icon radius = its collision radius from ship center
// v3.4 P2: difficulty lever — scales POWERUP_RADIUS from 2x at wave 1 down to the shipped 1x
// baseline as difficulty ramps. Ships DISABLED (pinned at start=2.0). See DIFFICULTY-LEVERS.md.
const LEVER_POWERUP_SIZE = { enabled: false, start: 2.0, floor: 1.0 };
const POWERUP_DECAY = 26;           // sec an uncollected powerup lingers before fading (v3.3 P3: 14->26, playtest knob — shot powerups should linger longer)
const POWERUP_DROP_CHANCE = 0.16;   // chance a small-tier kill drops a powerup (v3.3 P3: 0.10->0.16, playtest knob — drop more often)
const POWERUP_DROP_TYPES = ["rapid", "triple", "magnet", "engine"]; // TIMED effects the HUD/powerActive/powerBudget machinery understands — Health & Scoop are NOT here (see POWERUP_DROP_WEIGHTS)
// v3.3 P3: what can actually DROP (weighted), a SEPARATE structure from POWERUP_DROP_TYPES above.
// Favors the shot powerups; Scoop is droppable but is a persistent, non-timed upgrade, so it is
// deliberately absent from POWERUP_DROP_TYPES (the timed-effect list). Weights are the playtest knob.
const POWERUP_DROP_WEIGHTS = { rapid: 3, triple: 3, scoop: 2, magnet: 1, engine: 1 };
const POWERUP_HEALTH_GAP = [18, 26]; // sec between ambient Health spawns (saucer-like cadence)
const POWERUP_HEALTH_AMOUNT = 25;    // +HP on Health pickup, capped at max (matches the F2 milestone repair)
const POWERUP_HEALTH_MIN_DIST = 220; // ambient Health spawns in a ring this..MAX from the ship (reachable, visible)
const POWERUP_HEALTH_MAX_DIST = 520;
// Weapon caps. Triple's cap (12) is also the combined Rapid+Triple cap — the higher of the two,
// not the product (24), to keep bullet clutter from fighting Pillar 1 (vector clarity).
const RAPID_MAX_BULLETS  = 8;       // Rapid Fire bullet cap (2x base MAX_BULLETS)
const TRIPLE_MAX_BULLETS = 12;      // Triple Shot bullet cap (3x base) — also the higher-of combined cap
const TRIPLE_SPREAD = 0.14;         // rad between the 3 Triple Shot bullets (a narrow fan)
// Magnet: attraction force (reads better than a bigger invisible circle) + a modest pickup-radius bump.
const MAGNET_RANGE = 380;   // PLAYTEST KNOB. px from ship center. Deliberately > VIEW_H/2 (360) so a piece
                            // at the very top of the viewport still feels a pull. Replaces MAGNET_RANGE_MULT's
                            // 54 px — a ~7x buff (v3.4 P4).
const MAGNET_PICKUP_MULT = 1.6;     // effective pickup radius grows this much while the magnet is active
const MAGNET_PULL     = 520;   // PLAYTEST KNOB. px/s^2 at zero distance (was a flat 360)
const MAGNET_PULL_MIN = 60;    // PLAYTEST KNOB. px/s^2 floor at MAGNET_RANGE — a subtle pull so the top of the screen still visibly moves
const MAGNET_DAMP = 0.06;           // per-sec velocity damping inside range so the pull glides, not jitters
// Engine: lightens the effective towed mass so thrust/top-speed/tug (all fed by chainMass) ease.
const ENGINE_MASS_MULT = 0.5;       // Engine halves the effective towed-mass sum while active
// Count-based expiry budgets (v3.0 P5, B-4/B-5). Used only when the matching Difficulty mode is the
// count variant ("shots"/"pieces"); the timed default (POWERUP_DURATION) ignores these entirely.
const RAPID_SHOTS   = 40;           // trigger-pulls Rapid Fire lasts in "shots" mode (one pull = one shot)
const TRIPLE_SHOTS  = 30;           // trigger-pulls Triple Shot lasts in "shots" mode (a 3-fan is ONE pull)
const MAGNET_PIECES = 40;           // canisters hooked the Magnet lasts in "pieces" mode (v3.4 P4: 20->40, counted at the hook)
const POWERUP_BUDGET = { rapid: RAPID_SHOTS, triple: TRIPLE_SHOTS, magnet: MAGNET_PIECES }; // full budget by type
// Scoop (v3.3 P3) — a PERSISTENT, non-timed ship upgrade, the first of its kind here. It lives on
// game.scoopLevel (0..SCOOP_MAX_LEVEL), NOT in powerFx/powerBudget, and it only ever decays by TAKING
// HITS (never on a clock). Each level widens/deepens an oriented capture BOX (the "mouth") on the
// ship's facing axis that scoops garbage in ADDITION to the base GARBAGE_PICKUP circle (they're OR'd,
// so scoopLevel 0 is byte-identical to the pre-scoop build).
const SCOOP_MAX_LEVEL = 5;
const SHIP_DRAW_W = 18;    // the drawn hull's width (see Ship's draw poly) - the unit the scoop is spec'd in
// v3.4 P3: SCOOP_WIDTH/SCOOP_DEPTH are GENERATED from this config instead of hand-picked, so the mouth's
// size curve can be tuned with tools/scoop-lab.html instead of eyeballing raw px arrays. Edit these five
// numbers (from the lab), not the arrays below.
const SCOOP_CONFIG = {
  maxWidthMult: 3.0,   // L5 mouth width as a multiple of SHIP_DRAW_W  (SET FROM THE LAB)
  minWidthMult: 1.2,   // L1 mouth width, same units
  curve:        1.0,   // step distribution: 1.0 = linear; >1 = weighted toward the LARGE end
  minDepth:     20,    // px forward of ship center at L1
  maxDepth:     36,    // px forward of ship center at L5
};
// Build a SCOOP_MAX_LEVEL+1-length step table: index 0 is ALWAYS 0 (byte-identical to the pre-scoop
// build at scoopLevel 0 — see inScoopBox); indices 1..SCOOP_MAX_LEVEL interpolate min->max via `curve`
// (1.0 linear, >1 weights growth toward the top levels).
function buildScoopSteps(min, max, curve) {
  const steps = [0];
  for (let k = 1; k <= SCOOP_MAX_LEVEL; k++) {
    steps.push(min + (max - min) * Math.pow((k - 1) / (SCOOP_MAX_LEVEL - 1), curve));
  }
  return steps;
}
const SCOOP_WIDTH = buildScoopSteps(SCOOP_CONFIG.minWidthMult * SHIP_DRAW_W,
                                     SCOOP_CONFIG.maxWidthMult * SHIP_DRAW_W, SCOOP_CONFIG.curve);
const SCOOP_DEPTH = buildScoopSteps(SCOOP_CONFIG.minDepth, SCOOP_CONFIG.maxDepth, SCOOP_CONFIG.curve);
if (SCOOP_WIDTH[0] !== 0 || SCOOP_DEPTH[0] !== 0) throw new Error("SCOOP step 0 must be 0 - inScoopBox depends on it");
const SCOOP_HITS_PER_LEVEL = 5;              // non-lethal hits that cost one scoop level (playtest knob, v3.4 P3
                                              // 2->5). At 5 hits/level a level-5 scoop survives 25 non-lethal
                                              // hits; with SHIP_MAX_HP 250 and DMG_MEDIUM 35 a full-health run
                                              // only takes ~7 hits total, so the scoop is now effectively sticky
                                              // once earned. That's the intent, not a bug to "fix."
const SCOOP_MAX_BONUS = 500;                 // score paid when a scoop pickup lands at max level (mirrors the full-HP REPAIR_FULL_BONUS pattern; tunable)
const SCOOP_SPILL_KICK = 85;                 // v3.3 P4 (9c): px/s outward kick on the leftover when a clump is PARTIALLY scooped ("the rest floats off and away"); playtest knob (~60-110)

// Controller / gamepad input (F7). The one tunable knob for controller *feel* — how far an analog
// stick must travel before it counts as a directional press. Button/axis index enums and the binding
// table itself live with the Input section (below); they're structural, not balance. Rebinding UI is F8.
const GP_DEADZONE = 0.25;           // |left-stick axis| must exceed this to register (matches F7 spec)

// Achievements (F9). Weekly achievements rotate on the real-world ISO calendar week so every
// player worldwide sees the same 5 on the same days; lifetime achievements accumulate across all
// games. Both persist to their OWN localStorage key (afd_achievements_v1), separate from settings,
// so a schema change to one never disturbs the other. Definitions/logic live in the Achievements
// module (after the powerup flow functions); these are the only tunable numbers.
const ACH_TOAST_TIME   = 4.5;  // sec an unlock toast lingers on screen before fading out
const ACH_WEEKLY_SHOWN = 5;    // weekly achievements active per calendar week (a 5-wide slice of the pool)
const ACH_LINEAGE_FULL = 13;   // Hunter kills in one full lineage: 1 large + 3 medium + 9 small (Hunter's Bane)
const ACH_SAVE_EVERY   = 30;   // sec between periodic lifetime-progress saves (bounds localStorage writes)

// ---------- Canvas / scaling ----------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  const scale = Math.min(window.innerWidth / VIEW_W, window.innerHeight / VIEW_H);
  canvas.width = VIEW_W;
  canvas.height = VIEW_H;
  canvas.style.width = Math.floor(VIEW_W * scale) + "px";
  canvas.style.height = Math.floor(VIEW_H * scale) + "px";
}
window.addEventListener("resize", resize);
resize();

// ---------- Audio (Web Audio synth) ----------
const AudioSys = {
  ctx: null, thrustNode: null, thrustGain: null,
  saucerOsc: null, saucerGain: null,
  // Gain routing (F8). vol holds the three slider values (0..1, 1 = unity = pre-F8 loudness);
  // master/sfx/music are the gain nodes built in init(). Volumes persist even before the audio
  // graph exists (no user gesture yet) so loadSettings() can set them and init() apply them.
  vol: { master: 1, sfx: 1, music: 1 },
  master: null, sfx: null, music: null,
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Every voice -> sfx bus -> master bus -> speakers. The Options sliders drive these three
    // gains. music is wired for a future track — NOTHING is connected to its input yet (there is
    // no music in the game; the slider exists so it's ready), see delivery notes / GDD §2.8.
    this.master = this.ctx.createGain(); this.master.gain.value = this.vol.master; this.master.connect(this.ctx.destination);
    this.sfx    = this.ctx.createGain(); this.sfx.gain.value    = this.vol.sfx;    this.sfx.connect(this.master);
    this.music  = this.ctx.createGain(); this.music.gain.value  = this.vol.music;  this.music.connect(this.master);
  },
  // Set a category volume and, if the graph is live, push it to the node immediately (F8 sliders).
  setVol(cat, v) {
    this.vol[cat] = v;
    const node = cat === "master" ? this.master : cat === "sfx" ? this.sfx : this.music;
    if (node) node.gain.value = v;
  },
  resume() { if (this.ctx && this.ctx.state === "suspended") this.ctx.resume(); },
  now() { return this.ctx ? this.ctx.currentTime : 0; },

  fire() {
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "square";
    o.frequency.setValueAtTime(880, t);
    o.frequency.exponentialRampToValueAtTime(160, t + 0.12);
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    o.connect(g).connect(this.sfx);
    o.start(t); o.stop(t + 0.15);
  },

  explosion(size) { // size 1..3, bigger = deeper/longer
    if (!this.ctx) return;
    const t = this.now();
    const dur = 0.25 + size * 0.15;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 1.6);
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const filt = this.ctx.createBiquadFilter();
    filt.type = "lowpass";
    filt.frequency.setValueAtTime(900 - size * 180, t);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(filt).connect(g).connect(this.sfx);
    src.start(t);
  },

  thrust(on) {
    if (!this.ctx) return;
    if (on && !this.thrustNode) {
      const dur = 1;
      const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const src = this.ctx.createBufferSource();
      src.buffer = buf; src.loop = true;
      const filt = this.ctx.createBiquadFilter();
      filt.type = "lowpass"; filt.frequency.value = 320;
      const g = this.ctx.createGain();
      g.gain.value = 0.10;
      src.connect(filt).connect(g).connect(this.sfx);
      src.start();
      this.thrustNode = src; this.thrustGain = g;
    } else if (!on && this.thrustNode) {
      this.thrustNode.stop();
      this.thrustNode = null; this.thrustGain = null;
    }
  },

  beat(high) {
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "sine";
    o.frequency.value = high ? 110 : 82;
    g.gain.setValueAtTime(0.16, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(g).connect(this.sfx);
    o.start(t); o.stop(t + 0.13);
  },

  saucer(on, small) {
    if (!this.ctx) return;
    if (on && !this.saucerOsc) {
      const o = this.ctx.createOscillator();
      const lfo = this.ctx.createOscillator();
      const lfoGain = this.ctx.createGain();
      const g = this.ctx.createGain();
      o.type = "triangle";
      o.frequency.value = small ? 520 : 260;
      lfo.frequency.value = small ? 7 : 4;
      lfoGain.gain.value = small ? 90 : 45;
      lfo.connect(lfoGain).connect(o.frequency);
      g.gain.value = 0.055;
      o.connect(g).connect(this.sfx);
      o.start(); lfo.start();
      this.saucerOsc = { o, lfo }; this.saucerGain = g;
    } else if (!on && this.saucerOsc) {
      this.saucerOsc.o.stop(); this.saucerOsc.lfo.stop();
      this.saucerOsc = null; this.saucerGain = null;
    }
  },

  shieldPing() {
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(1400, t);
    o.frequency.exponentialRampToValueAtTime(500, t + 0.18);
    g.gain.setValueAtTime(0.14, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.connect(g).connect(this.sfx);
    o.start(t); o.stop(t + 0.21);
  },

  // v3.5 P3: the low-health voice, rebuilt. The old build was a CONSTANT-amplitude 220Hz sine at
  // gain 0.05 — the quietest voice on the bus, with no harmonics to cut through explosion (0.5) or
  // thrust (0.10), and constant amplitude, which the ear adapts away the longer it plays (louder
  // alone would only be more annoying, not more noticeable). Rebuilt as a PULSED cockpit-warning
  // beep: two static-level oscillators (root + a soft harmonic partner, so it reads as an
  // instrument panel and survives an explosion) summed into a shared amplitude-LFO gain node (the
  // pulse). Same persistent-voice shape as thrust()/saucer() — stored nodes built on true, torn
  // down on false. lowhpSet(t) (below) then ramps the pulse rate + gain from HP urgency; nothing
  // here reads HP directly.
  lowhp(on) {
    if (!this.ctx) return;
    if (on && !this.lowhpOsc) {
      const root = this.ctx.createOscillator();
      const harm = this.ctx.createOscillator();
      const rootLevel = this.ctx.createGain();
      const harmLevel = this.ctx.createGain();
      const pulseGain = this.ctx.createGain();
      const lfo = this.ctx.createOscillator();
      const lfoGain = this.ctx.createGain();
      root.type = "sine"; root.frequency.value = LOWHP_ROOT_FREQ;
      harm.type = "sine"; harm.frequency.value = LOWHP_ROOT_FREQ * LOWHP_HARMONIC_RATIO;
      rootLevel.gain.value = LOWHP_GAIN_MIN;
      harmLevel.gain.value = LOWHP_GAIN_MIN * LOWHP_HARMONIC_GAIN_FRAC;
      lfo.type = "sine"; lfo.frequency.value = LOWHP_PULSE_RATE_MIN;
      lfoGain.gain.value = LOWHP_PULSE_DEPTH;
      pulseGain.gain.value = LOWHP_PULSE_DEPTH;      // DC offset; lfo swings it ~0..2*depth (~0..1)
      lfo.connect(lfoGain).connect(pulseGain.gain);
      root.connect(rootLevel).connect(pulseGain);
      harm.connect(harmLevel).connect(pulseGain);
      pulseGain.connect(this.sfx);
      root.start(); harm.start(); lfo.start();
      this.lowhpOsc = { root, harm, lfo };
      this.lowhpGain = { rootLevel, harmLevel, pulseGain, lfoGain };
      this.lowhpT = null;   // forces lowhpSet's next call to actually ramp (idempotency guard)
    } else if (!on && this.lowhpOsc) {
      this.lowhpOsc.root.stop(); this.lowhpOsc.harm.stop(); this.lowhpOsc.lfo.stop();
      this.lowhpOsc = null; this.lowhpGain = null; this.lowhpT = null;
    }
  },

  // v3.5 P3: per-frame HP-urgency scaling for the live low-health voice. t = 1 - hp/LOW_HP_THRESHOLD
  // (0 at the threshold, ~1 near death) — called every frame the state is engaged from update()'s
  // single edge-detect site, right alongside the lowhp(true)/(false) calls. Safe no-op when the
  // voice isn't live or ctx is null. Idempotent on t (same idiom as MusicSys.setDuck/setIntensity)
  // so a steady-HP frame doesn't reschedule a ramp. Moves params via linearRampToValueAtTime, never
  // a bare per-frame .value set — that zippers.
  lowhpSet(t) {
    if (!this.ctx || !this.lowhpOsc) return;
    t = Math.max(0, Math.min(1, t || 0));
    if (t === this.lowhpT) return;
    this.lowhpT = t;
    const now = this.now();
    const rate = LOWHP_PULSE_RATE_MIN + (LOWHP_PULSE_RATE_MAX - LOWHP_PULSE_RATE_MIN) * t;
    const gain = LOWHP_GAIN_MIN + (LOWHP_GAIN_MAX - LOWHP_GAIN_MIN) * t;
    const ramp = (param, target) => {
      param.cancelScheduledValues(now);
      param.setValueAtTime(param.value, now);
      param.linearRampToValueAtTime(target, now + LOWHP_PARAM_RAMP);
    };
    ramp(this.lowhpOsc.lfo.frequency, rate);
    ramp(this.lowhpGain.rootLevel.gain, gain);
    ramp(this.lowhpGain.harmLevel.gain, gain * LOWHP_HARMONIC_GAIN_FRAC);
  },

  pickup() {
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(300, t);
    o.frequency.exponentialRampToValueAtTime(620, t + 0.08);
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(g).connect(this.sfx);
    o.start(t); o.stop(t + 0.13);
  },

  deliver(count) { // pitch climbs with each canister in a delivery run
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "triangle";
    o.frequency.value = 440 * Math.pow(1.06, Math.min(count, 20));
    g.gain.setValueAtTime(0.13, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.connect(g).connect(this.sfx);
    o.start(t); o.stop(t + 0.16);
  },

  hit() { // ship takes hull damage — a low, heavy descending thud (distinct from fire)
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "square";
    o.frequency.setValueAtTime(200, t);
    o.frequency.exponentialRampToValueAtTime(55, t + 0.18);
    g.gain.setValueAtTime(0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    o.connect(g).connect(this.sfx);
    o.start(t); o.stop(t + 0.23);
  },

  powerup() { // collected a powerup — a bright two-note rising "power on" chime (distinct from pickup)
    if (!this.ctx) return;
    const t = this.now();
    [660, 990].forEach((f, i) => {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = "triangle";
      o.frequency.setValueAtTime(f, t + i * 0.07);
      const g0 = 0.12;
      g.gain.setValueAtTime(g0, t + i * 0.07);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.14);
      o.connect(g).connect(this.sfx);
      o.start(t + i * 0.07); o.stop(t + i * 0.07 + 0.15);
    });
  },

  ui(up) { // short menu blip (F8): up=true = confirm/select (higher), false = move/back/adjust (lower)
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "square";
    o.frequency.value = up ? 560 : 320;
    g.gain.setValueAtTime(0.07, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.connect(g).connect(this.sfx);
    o.start(t); o.stop(t + 0.07);
  },

  achievement() { // an achievement unlocked — a short rising three-note fanfare (distinct from powerup)
    if (!this.ctx) return;
    const t = this.now();
    [523, 659, 784].forEach((f, i) => { // C5 - E5 - G5 major triad
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = "triangle";
      o.frequency.setValueAtTime(f, t + i * 0.09);
      g.gain.setValueAtTime(0.11, t + i * 0.09);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.09 + 0.2);
      o.connect(g).connect(this.sfx);
      o.start(t + i * 0.09); o.stop(t + i * 0.09 + 0.22);
    });
  },

  hunterborn() { // a Hunter coalesced from neglected scrap — a low, ominous descending two-tone with
    if (!this.ctx) return;                      // slight dissonance (~a tritone), darker/longer than explosion
    const t = this.now();
    [[196, 138], [139, 98]].forEach(([f0, f1]) => { // two sawtooth voices a dissonant ~√2 apart, both falling
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = "sawtooth";
      o.frequency.setValueAtTime(f0, t);
      o.frequency.exponentialRampToValueAtTime(f1, t + 0.4);
      g.gain.setValueAtTime(0.13, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.42);
      o.connect(g).connect(this.sfx);
      o.start(t); o.stop(t + 0.43);
    });
  },

  scooploss() { // a scoop level lost to damage — a short, deflating downward blip (distinct from hit/pickup)
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "triangle";
    o.frequency.setValueAtTime(520, t);
    o.frequency.exponentialRampToValueAtTime(180, t + 0.18);
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.connect(g).connect(this.sfx);
    o.start(t); o.stop(t + 0.21);
  }
};

// ---------- Music (Web Audio synth, lookahead scheduler) ----------
// MusicSys lives ALONGSIDE AudioSys, not inside it: AudioSys is a flat bag of one-shot voices; music
// needs a per-frame lookahead scheduler and a track graph, which would pollute that bag. All music
// output routes into AudioSys.music (the GainNode AudioSys.init() already built and wired to master),
// so the existing Options "Music Volume" slider governs the whole system with no new plumbing.
//
// Signal path:  note gain envelopes -> [per-state trackGain, crossfaded] -> MusicSys.duck -> AudioSys.music
//
// Tracks are DATA (step-sequencer tables — see buildTitleTrack / MUSIC_TRACKS), never code. The
// scheduler consumes a generic { stepDur, steps, layers:[{type,gain,steps:[cell|null]}] } shape, so
// v3.4 P7 can add the three gameplay tracks as more tables without touching a line of the scheduler.
const MUSIC_LOOKAHEAD = 0.2;   // s — each frame, schedule any note starting within this window
const MUSIC_CROSSFADE = 0.6;   // s — track-to-track fade on setState()
const MUSIC_FADE_OUT  = 1.0;   // s — fade to silence at game over (§9c look-call: quiet beat)
const MUSIC_DUCK_GAIN = 0.5;   // menu-open music level (§9 ducking spec: 50%)
const MUSIC_DUCK_RAMP = 0.15;  // s — click-free duck ramp (linearRampToValueAtTime, not a bare set)

// v3.4 P7: intensity layer gating. Layer 1 (foundation) is tier-less — always on. Layers 2-4 gate
// on the SHIPPED difficultyFactor(game.wave) curve (§9b) — no second curve invented. Each gate is a
// persistent per-layer GainNode (built in MusicSys.setState, ramped in MusicSys.setIntensity), so a
// layer thickens the SAME loop rather than swapping to a different one.
const MUSIC_LAYER_THRESHOLD = { 2: 0.20, 3: 0.45, 4: 0.70 };
const MUSIC_LAYER_CROSSFADE = 1.5; // s — layer thicken/thin ramp when intensity crosses a threshold

const MUSIC_A4 = 440;
const mfreq = m => MUSIC_A4 * Math.pow(2, (m - 69) / 12); // equal-tempered MIDI note -> Hz

// The title track (§9c): ONE long, patient, EPIC-ADVENTURE loop — slow build, wide intervals, no
// percussion pulse, no urgency, deliberately unrelated to the gameplay mood set. Not layered by
// difficulty (there is none on the title screen); it's just a long loop (48 s here) so it doesn't
// read as a jingle. Built as a step table so it feeds the same scheduler the gameplay tracks will.
function buildTitleTrack() {
  const STEPS = 96, stepDur = 0.5;                 // 96 * 0.5 = 48 s loop
  const mk = () => new Array(STEPS).fill(null);
  const put = (arr, step, midi, durSteps, g) => { arr[step] = { f: mfreq(midi), dur: durSteps, g: g == null ? 1 : g }; };

  const bass = mk(), padLo = mk(), padMid = mk(), padHi = mk(), lead = mk();
  // Six 16-step (8 s) harmonic blocks — a patient Aeolian arc in A: i VI III VII iv V.
  const roots = [45, 41, 48, 43, 50, 40]; // A2 F2 C3 G2 D3 E2 (MIDI)
  roots.forEach((r, b) => {
    const s0 = b * 16;
    put(bass,  s0,      r - 12, 16, 1.0);          // slow octave-below drone, whole block
    put(padLo, s0,      r,       8, 1.0);          // root, gently re-struck mid-block for motion
    put(padLo, s0 + 8,  r,       8, 0.8);
    put(padMid, s0,     r + 7,  16, 0.9);          // open fifth, sustained — the "scale"
    put(padHi, s0 + 2,  r + 12,  6, 0.6);          // octave shimmer
    put(padHi, s0 + 10, r + 12,  6, 0.5);
  });
  // Lead: a sparse, wide-interval melody that only ENTERS from block 3 (slow build / departure),
  // climbing high toward the end of the loop. A-minor-pentatonic tones, big leaps.
  put(lead, 52, 76, 6, 1.0);  // E5
  put(lead, 60, 72, 6, 0.9);  // C5
  put(lead, 66, 81, 8, 1.0);  // A5
  put(lead, 82, 79, 6, 0.9);  // G5
  put(lead, 90, 84, 6, 1.0);  // C6 — the peak "departure" note before the loop turns over

  return { stepDur, steps: STEPS, layers: [
    { name: "bass",  type: "sine",     gain: 0.09, cutoff: 220, detune: 0, atk: 1.2, rel: 2.0, steps: bass  },
    { name: "padLo", type: "triangle", gain: 0.05, cutoff: 900, detune: 7, atk: 0.6, rel: 1.6, steps: padLo },
    { name: "padMid",type: "triangle", gain: 0.045,cutoff: 900, detune: 7, atk: 0.8, rel: 1.8, steps: padMid },
    { name: "padHi", type: "sine",     gain: 0.04, cutoff: 0,   detune: 5, atk: 0.5, rel: 1.4, steps: padHi },
    { name: "lead",  type: "triangle", gain: 0.055,cutoff: 0,   detune: 0, atk: 0.4, rel: 1.2, steps: lead  },
  ]};
}

// v3.4 P7: the three gameplay tracks. Shared step-table helpers (title track keeps its own local
// mk/put — untouched, lower risk than refactoring P6-tested code).
function mkSteps(n) { return new Array(n).fill(null); }
function putStep(arr, step, midi, durSteps, g) { arr[step] = { f: mfreq(midi), dur: durSteps, g: g == null ? 1 : g }; }

// tense — driving, minor, insistent. D minor, 120bpm 16th notes (stepDur .125, 32 steps = 4s loop).
// Layer 1 is a relentless 16th-note bass through a tight lowpass — the "insistent" read; layers 2-4
// add off-beat arpeggio, chord stabs, and a sparse high lead as intensity climbs.
function buildTenseTrack() {
  const STEPS = 32, stepDur = 0.125;
  const bass = mkSteps(STEPS), pulse = mkSteps(STEPS), harmony = mkSteps(STEPS), lead = mkSteps(STEPS);
  for (let i = 0; i < STEPS; i++) putStep(bass, i, (i % 8 === 4) ? 33 : 38, 1, (i % 4 === 0) ? 1.0 : 0.65); // D2/A1
  const arp = [62, 65, 69, 72]; // D4 F4 A4 C5 — D minor arpeggio
  for (let i = 1; i < STEPS; i += 2) putStep(pulse, i, arp[(i >> 1) % arp.length], 1, 0.7);
  putStep(harmony, 8, 62, 4, 0.9);  // D4 stab
  putStep(harmony, 24, 69, 4, 0.9); // A4 stab
  const mel = [{ s: 16, m: 74 }, { s: 20, m: 70 }, { s: 24, m: 77 }, { s: 28, m: 72 }]; // D5 Bb4 F5 C5
  for (const n of mel) putStep(lead, n.s, n.m, 2, 0.85);
  return { stepDur, steps: STEPS, layers: [
    { name: "bass",    type: "sawtooth", gain: 0.08,  cutoff: 500, atk: 0.005, rel: 0.05, tier: 1, steps: bass },
    { name: "pulse",   type: "triangle", gain: 0.05,  atk: 0.01,  rel: 0.06,  tier: 2, steps: pulse },
    { name: "harmony", type: "sawtooth", gain: 0.045, atk: 0.05,  rel: 0.3,   tier: 3, steps: harmony },
    { name: "lead",    type: "square",   gain: 0.05,  atk: 0.02,  rel: 0.15,  tier: 4, steps: lead },
  ]};
}

// retro — square/saw arcade, bright. A major, 32 steps @ stepDur .1 (3.2s loop) — the vector-arcade
// lineage; matches drawPoly+glowStroke/CRT-palette/synthesized-SFX. No filters — kept bright.
function buildRetroTrack() {
  const STEPS = 32, stepDur = 0.1;
  const bass = mkSteps(STEPS), pulse = mkSteps(STEPS), harmony = mkSteps(STEPS), lead = mkSteps(STEPS);
  for (let i = 0; i < STEPS; i += 2) putStep(bass, i, (i % 4 === 0) ? 45 : 52, 1, 1.0); // A2/E3, punchy
  const arp = [57, 61, 64, 69]; // A3 C#4 E4 A4
  for (let i = 1; i < STEPS; i += 2) putStep(pulse, i, arp[((i - 1) >> 1) % arp.length], 1, 0.7);
  putStep(harmony, 8, 57, 4, 0.85);  // A3 stab
  putStep(harmony, 24, 61, 4, 0.85); // C#4 stab
  const mel = [{ s: 12, m: 69 }, { s: 14, m: 71 }, { s: 16, m: 73 }, { s: 20, m: 76 }, { s: 24, m: 81 }, { s: 28, m: 76 }];
  for (const n of mel) putStep(lead, n.s, n.m, 2, 0.9);
  return { stepDur, steps: STEPS, layers: [
    { name: "bass",    type: "square",   gain: 0.075, atk: 0.005, rel: 0.04, tier: 1, steps: bass },
    { name: "pulse",   type: "sawtooth", gain: 0.045, atk: 0.005, rel: 0.05, tier: 2, steps: pulse },
    { name: "harmony", type: "square",   gain: 0.05,  atk: 0.03,  rel: 0.25, tier: 3, steps: harmony },
    { name: "lead",    type: "square",   gain: 0.055, atk: 0.01,  rel: 0.12, tier: 4, steps: lead },
  ]};
}

// ambient — slow pads, sparse, spacey. E dorian, 16 steps @ stepDur .5 (8s loop) — the "long haul in
// the dark" salvage-sim mood. A drone foundation; everything above it stays sparse even at max layer.
function buildAmbientTrack() {
  const STEPS = 16, stepDur = 0.5;
  const bass = mkSteps(STEPS), pulse = mkSteps(STEPS), harmony = mkSteps(STEPS), lead = mkSteps(STEPS);
  // Foundation (tier 1, always on): root/fifth pad swells offset every 2s across the 8s loop, each
  // overlapping the next's attack as its own release fades — continuously present (no silent gap
  // between notes), not one isolated blip. This is the ONLY layer a wave-1 player hears (tiers 2-4
  // are gated by MUSIC_LAYER_THRESHOLD), so it alone must read as "music," not "paused."
  putStep(bass, 0,  40, 6, 1.0);  // E2
  putStep(bass, 4,  47, 6, 0.85); // B2 (fifth)
  putStep(bass, 8,  40, 6, 0.9);  // E2
  putStep(bass, 12, 47, 6, 0.8);  // B2
  putStep(pulse, 4, 64, 2, 0.7);  // E4 ping
  putStep(pulse, 12, 67, 2, 0.6); // G4 ping
  putStep(harmony, 0, 59, 8, 0.8); // B3 pad
  putStep(harmony, 8, 62, 8, 0.7); // D4 pad
  putStep(lead, 6, 71, 2, 0.6);  // B4 twinkle
  putStep(lead, 14, 76, 2, 0.55); // E5 twinkle
  return { stepDur, steps: STEPS, layers: [
    // Gains brought into family with retro (0.075 bass) / tense (0.08 bass) — calmest track, not the
    // quietest; tiers 2-4 nudged up to match rather than left ~30% below their tense/retro siblings.
    { name: "bass",    type: "sine",     gain: 0.075, cutoff: 300, atk: 1.0, rel: 2.0, tier: 1, steps: bass },
    { name: "pulse",   type: "triangle", gain: 0.045, atk: 0.3,   rel: 0.8,  tier: 2, steps: pulse },
    { name: "harmony", type: "triangle", gain: 0.05,  cutoff: 800, atk: 1.0, rel: 1.6, tier: 3, steps: harmony },
    { name: "lead",    type: "sine",     gain: 0.045, atk: 0.4,   rel: 1.0,  tier: 4, steps: lead },
  ]};
}

// State -> track. "off" (game over) is silence. Title has no tiers (all layers default tier 1 /
// always on — no difficulty on the title screen). The three gameplay tracks are keyed by NAME
// (not "play") so musicStateFor() can route settings.musicTrack straight through, and switching
// tracks becomes a normal setState() crossfade for free — no separate track-switch code path.
const MUSIC_TRACKS = {
  title:   buildTitleTrack(),
  tense:   buildTenseTrack(),
  retro:   buildRetroTrack(),
  ambient: buildAmbientTrack(),
  off:     null,   // game over / silence
};

const MusicSys = {
  duck: null,          // GainNode: track graph -> AudioSys.music; menu ducking rides on its .gain
  trackGain: null,     // GainNode for the currently-scheduled track; replaced (crossfaded) on setState
  state: "off",        // current logical state: "title" | "play" | "off"
  track: null,         // the active step table (MUSIC_TRACKS[state]) or null for silent states
  step: 0,             // scheduler cursor into track.steps
  nextStepTime: 0,     // absolute ctx time of the next step to schedule (never in the past)
  ducked: false,       // last duck target applied — makes setDuck() idempotent under per-frame calls
  intensity: 0,        // 0..1 — difficultyFactor(game.wave), recomputed only on wave change (v3.4 P7)
  layerGates: null,    // v3.4 P7: [{node, tier, target}] parallel to this.track.layers, or null

  // Lazily build the duck node once the audio graph exists (first user gesture). AudioSys.music is
  // created in AudioSys.init(); until then every entry point below no-ops via the ctx guard.
  ensureGraph() {
    if (this.duck || !AudioSys.ctx || !AudioSys.music) return;
    this.duck = AudioSys.ctx.createGain();
    this.duck.gain.value = this.ducked ? MUSIC_DUCK_GAIN : 1.0; // honour a duck requested before the graph existed
    this.duck.connect(AudioSys.music);
  },

  // Menu ducking (§9): 0.5 while any pause-menu screen is open, 1.0 otherwise. Called every frame
  // with menuActive(), so it must be idempotent — only ramp when the target actually flips.
  setDuck(on) {
    on = !!on;
    if (on === this.ducked) return;
    if (!AudioSys.ctx) { this.ducked = on; return; } // no graph yet — remember it; ensureGraph honours it later
    this.ensureGraph();          // build the duck node at the CURRENT level first, so the change below is a ramp
    this.ducked = on;
    if (!this.duck) return;
    const t = AudioSys.ctx.currentTime, target = on ? MUSIC_DUCK_GAIN : 1.0;
    this.duck.gain.cancelScheduledValues(t);
    this.duck.gain.setValueAtTime(this.duck.gain.value, t);
    this.duck.gain.linearRampToValueAtTime(target, t + MUSIC_DUCK_RAMP); // RAMP, never a bare .value set
  },

  // v3.4 P7: gameplay-track intensity 0..1 (difficultyFactor(game.wave)). Called ONLY from nextWave()
  // — never per-frame, so this stays cheap and the per-frame update() path stays clean. Layer 1
  // (tier-less / foundation) is always on and skipped here. Layers 2-4 compare f against their
  // MUSIC_LAYER_THRESHOLD and ramp their persistent gate node toward 0/1 over MUSIC_LAYER_CROSSFADE
  // — a RAMP, never a bare set, so a threshold crossing never pops. Idempotent: a gate only ramps
  // when its target actually flips, same idiom as setDuck().
  setIntensity(f) {
    f = Math.max(0, Math.min(1, f || 0));
    this.intensity = f;
    if (!AudioSys.ctx || !this.layerGates) return;
    const t = AudioSys.ctx.currentTime;
    for (const lg of this.layerGates) {
      if (lg.tier === 1) continue;
      const target = f >= MUSIC_LAYER_THRESHOLD[lg.tier] ? 1 : 0;
      if (target === lg.target) continue;
      lg.target = target;
      lg.node.gain.cancelScheduledValues(t);
      lg.node.gain.setValueAtTime(lg.node.gain.value, t);
      lg.node.gain.linearRampToValueAtTime(target, t + MUSIC_LAYER_CROSSFADE);
    }
  },

  // Crossfade to a new state's track. Fades out + retires the previous track's gain (so already-
  // scheduled notes ring out and nothing new feeds it), and starts a fresh gain ramping up for the
  // new track. "off" (game over) leaves trackGain null so the scheduler idles.
  setState(s) {
    if (!AudioSys.ctx) return;
    this.ensureGraph();
    if (s === this.state) return;
    const ctx = AudioSys.ctx, t = ctx.currentTime;
    if (this.trackGain) {                         // fade out and abandon the old track
      const g = this.trackGain, fade = (s === "off") ? MUSIC_FADE_OUT : MUSIC_CROSSFADE;
      g.gain.cancelScheduledValues(t);
      g.gain.setValueAtTime(g.gain.value, t);
      g.gain.linearRampToValueAtTime(0.0001, t + fade);
      this.trackGain = null;
    }
    this.state = s;
    this.track = MUSIC_TRACKS[s] || null;
    this.step = 0;
    this.layerGates = null;
    if (this.track && this.duck) {
      this.nextStepTime = t;                      // start scheduling from now — never in the past
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(1, t + MUSIC_CROSSFADE);
      g.connect(this.duck);
      this.trackGain = g;
      // v3.4 P7: one persistent gate GainNode per layer, initialized straight to its target for the
      // CURRENT intensity (no ramp needed here — the track-level crossfade above already handles
      // fading this whole track in). Later intensity changes ramp these individually via setIntensity.
      this.layerGates = this.track.layers.map(layer => {
        const tier = layer.tier || 1;
        const node = ctx.createGain();
        const target = tier === 1 ? 1 : (this.intensity >= MUSIC_LAYER_THRESHOLD[tier] ? 1 : 0);
        node.gain.value = target;
        node.connect(g);
        return { node, tier, target };
      });
    }
  },

  // The lookahead scheduler: once per frame, schedule every step whose start time falls within the
  // next MUSIC_LOOKAHEAD window. Web Audio timing only — never setTimeout/setInterval for notes.
  update() {
    if (!AudioSys.ctx) return;
    this.ensureGraph();
    if (!this.track || !this.trackGain) return;
    const ctx = AudioSys.ctx, horizon = ctx.currentTime + MUSIC_LOOKAHEAD;
    let guard = 1024;                             // bound catch-up after a long stall (never dump the loop)
    while (this.nextStepTime < horizon && guard-- > 0) {
      this.scheduleStep(this.step, this.nextStepTime);
      this.nextStepTime += this.track.stepDur;
      this.step = (this.step + 1) % this.track.steps;
    }
  },

  scheduleStep(step, tStep) {
    const t = Math.max(tStep, AudioSys.ctx.currentTime); // clamp: a stalled frame must not schedule into the past
    const layers = this.track.layers;
    // Every layer is scheduled unconditionally, regardless of intensity — gating is a downstream
    // GAIN gate (this.layerGates), not a scheduling omission. This is what keeps a layer's note
    // timing/pitch identical across the whole intensity range (§9b: the track thickens, never swaps).
    for (let i = 0; i < layers.length; i++) {
      const cell = layers[i].steps[step];
      if (cell) this.playNote(layers[i], cell, t, i);
    }
  },

  playNote(layer, cell, t, layerIndex) {
    const ctx = AudioSys.ctx, dur = cell.dur * this.track.stepDur;
    const peak = (cell.g == null ? 1 : cell.g) * layer.gain;
    const atk = Math.min(layer.atk == null ? 0.4 : layer.atk, dur * 0.5);
    const rel = Math.min(layer.rel == null ? 0.5 : layer.rel, dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(peak, t + atk);
    g.gain.setValueAtTime(peak, t + Math.max(atk, dur - rel));
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    let sink = g;
    if (layer.cutoff) {
      const f = ctx.createBiquadFilter();
      f.type = "lowpass"; f.frequency.value = layer.cutoff;
      f.connect(g); sink = f;
    }
    const freqs = layer.detune ? [cell.f, cell.f * Math.pow(2, layer.detune / 1200)] : [cell.f];
    for (const fr of freqs) {
      const o = ctx.createOscillator();
      o.type = layer.type; o.frequency.value = fr;
      o.connect(sink);
      o.start(t); o.stop(t + dur + 0.1);
    }
    g.connect(this.layerGates[layerIndex].node); // v3.4 P7: through this layer's intensity gate
  },
};

// ---------- Input ----------
// One input layer serves both keyboard and gamepad. Everything downstream only ever calls
// input.left()/right()/thrust()/fire()/shield() — it never reads keys{} or the gamepad directly,
// so the two input methods stay swappable and Phase 8's rebinding UI has a single table to edit.

const keys = {};

// W3C "Standard Gamepad" button/axis layout (developer.mozilla.org/en-US/docs/Web/API/Gamepad).
// These are the physical hardware indices, not tunable balance — they name the binding table below.
const GP = {
  A: 0, B: 1, X: 2, Y: 3,          // face buttons
  LB: 4, RB: 5, LT: 6, RT: 7,      // shoulders / triggers
  BACK: 8, START: 9,               // center buttons
  LS: 10, RS: 11,                  // stick presses
  DPAD_UP: 12, DPAD_DOWN: 13, DPAD_LEFT: 14, DPAD_RIGHT: 15,
  AXIS_LX: 0, AXIS_LY: 1, AXIS_RX: 2, AXIS_RY: 3   // analog axis indices
};

// Human-readable names for the Controls screen (F8) — button index -> label.
const GP_NAME = {
  0: "A", 1: "B", 2: "X", 3: "Y", 4: "LB", 5: "RB", 6: "LT", 7: "RT",
  8: "Back", 9: "Start", 10: "L-Stick", 11: "R-Stick",
  12: "D-Pad ↑", 13: "D-Pad ↓", 14: "D-Pad ←", 15: "D-Pad →"
};

// The binding table — the single source of truth for what triggers each action, as DATA (not
// per-action logic) so Phase 8 can render/rebind it directly. Each action lists the keyboard keys
// (lowercased, matching the keys{} map), the gamepad buttons, and optionally one analog axis
// (dir < 0 = negative half past the deadzone, dir > 0 = positive half). `fixed:true` marks the
// menu/system actions that F7 spec'd as non-rebindable (A confirm / B back / Start pause).
const bindings = {
  // Gameplay actions (held-state, polled every frame). Rebindable in Phase 8.
  left:    { label: "Rotate CCW", fixed: false, keys: ["arrowleft", "a"],  buttons: [GP.DPAD_LEFT],  axis: { index: GP.AXIS_LX, dir: -1 } },
  right:   { label: "Rotate CW",  fixed: false, keys: ["arrowright", "d"], buttons: [GP.DPAD_RIGHT], axis: { index: GP.AXIS_LX, dir: +1 } },
  thrust:  { label: "Thrust",     fixed: false, keys: ["arrowup", "w"],    buttons: [GP.DPAD_UP],    axis: { index: GP.AXIS_LY, dir: -1 } },
  fire:    { label: "Fire",       fixed: false, keys: [" "],               buttons: [GP.A] },
  shield:  { label: "Shield",     fixed: false, keys: ["shift"],           buttons: [GP.RT, GP.RB] }, // gap-fill: no controller shield was spec'd (see notes)
  // Menu / system actions (edge-triggered). Fixed per F7 — not exposed to rebinding.
  confirm: { label: "Confirm",    fixed: true,  keys: ["enter"],           buttons: [GP.A] },
  // back is context-aware (v3.0 P4): inside a menu it backs out; on title/gameover with no menu, B
  // opens the system menu (keyboard equivalent is "o", handled inline). ESC is shared with pause below.
  back:    { label: "Back",       fixed: true,  keys: ["escape"],          buttons: [GP.B] },
  // pause is ESC (P retired, v3.0 P4 FLAG P4-a): ESC pauses during play; inside a menu the keydown
  // handler resolves confirm->back->pause in order, so ESC there means "back" (back matches first).
  pause:   { label: "Pause",      fixed: true,  keys: ["escape"],          buttons: [GP.START] }
};

// The rebindable actions (the fixed:false gameplay ones) and a pristine snapshot of their shipped
// defaults, captured BEFORE any saved settings are applied (loadSettings runs later). The Controls
// screen's "Return to Defaults" (F8) restores exactly this. Keep the snapshot deep — mutating a
// binding must never reach back into it.
const REBINDABLE = Object.keys(bindings).filter(n => !bindings[n].fixed); // left/right/thrust/fire/shield
const DEFAULT_BINDINGS = {};
for (const n of REBINDABLE) {
  const b = bindings[n];
  DEFAULT_BINDINGS[n] = {
    keys: b.keys.slice(),
    buttons: (b.buttons || []).slice(),
    axis: b.axis ? { index: b.axis.index, dir: b.axis.dir } : null
  };
}

// Snapshot of the first connected gamepad, refreshed once per frame by pollGamepad() (main loop,
// before update()). buttons/axes are the current frame; prevButtons is last frame, for edge detection.
const gamepad = { connected: false, buttons: [], axes: [], prevButtons: [] };

function pollGamepad() {
  const pads = (navigator.getGamepads && navigator.getGamepads()) || [];
  let pad = null;
  for (const p of pads) { if (p) { pad = p; break; } }   // first connected only; ignore the rest (F7)
  gamepad.prevButtons = gamepad.buttons;                 // keep last frame's booleans for edge detection
  if (!pad) { gamepad.connected = false; gamepad.buttons = []; gamepad.axes = []; return; }
  gamepad.connected = true;
  // GamepadButton objects expose .pressed; some environments hand back raw numbers — support both.
  gamepad.buttons = pad.buttons.map(b => (b && typeof b === "object") ? b.pressed : b > 0.5);
  gamepad.axes = pad.axes.slice();
}

// --- Binding resolution (shared by held-state predicates and edge-triggered menu reads) ---
function kbActive(b) {              // any bound keyboard key currently down?
  for (const k of b.keys) if (keys[k]) return true;
  return false;
}
function gpActive(b) {              // any bound gamepad button held, or the bound axis past its deadzone?
  if (!gamepad.connected) return false;
  if (b.buttons) for (const i of b.buttons) if (gamepad.buttons[i]) return true;
  if (b.axis) {
    const v = gamepad.axes[b.axis.index];
    if (v !== undefined && (b.axis.dir < 0 ? v < -GP_DEADZONE : v > GP_DEADZONE)) return true;
  }
  return false;
}
function actionHeld(name) {         // held-state: keyboard OR gamepad, for the gameplay predicates
  const b = bindings[name];
  return kbActive(b) || gpActive(b);
}
function gpPressed(b) {             // gamepad edge: a bound button newly pressed THIS frame (not held)
  if (!gamepad.connected || !b.buttons) return false;
  for (const i of b.buttons) if (gamepad.buttons[i] && !gamepad.prevButtons[i]) return true;
  return false;
}

// The predicate object the rest of the game reads — call signature unchanged from before F7.
const input = {
  left:   () => actionHeld("left"),
  right:  () => actionHeld("right"),
  thrust: () => actionHeld("thrust"),
  fire:   () => actionHeld("fire"),
  shield: () => actionHeld("shield")
};

// Keyboard events. Three input CONTEXTS, checked in priority order so they never fight (F8):
//   (1) rebind capture  — the pressed key IS the new binding (or Esc cancels). Consumed entirely.
//   (2) menu open       — keys drive menu navigation only, never the ship.
//   (3) normal play      — recorded into keys{} for input.*(), plus the confirm/pause edges.
// Crucially, (1) and (2) return WITHOUT writing keys{}, so a menu keypress (or a captured rebind)
// can never leak through into ship rotation/thrust.
window.addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  AudioSys.init(); AudioSys.resume();

  // (1) Rebind capture — exclusive; the key never reaches gameplay or nav.
  if (game.menu.rebinding) {
    e.preventDefault();
    if (game.menu.rebinding.device === "key") captureKeyRebind(k);
    else if (k === "escape") { game.menu.rebinding = null; AudioSys.ui(false); } // Esc cancels a pad-capture
    return;
  }

  // (2) A menu is open — route to menu navigation, do NOT record gameplay keys.
  if (menuActive()) {
    e.preventDefault();
    // Browser key auto-repeat (~30/sec while held) would otherwise spam menu actions — e.g. spin
    // the 3-value Music Track row back to its start and re-enter setState() nearly every frame,
    // restarting the crossfade ramp and pinning the music near-silent. Matches the gamepad path
    // (handleGamepadMenu -> menuNavEdges()), which is already strictly edge-detected.
    if (e.repeat) return;
    handleMenuKey(k);
    return;
  }

  // (3) Normal play/title/gameover keyboard input.
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
  keys[k] = true;
  if (bindings.confirm.keys.includes(k) && (game.state === "title" || game.state === "gameover")) startGame();
  if (bindings.pause.keys.includes(k) && game.state === "playing") openPause();
  // "O" opens the Options/Achievements system menu from title/gameover (v3.0 P4; replaces the old
  // P->options path). No game to pause here — openPause() picks the system-menu root off game.state.
  if (k === "o" && (game.state === "title" || game.state === "gameover")) openPause();
});
window.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

// Gamepad menu/system dispatcher, mirroring the keydown handler's three contexts. Called once per
// frame from the main loop right after pollGamepad(). Same priority order:
//   (1) rebind capture (pad) — the first newly-pressed button becomes the binding; nothing else.
//   (2) menu open            — D-Pad / L-Stick nav, A confirm, B back, Start resume.
//   (3) normal play          — Start starts/pauses, A confirms on title/gameover (never mid-play).
function handleGamepadMenu() {
  // (1) Capturing a binding: exclusive. A pad-capture eats the next button; a key-capture ignores
  // the pad entirely (so it can't navigate the menu while the player is picking a keyboard key).
  if (game.menu.rebinding) {
    if (game.menu.rebinding.device === "pad") {
      const btn = firstPressedButton();
      if (btn !== -1) capturePadRebind(btn);
    }
    return;
  }

  const pressedStart   = gpPressed(bindings.pause);
  const pressedConfirm = gpPressed(bindings.confirm);
  const pressedBack    = gpPressed(bindings.back);
  if (pressedStart || pressedConfirm || pressedBack) { AudioSys.init(); AudioSys.resume(); } // best-effort audio unlock

  // (2) A menu is open — everything routes to menu navigation.
  if (menuActive()) {
    const nav = menuNavEdges();
    if (nav.up)    menuInput("up");
    if (nav.down)  menuInput("down");
    if (nav.left)  menuInput("left");
    if (nav.right) menuInput("right");
    if (pressedConfirm) menuInput("confirm");
    if (pressedBack)    menuInput("back");
    if (pressedStart)   menuInput("pause");   // Start fully resumes from any menu screen
    return;
  }

  // (3) Not in a menu: session/system inputs, keyed on state. The else-if chain guarantees a single
  // frame can't both open a menu AND start a game (FLAG P4-b); priority Start > B > A.
  //   Start = session toggle : title/gameover -> start a game ; playing -> open pause (resume is the
  //           menu-branch case above).
  //   B     = context-aware  : title/gameover with no menu -> open the system menu (mirrors ESC/O).
  //   A     = confirm        : title/gameover -> start a game (never mid-play, where A is fire).
  const onTitleOrOver = game.state === "title" || game.state === "gameover";
  if (pressedStart) {
    if (game.state === "playing") openPause();
    else startGame();
  } else if (pressedBack && onTitleOrOver) {
    openPause();
  } else if (pressedConfirm && onTitleOrOver) {
    startGame();
  }
}

// Directional menu nav from the gamepad: D-Pad or Left Stick, edge-detected against a latch so a
// held direction moves the cursor once (not every frame). Only consulted while a menu is open.
const menuNav = { up: false, down: false, left: false, right: false };
function menuDirState() {
  const b = gamepad.buttons, ax = gamepad.axes, dz = GP_DEADZONE;
  return {
    up:    !!b[GP.DPAD_UP]    || (ax[GP.AXIS_LY] < -dz),
    down:  !!b[GP.DPAD_DOWN]  || (ax[GP.AXIS_LY] >  dz),
    left:  !!b[GP.DPAD_LEFT]  || (ax[GP.AXIS_LX] < -dz),
    right: !!b[GP.DPAD_RIGHT] || (ax[GP.AXIS_LX] >  dz)
  };
}
function menuNavEdges() {
  const now = menuDirState();
  const edges = {
    up:    now.up    && !menuNav.up,
    down:  now.down  && !menuNav.down,
    left:  now.left  && !menuNav.left,
    right: now.right && !menuNav.right
  };
  Object.assign(menuNav, now);
  return edges;
}
// Prime the latch to the CURRENT direction state so a direction held at the moment a menu opens
// doesn't fire a phantom first move.
function resetMenuNav() { Object.assign(menuNav, menuDirState()); }
// First gamepad button that went down THIS frame (for pad rebind capture); -1 if none.
function firstPressedButton() {
  const cur = gamepad.buttons, prev = gamepad.prevButtons;
  for (let i = 0; i < cur.length; i++) if (cur[i] && !prev[i]) return i;
  return -1;
}

// ---------- Menu state machine, Options & Rebinding (F8) ----------
// The game's first nested menu: playing --(pause)--> menu:root (Continue/Options/Quit) -->
// menu:options (SFX/Music/Master sliders + Controls) --> menu:controls (rebind + Return to Defaults).
// game.paused is true iff a menu is open; game.menu.screen names the current screen (null = closed).
// Both keyboard (keydown -> handleMenuKey) and gamepad (handleGamepadMenu) funnel discrete actions
// into menuInput(action); the rendering lives near draw() (drawMenu). Gameplay stays frozen the
// whole time (update() early-returns on paused), so menu input can never move the ship.

// The root screen has two context-dependent layouts (v3.0 P4). Which one is live is decided purely by
// game.state: pausing mid-game keeps state "playing"; the system menu opened from title/gameover keeps
// state "title"/"gameover" (update() skips the sim in both, so game.paused is safe in any state).
const MENU_ROOT_PLAY = ["Continue", "Options", "Quit"];      // paused mid-game
const MENU_ROOT_SYS  = ["Options", "Achievements", "Back"];  // system menu from title/gameover
function rootItems() { return game.state === "playing" ? MENU_ROOT_PLAY : MENU_ROOT_SYS; }
// v3.4 P6: "Music Track" inserted after "Master Volume". menuOptions()/drawOptionsMenu() dispatch by
// LABEL (like menuRoot), not by hardcoded index, so adding a row here is purely additive and can't
// silently shift the Controls/Achievements/Difficulty/Back handlers out from under themselves.
const MENU_OPTIONS = ["SFX Volume", "Music Volume", "Master Volume", "Music Track", "Controls", "Achievements", "Difficulty", "Back"];
const VOL_CATS     = ["sfx", "music", "master"]; // parallel to the first three MENU_OPTIONS rows
const VOL_LABELS   = ["SFX Volume", "Music Volume", "Master Volume"]; // the slider rows, by label
const VOL_STEP     = 0.1;                         // per left/right nudge on a volume slider
const clamp01 = v => Math.max(0, Math.min(1, v));

// Difficulty options (v3.0 P5, B-4/B-5): powerup-expiry modes, persisted additively in afd_settings_v1.
// Both default to "time" so the shipped timed behaviour is unchanged until a player opts in via the
// Options -> Difficulty screen. Structured to grow with future difficulty knobs (FLAG B-4-c).
const settings = {
  shotPowerupMode: "time", // "time" | "shots"  — governs Rapid Fire + Triple Shot expiry
  magnetMode:      "time", // "time" | "pieces" — governs Magnet expiry
  musicTrack:      "retro",// "tense" | "retro" | "ambient" — selected gameplay track (v3.4 P6; retro default, FORK-9)
};

// Music-track picker (v3.4 P6). Internal values drive P7's gameplay-track selection; the labels are
// what the Options row shows. Cycled left/right like a Difficulty toggle. The three tracks are silent
// stubs this phase — the row is fully wired and persists, P7 puts sound behind the names.
const MUSIC_TRACK_VALUES = ["tense", "retro", "ambient"];
const MUSIC_TRACK_LABELS = { tense: "Tense", retro: "Retro", ambient: "Ambient" };

function menuActive() { return game.paused; } // paused <=> a pause-menu screen is open

// --- Open / close / quit ---
function openPause() {
  game.paused = true;
  game.menu.screen = "root"; game.menu.index = 0; game.menu.row = 0; game.menu.col = 0;
  game.menu.rebinding = null;
  resetMenuNav();          // don't let a direction held at pause-time fire a phantom move
  AudioSys.thrust(false);  // kill the thrust loop immediately (update() would too, next frame)
  AudioSys.lowhp(false); game.lowHpSiren = false; // same — the siren must not drone through a pause menu
  AudioSys.ui(true);
}
function closePause() {
  game.paused = false;
  game.menu.screen = null; game.menu.rebinding = null;
  game.menu.index = 0; game.menu.row = 0; game.menu.col = 0;
  AudioSys.ui(false);
}
function quitToTitle() {
  game.paused = false;
  game.menu.screen = null; game.menu.rebinding = null;
  game.state = "title";
  AudioSys.thrust(false); AudioSys.saucer(false); // stop any continuous voices
  AudioSys.lowhp(false); game.lowHpSiren = false;
  Achievements.save();  // persist lifetime progress earned during the abandoned game (F9)
  AudioSys.ui(false);
}
function gotoScreen(s, index) {
  game.menu.screen = s;
  game.menu.index = index || 0; game.menu.row = 0; game.menu.col = 0;
  AudioSys.ui(true);
}

// --- Keyboard -> menu action mapping (arrows + WASD nav; Enter/Esc/P via the binding table) ---
function handleMenuKey(k) {
  if (k === "arrowup" || k === "w") menuInput("up");
  else if (k === "arrowdown" || k === "s") menuInput("down");
  else if (k === "arrowleft" || k === "a") menuInput("left");
  else if (k === "arrowright" || k === "d") menuInput("right");
  else if (bindings.confirm.keys.includes(k)) menuInput("confirm"); // Enter
  else if (bindings.back.keys.includes(k)) menuInput("back");       // Esc
  else if (bindings.pause.keys.includes(k)) menuInput("pause");     // P
}

// --- The dispatcher: one entry point, both input methods feed it ---
function menuInput(action) {
  if (game.menu.rebinding) return; // capture mode owns all input; ignore stray nav
  switch (game.menu.screen) {
    case "root":         menuRoot(action); break;
    case "options":      menuOptions(action); break;
    case "controls":     menuControls(action); break;
    case "difficulty":   menuDifficulty(action); break;
    case "achievements": menuAchievements(action); break;
  }
}

function menuRoot(a) {
  const m = game.menu, items = rootItems(), N = items.length;
  if (a === "up")   { m.index = (m.index + N - 1) % N; AudioSys.ui(false); }
  else if (a === "down") { m.index = (m.index + 1) % N; AudioSys.ui(false); }
  else if (a === "confirm") {
    // Dispatch by label so both root layouts (play vs. system) work off one handler.
    const label = items[m.index];
    if (label === "Continue")          closePause();
    else if (label === "Options")      gotoScreen("options");
    else if (label === "Achievements") { gotoScreen("achievements"); m.achReturn = "root"; }
    else if (label === "Quit")         quitToTitle();
    else if (label === "Back")         closePause(); // system menu: close overlay -> underlying title/gameover
  }
  else if (a === "back" || a === "pause") closePause();
}

// v3.4 P6 refactor: dispatch by LABEL (menuRoot is the in-file precedent), not by hardcoded index,
// so the new "Music Track" row is additive and no index-fragile branch has to shift.
function menuOptions(a) {
