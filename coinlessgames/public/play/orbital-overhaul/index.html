  byId: {},
  // Cumulative counters that survive across games (persisted). Incremented at each event's site.
  lifetime: {
    delivered: 0, deliveryScore: 0, fullChains: 0,
    hunterKills: 0, saucerKills: 0, hitsSurvived: 0,
    perfectWaves: 0, playTime: 0, maxWave: 0,
    maxWaveNoPowerup: 0,            // MAX: best wave reached while powerupsPicked stayed 0 (No Powerups Needed)
    // v3.0 P8 new lifetime counters (SUM unless noted). smallSaucerKills is the all-time total (distinct
    // from the per-game game.stats.smallSaucerKills that Small Ball reads). The four *Events/*Games are
    // per-EVENT / once-per-game tallies for the new event achievements (FORK A-fork-1: per-event).
    smallSaucerKills: 0,           // SUM: small saucers destroyed, all-time (Sharpshooter)
    bestDeliveredGame: 0,          // MAX: most canisters delivered in one game (Salvage King)
    bestDebrisGame: 0,             // MAX: most Debris destroyed in one game (Field Sweeper)
    heavyHaulerEvents: 0,          // SUM: dock visits delivering >=12 canisters (Freight Baron, per-EVENT)
    pacifistTowEvents: 0,          // SUM: hauls whose no-fire delivery streak reached 5 (Zen Master, per-EVENT)
    glassCannonGames: 0,           // SUM: games reaching wave 5 with no Health picked (Daredevil, once/game)
    shieldSurferGames: 0           // SUM: games with 10+ shield deflects (Wave Rider, once/game)
  },
  weekKey: "",                    // "isoYear-isoWeek" of the currently-active week
  activeIds: [],                  // the 5 weekly ids active this week (a slice of WEEKLY)
  weeklyUnlocked: null,           // Set of weekly ids unlocked THIS week (reset when the week rolls over)
  lifetimeUnlocked: null,         // Set of NON-tiered lifetime ids unlocked ever
  lifetimeTiers: null,            // { tieredId: highestTierIdxReached } — the per-id tier state (v3.0 P7)
  _saveAccum: ACH_SAVE_EVERY,     // periodic-save countdown

  // --- ISO 8601 week + week-year from a Date, computed in UTC (Monday-based, no DST ambiguity). ---
  isoWeekYear(date) {
    // Move to the Thursday of this week: the ISO week-year is the year that Thursday falls in.
    const d = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
    const dayNum = (d.getUTCDay() + 6) % 7;               // Mon=0 … Sun=6
    d.setUTCDate(d.getUTCDate() - dayNum + 3);            // Thursday of the current week
    const isoYear = d.getUTCFullYear();
    const firstThu = new Date(Date.UTC(isoYear, 0, 4));   // Jan 4 is always in ISO week 1
    const firstDayNum = (firstThu.getUTCDay() + 6) % 7;
    firstThu.setUTCDate(firstThu.getUTCDate() - firstDayNum + 3); // Thursday of week 1
    const week = 1 + Math.round((d - firstThu) / (7 * 24 * 3600 * 1000));
    return { year: isoYear, week };
  },
  // Deterministic pool index (F9 formula): (isoYear*52 + isoWeek) mod pool size.
  poolIndex(year, week) { return ((year * 52 + week) % this.WEEKLY.length + this.WEEKLY.length) % this.WEEKLY.length; },
  weekKeyFor(date) { const { year, week } = this.isoWeekYear(date); return year + "-" + week; },
  // The 5 consecutive weekly achievements active for a given date, wrapping around the pool.
  selectWeekly(date) {
    const { year, week } = this.isoWeekYear(date);
    const idx = this.poolIndex(year, week);
    const out = [];
    for (let i = 0; i < ACH_WEEKLY_SHOWN; i++) out.push(this.WEEKLY[(idx + i) % this.WEEKLY.length]);
    return out;
  },
  activeWeekly() { return this.activeIds.map(id => this.byId[id]); },

  isUnlocked(ach) {
    return ach.pool === "weekly" ? this.weeklyUnlocked.has(ach.id) : this.lifetimeUnlocked.has(ach.id);
  },
  // Fraction complete (for the viewer's progress readout), clamped to [0,1].
  fraction(ach) { return Math.max(0, Math.min(1, ach.cur(game.stats, this.lifetime) / ach.goal)); },
  // "cur/goal" progress label (or a per-achievement custom formatter for e.g. play time).
  progressText(ach) {
    if (ach.text) return ach.text(game.stats, this.lifetime);
    const cur = Math.min(Math.floor(ach.cur(game.stats, this.lifetime)), ach.goal);
    return cur + "/" + ach.goal;
  },

  // --- Tiered helpers (v3.0 P7) ---
  // Highest tier index reached for a tiered id (-1 = not even bronze yet).
  tierIndex(ach) { return (ach.id in this.lifetimeTiers) ? this.lifetimeTiers[ach.id] : -1; },
  // The viewer's one-line status for a tiered row: badge + progress to the NEXT tier, e.g.
  // "Gold · 12,431 → 25,000"; "Diamond ✓ MAX" once the top tier is reached; "— · 431 → 1,000" pre-bronze.
  tierStatusText(ach) {
    const val = Math.floor(ach.cur(game.stats, this.lifetime));
    const idx = this.tierIndex(ach);
    const badge = idx < 0 ? "—" : TIER_NAMES[idx];
    if (idx >= ach.tiers.length - 1) return badge + " ✓ MAX";
    return badge + " · " + fmtCommas(val) + " → " + fmtCommas(ach.tiers[idx + 1]);
  },

  // Check every currently-relevant achievement; unlock any whose predicate has newly become true.
  // Safe to call every frame — already-unlocked ones short-circuit.
  evaluate() {
    const s = game.stats, l = this.lifetime;
    // Non-tiered single-goal path (weekly + non-tiered lifetime): unlock once at cur >= goal.
    const checkSingle = (ach, set) => {
      if (set.has(ach.id)) return;
      if (ach.cur(s, l) >= ach.goal) { set.add(ach.id); this.onUnlock(ach); }
    };
    for (const ach of this.activeWeekly()) checkSingle(ach, this.weeklyUnlocked);
    for (const ach of this.LIFETIME) {
      if (!ach.tiers) { checkSingle(ach, this.lifetimeUnlocked); continue; }
      // Tiered path: unlock EVERY newly-crossed tier this pass, ascending (a big jump can cross
      // several at once -> several toasts, bronze-first). Tiers ascend, so the loop stops at the
      // first not-yet-met tier. Persist the highest tier index reached per id.
      const val = ach.cur(s, l);
      let reached = this.tierIndex(ach);
      for (let ti = reached + 1; ti < ach.tiers.length && val >= ach.tiers[ti]; ti++) {
        this.lifetimeTiers[ach.id] = ti;
        this.onUnlock(ach, ti);
      }
    }
  },
  // Silently bring the tier state + non-tiered lifetime unlocks up to what the loaded counters
  // already justify — NO toasts. Called once after load so a returning player's badges are correct
  // without a fanfare storm for progress earned in past sessions; evaluate() then only toasts NEW
  // crossings this session. Idempotent and monotonic (only ever advances a tier, never lowers one).
  deriveLifetime() {
    const s = game.stats, l = this.lifetime;
    for (const ach of this.LIFETIME) {
      if (ach.tiers) {
        const val = ach.cur(s, l);
        let idx = this.tierIndex(ach);
        for (let ti = idx + 1; ti < ach.tiers.length && val >= ach.tiers[ti]; ti++) idx = ti;
        if (idx >= 0) this.lifetimeTiers[ach.id] = idx;
      } else if (ach.cur(s, l) >= ach.goal) {
        this.lifetimeUnlocked.add(ach.id);
      }
    }
  },
  // Unlock notification. A tiered unlock passes its tier index so the toast names the tier
  // ("Recycling Magnate — Gold"); a single-goal unlock omits it. Observe-only: never mutates state.
  onUnlock(ach, tierIdx) {
    const label = (tierIdx === undefined) ? ach.name : ach.name + " — " + TIER_NAMES[tierIdx];
    game.toasts.push({ name: label, life: ACH_TOAST_TIME });
    AudioSys.achievement();
    this.save(); // persist the moment something is earned, so an unlock is never lost
  },

  // Accumulate play time and periodically flush lifetime progress (bounded storage writes).
  tick(dt) {
    this.lifetime.playTime += dt;
    this._saveAccum -= dt;
    if (this._saveAccum <= 0) { this._saveAccum = ACH_SAVE_EVERY; this.save(); }
  },

  // --- Persistence (own key; same guarded pattern as settings — never crash on storage failure). ---
  save() {
    const ls = storageOK(); if (!ls) return;
    try {
      const data = {
        lifetime: { ...this.lifetime },
        lifetimeTiers: { ...this.lifetimeTiers },        // { tieredId: highestTierIdx }
        lifetimeUnlocked: [...this.lifetimeUnlocked],     // non-tiered lifetime ids
        weekly: { key: this.weekKey, unlocked: [...this.weeklyUnlocked] }
      };
      ls.setItem(this.STORAGE_KEY, JSON.stringify(data));
    } catch (e) { /* quota / privacy mode / disabled — ignore */ }
  },
  // Copy persisted lifetime COUNTERS over the defaults (only known numeric keys — unknown keys and
  // non-numbers ignored). Shared by the v2 load and the v1 migration; both carry raw counters intact.
  loadCounters(data) {
    if (data && data.lifetime) for (const k in this.lifetime)
      if (typeof data.lifetime[k] === "number") this.lifetime[k] = data.lifetime[k];
  },
  // Initialise at startup (or, in tests, with an explicit `now`). Loads persisted state, then sets
  // the active weekly slice for the current calendar week; if the stored week differs from the
  // current one, weekly unlocks reset (fresh challenges) while lifetime progress is retained.
  init(now = new Date()) {
    for (const a of this.WEEKLY)   { a.pool = "weekly";   this.byId[a.id] = a; }
    for (const a of this.LIFETIME) { a.pool = "lifetime"; this.byId[a.id] = a; }
    this.weekKey = this.weekKeyFor(now);
    this.activeIds = this.selectWeekly(now).map(a => a.id);
    this.lifetimeUnlocked = new Set();
    this.weeklyUnlocked = new Set();
    this.lifetimeTiers = {};
    const ls = storageOK();
    if (ls) {
      try {
        const raw = ls.getItem(this.STORAGE_KEY);
        if (raw) {
          // --- v2 load: counters + tier state + non-tiered unlocks + (same-week) weekly unlocks ---
          const data = JSON.parse(raw);
          this.loadCounters(data);
          if (data.lifetimeTiers && typeof data.lifetimeTiers === "object")
            for (const id in data.lifetimeTiers) {
              const a = this.byId[id];
              if (a && a.tiers && typeof data.lifetimeTiers[id] === "number")
                // clamp to a valid tier index in case a ladder shrank between builds
                this.lifetimeTiers[id] = Math.max(0, Math.min(a.tiers.length - 1, data.lifetimeTiers[id]));
            }
          if (Array.isArray(data.lifetimeUnlocked))
            for (const id of data.lifetimeUnlocked) if (this.byId[id]) this.lifetimeUnlocked.add(id);
          // Weekly unlocks only carry over within the same calendar week.
          if (data.weekly && data.weekly.key === this.weekKey && Array.isArray(data.weekly.unlocked))
            for (const id of data.weekly.unlocked) if (this.byId[id]) this.weeklyUnlocked.add(id);
        } else {
          // --- Migration (FLAG A-2 / A-2-a): no v2 save yet. If an old v1 save exists, keep its raw
          // lifetime COUNTERS and let tiers + non-tiered unlocks re-derive below. The old v1 unlock
          // SETS (flat lifetime/weekly ids) are intentionally ignored — badges recompute from the
          // counters; the returning player's current-week weekly unlocks may reset once. ---
          const legacy = ls.getItem(this.LEGACY_KEY);
          if (legacy) this.loadCounters(JSON.parse(legacy));
        }
      } catch (e) { /* corrupt / unreadable — start fresh, don't crash */ }
    }
    // Seed tier badges + non-tiered lifetime unlocks silently from whatever counters loaded, so a
    // returning/migrated player sees correct badges immediately and evaluate() only toasts NEW gains.
    this.deriveLifetime();
  }
};

// ---------- High Scores (v3.6 P6) ----------
// Local top-10 table, its own localStorage key. The two other keys — settings' STORAGE_KEY
// ("afd_settings_v1") and Achievements.STORAGE_KEY ("afd_achievements_v2") — are FROZEN and this
// system never reads or writes either; it reuses only the shared guarded storageOK() helper. Each
// record is a WIRE shape a future remote leaderboard can accept verbatim, no migration: `id` is a
// stable client-generated dedupe key, `v` versions the record independently of the store's own `v`,
// and a `playerId`/`name` field is purely additive whenever login lands. Add fields later; never
// rename or repurpose one.
const HighScores = {
  STORAGE_KEY: "afd_scores_v1",
  entries: [],

  // Unique id for a fresh record — the future sync dedupe key. crypto.randomUUID isn't guaranteed
  // (older browsers, non-secure origins), so fall back to a random hex string.
  makeId() {
    if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
    return Math.random().toString(16).slice(2) + Math.random().toString(16).slice(2);
  },
  // Would `score` earn a table slot? entries is kept sorted score-desc and capped at SCORES_MAX, so
  // entries[SCORES_MAX-1] is always the current cutoff once the table is full.
  qualifies(score) {
    if (score <= 0) return false;
    return this.entries.length < SCORES_MAX || score > this.entries[SCORES_MAX - 1].score;
  },
  // Build + insert the wire-shape record for a just-committed run, then persist. Returns the record
  // so the caller can remember its id (the gameover table's fresh-entry highlight).
  add({ initials, score, wave, delivered }) {
    const rec = { v: 1, id: this.makeId(), initials, score, wave, delivered, ts: Date.now(), build: GAME_VERSION };
    this.entries.push(rec);
    this.entries.sort((a, b) => b.score - a.score);
    this.entries.length = Math.min(this.entries.length, SCORES_MAX);
    this.save();
    return rec;
  },

  // --- Persistence (own key; same guarded pattern as Settings/Achievements — never crash on storage
  // failure). ---
  save() {
    const ls = storageOK(); if (!ls) return;
    try { ls.setItem(this.STORAGE_KEY, JSON.stringify({ v: 1, entries: this.entries })); }
    catch (e) { /* quota / privacy mode / disabled — ignore */ }
  },
  load() {
    const ls = storageOK(); if (!ls) return;
    try {
      const raw = ls.getItem(this.STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (data && Array.isArray(data.entries)) {
        this.entries = data.entries.filter(r => r && typeof r.score === "number" && typeof r.initials === "string");
        this.entries.sort((a, b) => b.score - a.score);
        this.entries.length = Math.min(this.entries.length, SCORES_MAX);
      }
    } catch (e) { /* corrupt / unreadable — start fresh, don't crash */ }
  }
};
HighScores.load();

// Shared dispatcher for BOTH input paths (keyboard's normal branch + gamepad's edge-detected nav)
// driving the initials entry live on "gameover" (game.entry). Deliberately not routed through
// menuInput/menuActive — this isn't a paused menu screen, the field keeps rendering behind it.
function entryInput(action) {
  const e = game.entry;
  if (!e) return;
  if (action === "left")       { e.idx = (e.idx + 2) % 3; AudioSys.ui(false); }
  else if (action === "right") { e.idx = (e.idx + 1) % 3; AudioSys.ui(false); }
  else if (action === "up")    { e.initials[e.idx] = (e.initials[e.idx] + 1) % SCORES_CHARSET.length; AudioSys.ui(false); }
  else if (action === "down")  { e.initials[e.idx] = (e.initials[e.idx] + SCORES_CHARSET.length - 1) % SCORES_CHARSET.length; AudioSys.ui(false); }
  else if (action === "confirm") commitEntry();
}
// Turn the entry's charset indices into the 3-letter record and hand it to HighScores, then clear
// game.entry so the gameover screen falls through to the (now highlighted) table.
function commitEntry() {
  const e = game.entry;
  const initials = e.initials.map(i => SCORES_CHARSET[i]).join("");
  const rec = HighScores.add({ initials, score: game.score, wave: game.wave, delivered: game.stats.delivered });
  game.lastScoreId = rec.id;
  game.entry = null;
  AudioSys.ui(true);
}

// Count of the four drop-powerup types used this game (Powered Up).
function powerTypesUsed(s) {
  return (s.powerUsed.rapid ? 1 : 0) + (s.powerUsed.triple ? 1 : 0) +
         (s.powerUsed.magnet ? 1 : 0) + (s.powerUsed.engine ? 1 : 0);
}

// Apply an unshielded hit: subtract HP, knock the ship away from the hazard, and
// open a hit-stun i-frame window. Self-guarding — shielded, already-stunned, or dead
// hits are ignored, so only one hit lands per stun window even with several overlapping
// hazards in a frame. Lethal damage routes to killShip (game over). Returns whether
// damage was actually applied.
function damageShip(amount, srcX, srcY) {
  const s = game.ship;
  // CS012 P5 auto-shield: a reactive last-resort save at critical hull. When enabled and the hull is at/below
  // the low-health threshold, an incoming hit spends SHIELD_HIT_COST energy to raise the shield and eat the hit
  // for 0 HP instead of taking damage. The knockback+stun below are the SAME as a real hit — the i-frame is the
  // rate-limiter that caps this to ~one save per HIT_STUN_DURATION (same-frame repeats hit the shieldOn early-return
  // just below), and energy recharge (0.12/s) < cost (0.22/save) means it self-exhausts after ~4-5 saves. Guarded by
  // the same conditions the early-return checks so it never fires on a dead/shielded/i-framed ship.
  if (settings.autoShield && !s.dead && !s.shieldOn && s.invuln <= 0 && s.hp <= LOW_HP_THRESHOLD
      && s.energy >= SHIELD_HIT_COST) {
    s.energy = Math.max(0, s.energy - SHIELD_HIT_COST);
    // Knockback away from the hazard — copied verbatim from the real-hit body below so an auto-save shoves clear identically.
    const [kdx, kdy] = shortDelta(srcX, srcY, s.x, s.y); // vector from hazard to ship = away
    const kd = Math.hypot(kdx, kdy);
    const ka = kd > 0.001 ? Math.atan2(kdy, kdx) : rand(0, TAU);
    s.vx = Math.cos(ka) * KNOCKBACK_SPEED;
    s.vy = Math.sin(ka) * KNOCKBACK_SPEED;
    s.invuln = HIT_STUN_DURATION;
    s.autoShieldRegenLock = AUTO_SHIELD_REGEN_PAUSE;
    s.shieldOn = true;
    // Penalty BYPASSES addScore by design (FLAG-4e / CLAUDE.md scoring exception): auto-save must NOT touch
    // game.nextRepair, so it can never trip the HP-repair milestone. Clamp the score at 0.
    game.score = Math.max(0, game.score - AUTO_SHIELD_SCORE_PENALTY);
    game.floaters.push(new FloatText("-" + AUTO_SHIELD_SCORE_PENALTY, s.x, s.y, COLOR.lowhp));
    return false; // 0 HP dealt — same contract as the shielded early-return
  }
  if (s.dead || s.shieldOn || s.invuln > 0) return false;
  s.hp -= amount;
  if (s.hp <= 0) {
    s.hp = 0;
    killShip();
    return true;
  }
  // Knockback: shove directly away from the hazard so the ship physically separates
  // instead of sitting inside it racking up damage. Set (not add) velocity so a hit
  // always pushes the ship clear regardless of its current momentum.
  const [dx, dy] = shortDelta(srcX, srcY, s.x, s.y); // vector from hazard to ship = away
  const d = Math.hypot(dx, dy);
  const a = d > 0.001 ? Math.atan2(dy, dx) : rand(0, TAU);
  s.vx = Math.cos(a) * KNOCKBACK_SPEED;
  s.vy = Math.sin(a) * KNOCKBACK_SPEED;
  s.invuln = HIT_STUN_DURATION;
  // Achievement stats (F9): a survived hit. Per-wave damage gates the perfect-wave achievements
  // (No Scratches / Perfect Wave); cumulative survived hits -> Iron Hull; dropping below 50% HP
  // ends "Untouchable"'s eligibility for this game.
  game.stats.dmgThisWave++;
  Achievements.lifetime.hitsSurvived++;
  if (s.hp < SHIP_MAX_HP * 0.5) game.stats.everBelowHalf = true;
  for (let i = 0; i < 6; i++) game.particles.push(new Particle(s.x, s.y, "#ff9060"));
  AudioSys.hit();
  // Scoop decays by DAMAGE, not time (v3.3 P3): every SCOOP_HITS_PER_LEVEL non-lethal hits costs one
  // scoop level. scoopHits is a running tally — it is NOT reset by a scoop pickup (FORK-3: no), only
  // when a level is actually lost, and it doesn't accumulate at level 0 (hits there are harmless).
  // A shielded / i-frame hit early-returned above, so it never reaches here.
  if (game.scoopLevel > 0) {
    game.scoopHits++;
    if (game.scoopHits >= SCOOP_HITS_PER_LEVEL) {
      game.scoopLevel = Math.max(0, game.scoopLevel - 1);
      game.scoopHits = 0;
      game.floaters.push(new FloatText("SCOOP -1", s.x, s.y - 22, POWERUP_COLOR.scoop));
      AudioSys.scooploss();
      VoiceSys.say("expire_scoop"); // CS010 P9: scoop decays by DAMAGE, not time — Dan reports it here
    }
  }
  return true;
}

function killShip() { // hull destroyed (0 HP): a true, permanent game over — no respawn (F2)
  if (game.ship.dead) return;
  game.ship.dead = true;
  AudioSys.thrust(false);
  AudioSys.lowhp(false); game.lowHpSiren = false;
  game.hpReliefFlash = 0; // CS010 P3: death is not relief — never arm/leave a "you're okay now" exhale on the frame the ship dies
  boom(game.ship.x, game.ship.y, 3, COLOR.ship);
  scatterChain();
  // v3.6 P5: enter the "dying" spectacle instead of freezing straight to "gameover" — updateDeath()
  // keeps the field alive for DEATH_DURATION, then flips state to "gameover". Only this state
  // assignment changed; the boom/scatter/audio teardowns above and the achievement flush below all
  // stay HERE so achievement timing is byte-identical to before.
  game.state = "dying";
  game.deathT = DEATH_DURATION;
  game.shake = DEATH_SHAKE_INIT;
  AudioSys.saucer(false);
  // Achievements (F9): a game just ended — flag it so end-of-game checks (Waste Not) can fire,
  // run a final evaluation, and flush lifetime progress to storage.
  game.stats.gameEnded = true;
  // Daredevil / Wave Rider (lifetime, once-per-game — FLAG A-12-a: these conditions are inherently
  // once-per-game, so per-event ≡ per-game). Read the same per-game state the weekly Glass Cannon /
  // Shield Surfer read, from their monotonic counters, so this can only tally a genuine event.
  if (game.wave >= 5 && game.stats.healthPicked === 0) Achievements.lifetime.glassCannonGames++;
  if (game.stats.deflects >= 10) Achievements.lifetime.shieldSurferGames++;
  Achievements.evaluate();
  Achievements.save();
}

// Shield deflection: bounce object away from ship, cost energy
function shieldDeflect(obj) {
  const a = angleTo(game.ship, obj);
  const sp = Math.hypot(obj.vx, obj.vy) || 80;
  obj.vx = Math.cos(a) * sp * 1.1;
  obj.vy = Math.sin(a) * sp * 1.1;
  if (obj.heading !== undefined) obj.heading = a;
  // push out of overlap
  obj.x = game.ship.x + Math.cos(a) * (SHIELD_RADIUS + obj.radius + 2);
  obj.y = game.ship.y + Math.sin(a) * (SHIELD_RADIUS + obj.radius + 2);
  game.ship.energy = Math.max(0, game.ship.energy - SHIELD_HIT_COST);
  game.stats.deflects++;   // Shield Surfer (F9): a hazard bounced off the shield
  AudioSys.shieldPing();
}

// ---------- Tow chain physics ----------
// Verlet nodes with position-based distance constraints, wrap-aware.
// The ship is the (mostly) kinematic head; nodes trail serpentine behind.
// A taut first link tugs real momentum back into the ship.

function chainAnchor() { // hitch point just behind the ship
  return {
    x: game.ship.x - Math.cos(game.ship.angle) * 12,
    y: game.ship.y - Math.sin(game.ship.angle) * 12
  };
}

// Total towed mass = Sum of node.mass (F5). All Debris-sourced canisters are mass 1.0,
// so for now this equals game.chain.length; lighter (Hunter-sourced) scrap will tow
// more easily once it exists. Drives the thrust/top-speed penalties and the momentum tug.
function chainMass() {
  const m = game.chain.reduce((sum, n) => sum + n.mass, 0);
  // Engine powerup (F6) temporarily lightens the EFFECTIVE towed mass. chainMass() is the single
  // quantity feeding thrustMul/maxSp (Ship.update) and the momentum-tug massFactor (updateChain),
  // so halving it here eases all three at once — "easier to maneuver even when towing garbage."
  return powerActive("engine") ? m * ENGINE_MASS_MULT : m;
}

// Ship turn rate (CS010 §10b + §3): the ONE place both Ship.update turn sites read, so they can
// never diverge. Folds in the player's rotation-speed preference (settings.shipTurnScale) AND an
// optional towed-mass turn penalty (CARGO_TURN). At the shipped CARGO_TURN = 0 this is exactly
// SHIP_TURN * scale — cargo does not affect rotation, byte-identical to pre-CS010 turn × the slider.
// CARGO_TURN > 0 makes a heavy chain resist turning (the proposed "inertia" fix; see the constant).
function shipTurnRate() {
  return SHIP_TURN * settings.shipTurnScale / (1 + chainMass() * CARGO_TURN);
}

function wrapNode(n) { // wrap verlet nodes; shift prev pos too so velocity survives
  if (n.x < -60) { n.x += WORLD_W; n.px += WORLD_W; }
  if (n.x > WORLD_W + 60) { n.x -= WORLD_W; n.px -= WORLD_W; }
  if (n.y < -60) { n.y += WORLD_H; n.py += WORLD_H; }
  if (n.y > WORLD_H + 60) { n.y -= WORLD_H; n.py -= WORLD_H; }
}

// Garbage coalescence pass (v3.1 P3). Runs once per frame from update(), AFTER the garbage
// pickup/magnet loop and BEFORE updateChain(dt). O(n²) over ACTIVE pieces (cheap at realistic counts
// — a full lineage tops out ~39 free canisters); every measurement is wrap-aware (dist2/shortDelta),
// and a piece already marked dead this pass is skipped. Both the attraction and the merge require
// BOTH pieces active (coalesceDelay <= 0), so a fresh burst disperses for 1 s before it can clump.
// FORK-1: coalesced Hunters are spawned independent of game.hunterTimer, so neglect can breed several
// concurrent lineages. Relies on the existing end-of-frame dead-filter for compaction (no new filter).
function coalesceGarbage(dt) {
  const gs = game.garbage;
  for (let i = 0; i < gs.length; i++) {
    const a = gs[i];
    if (a.dead || a.coalesceDelay > 0) continue;          // survivor must be alive AND active
    for (let j = i + 1; j < gs.length; j++) {
      const b = gs[j];
      if (b.dead || b.coalesceDelay > 0) continue;        // both pieces must be active
      const d2 = dist2(a, b);
      if (d2 >= GARBAGE_MAGNET_RANGE * GARBAGE_MAGNET_RANGE) continue;
      const [dx, dy] = shortDelta(a.x, a.y, b.x, b.y);     // shortest vector a -> b (wrap-aware)
      if (d2 < GARBAGE_MERGE_DIST * GARBAGE_MERGE_DIST) {
        // Merge (v3.2 P1, reverses FORK-2): survivor's velocity is the MOMENTUM sum (with PRE-merge
        // masses), its `mass` SUMS, its `pieces` counter adds, and its `radius` derives from pieces.
        // Momentum-conserving (not the old literal vector sum) so a heavy clump barely speeds up when
        // it eats a fast light piece — a wad of junk stays sluggish. (v3.2 P3: garbage no longer decays,
        // so a merge is simply a merge — no Waste-Not bookkeeping here; that stat now tracks coalescence.)
        const ma = a.mass, mb = b.mass, mt = ma + mb;
        a.vx = (ma * a.vx + mb * b.vx) / mt;
        a.vy = (ma * a.vy + mb * b.vy) / mt;
        a.mass = mt;
        a.pieces += b.pieces;
        a.radius = 7 * Math.sqrt(a.pieces);
        b.dead = true;
        if (a.pieces >= HUNTER_COALESCE_COUNT) {
          // Clump collapses into a new large Hunter core. Independent of game.hunterTimer (FORK-1).
          // v3.3 P4 (9b, FORK-5): no bornOfScrap tag anymore — this coalesced core drops garbage like
          // any other Hunter. hunterCoalesced still counts the transform (it never read the flag) so the
          // "Waste Not" achievement is untouched.
          a.dead = true;
          game.hunters.push(new HunterSatellite(a.x, a.y, 3));
          game.stats.hunterCoalesced++;
          AudioSys.hunterborn();
          break;   // survivor is gone — stop pairing it against the rest
        }
        continue;  // survivor lives on; keep scanning further pieces against it this pass
      }
      // Otherwise: mutual attraction, now MASS-WEIGHTED (v3.2 P1) and gravity-like — each accelerates
      // toward the other in proportion to the OTHER's mass, so a heavy clump is a slow anchor that
      // loose singles fall into. Momentum-conserving (m_a·acc_a == m_b·acc_b). Reduces EXACTLY to the
      // shipped symmetric pull when both masses are 1.0, so GARBAGE_MAGNET_PULL needs no retune.
      const d = Math.sqrt(d2) || 0.0001;
      const ux = (dx / d) * GARBAGE_MAGNET_PULL * dt, uy = (dy / d) * GARBAGE_MAGNET_PULL * dt;
      a.vx += ux * b.mass; a.vy += uy * b.mass;
      b.vx -= ux * a.mass; b.vy -= uy * a.mass;
      if (GARBAGE_CLUMP_MAXSPD !== Infinity) { // off-by-default playtest clamp
        clampGarbageSpeed(a); clampGarbageSpeed(b);
      }
    }
  }
}

// Clamp a coalescing piece's speed to GARBAGE_CLUMP_MAXSPD (only called when the clamp is enabled).
function clampGarbageSpeed(g) {
  const s = Math.hypot(g.vx, g.vy);
  if (s > GARBAGE_CLUMP_MAXSPD) { g.vx = g.vx / s * GARBAGE_CLUMP_MAXSPD; g.vy = g.vy / s * GARBAGE_CLUMP_MAXSPD; }
}

function updateChain(dt) {
  const chain = game.chain;
  if (chain.length === 0 || game.ship.dead) return;

  // 1. Integrate: verlet inertia with heavy damping (space trash is sluggish)
  const damp = Math.pow(0.18, dt);
  for (const n of chain) {
    const vx = (n.x - n.px) * damp;
    const vy = (n.y - n.py) * damp;
    n.px = n.x; n.py = n.y;
    n.x += vx; n.y += vy;
    n.spin += n.spinRate * dt;
  }

  // 2. Momentum transfer: pre-constraint stretch of the first link measures
  //    how hard the cargo resisted the ship this frame; tug the ship back.
  const a0 = chainAnchor();
  const [tdx, tdy] = shortDelta(a0.x, a0.y, chain[0].x, chain[0].y);
  const td = Math.hypot(tdx, tdy);
  if (td > CHAIN_LINK) {
    const massFactor = Math.min(1.4, chainMass() * CARGO_MASS);
    const f = CHAIN_TUG * (td - CHAIN_LINK) * massFactor;
    game.ship.vx += (tdx / td) * f * dt;
    game.ship.vy += (tdy / td) * f * dt;
  }

  // 3. Relax distance constraints a few passes so the chain follows serpentine
  //    (CHAIN_ITER passes — bumped 3→4 for the longer B-8 chains; §3.4 stability envelope)
  for (let iter = 0; iter < CHAIN_ITER; iter++) {
    const a = chainAnchor();
    for (let i = 0; i < chain.length; i++) {
      const leader = i === 0 ? a : chain[i - 1];
      const n = chain[i];
      const [dx, dy] = shortDelta(leader.x, leader.y, n.x, n.y);
      const d = Math.hypot(dx, dy) || 0.0001;
      const diff = (d - CHAIN_LINK) / d;
      if (i === 0) {          // anchor is kinematic; node takes full correction
        n.x -= dx * diff; n.y -= dy * diff;
      } else {                // equal-mass nodes share the correction
        n.x -= dx * diff * 0.5; n.y -= dy * diff * 0.5;
        leader.x += dx * diff * 0.5; leader.y += dy * diff * 0.5;
      }
    }
  }
  chain.forEach(wrapNode);
}

function breakChain(i) { // node i destroyed; everything aft breaks loose
  const chain = game.chain;
  const hit = chain[i];
  boom(hit.x, hit.y, 1, COLOR.garbage);
  for (let j = i + 1; j < chain.length; j++) {
    game.garbage.push(Garbage.fromNode(chain[j]));
  }
  chain.length = i;
  game.deliveryCount = 0;
  VoiceSys.say("chain_broken"); // CS011 P5: choke point only — scatterChain() (ship death) stays silent
}

function scatterChain() { // ship destroyed: whole load breaks loose
  for (const n of game.chain) game.garbage.push(Garbage.fromNode(n));
  game.chain.length = 0;
  game.deliveryCount = 0;
}

function drawLink(x1, y1, x2, y2) {
  const [dx, dy] = shortDelta(x1, y1, x2, y2);
  if (Math.hypot(dx, dy) > 120) return; // don't streak across the wrap seam
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x1 + dx, y1 + dy);
  ctx.globalAlpha = 0.7;
  glowStroke(COLOR.chain, 1.2, 6);
  ctx.globalAlpha = 1;
}

function drawChain() {
  const chain = game.chain;
  if (!chain.length) return;
  // Chain nodes trail the ship but can straddle the world seam; map each point to
  // its nearest image relative to the camera so links/canisters render next to the ship.
  const cam = game.camera;
  const img = p => ({
    x: p.x + wrapOffset(p.x, cam.x, WORLD_W),
    y: p.y + wrapOffset(p.y, cam.y, WORLD_H)
  });
  if (!game.ship.dead) {
    const a = img(chainAnchor());
    const c0 = img(chain[0]);
    drawLink(a.x, a.y, c0.x, c0.y);
  }
  for (let i = 1; i < chain.length; i++) {
    const p = img(chain[i - 1]), q = img(chain[i]);
    drawLink(p.x, p.y, q.x, q.y);
  }
  for (const n of chain) { const p = img(n); drawCanister(p.x, p.y, n.spin, 1,
    n.mass < 1 ? COLOR.garbageLight : COLOR.garbage); }
}

// ---------- Update ----------
// v3.6 P5: the death spectacle. Runs in place of the normal sim while game.state === "dying", so the
// field doesn't freeze under the GAME OVER text. It keeps the world moving — but takes NO ship input,
// spawns nothing on the timers, runs no pickup pass and no ship/chain collisions. An expanding
// shockwave ring (radius = elapsed × DEATH_SHOCKWAVE_SPEED) is the detonation front: any live
// debris/Hunter it has reached this frame detonates via the real destroy helpers with awardScore=false
// (nearest-first falls out, since nearer bodies are reached first). awardScore=false means no score
// and — post the destroyHunter gating fix — no achievement counters move; achievements were already
// evaluated once, at killShip. At deathT<=0 the spectacle ends and state becomes "gameover" (Phase 6
// hangs the high-score flow off that seam). The tow chain isn't advanced here: killShip's scatterChain()
// already emptied it into free garbage, which IS advanced below.
function updateDeath(dt) {
  AudioSys.thrust(false);   // the ship is gone — make sure a lingering thrust voice never drones on

  // World stays alive: advance every free-moving body and effect (but not the dead ship).
  game.debris.forEach(a => a.update(dt));
  game.hunters.forEach(h => h.update(dt));
  game.saucers.forEach(s => s.update(dt));
  game.garbage.forEach(g => g.update(dt));
  game.particles.forEach(p => p.update(dt));
  game.floaters.forEach(f => f.update(dt));
  game.powerups.forEach(p => p.update(dt));

  // Camera holds on the death point (the dead ship no longer moves).
  game.camera.x = game.ship.x;
  game.camera.y = game.ship.y;

  // Screen shake decays linearly to 0.
  game.shake = Math.max(0, game.shake - DEATH_SHAKE_DECAY * dt);

  // Expanding shockwave = the detonation front. Reuse the real destroy helpers (awardScore=false): the
  // explosion / garbage / split is the spectacle and costs no new code. Wrap-aware distance (dist2).
  const ringR = (DEATH_DURATION - game.deathT) * DEATH_SHOCKWAVE_SPEED;
  const ringR2 = ringR * ringR;
  const center = game.ship;   // death point == the dead ship's frozen position
  for (const a of game.debris)  if (!a.dead && dist2(center, a) <= ringR2) destroyDebris(a, false);
  for (const h of game.hunters) if (!h.dead && dist2(center, h) <= ringR2) destroyHunter(h, false);

  // Cleanup — mirror update()'s filter pass so detonated bodies leave the field. No wave-clear, no
  // heartbeat, no collision passes: those don't run during the death.
  game.debris    = game.debris.filter(a => !a.dead);
  game.hunters   = game.hunters.filter(h => !h.dead);
  game.saucers   = game.saucers.filter(s => !s.dead);
  game.garbage   = game.garbage.filter(g => !g.dead);
  game.particles = game.particles.filter(p => !p.dead);
  game.floaters  = game.floaters.filter(f => !f.dead);
  game.powerups  = game.powerups.filter(p => !p.dead);

  // Advance the death clock; hand off to the frozen GAME OVER screen when it runs out.
  game.deathT -= dt;
  if (game.deathT <= 0) {
    game.deathT = 0;
    game.state = "gameover";
    // v3.6 P6: the "dying" -> "gameover" seam. Arm initials entry iff the run earned a top-10 slot;
    // otherwise the gameover screen goes straight to the (unhighlighted) table.
    game.lastScoreId = null;
    game.entry = HighScores.qualifies(game.score) ? { initials: [0, 0, 0], idx: 0 } : null;
    if (game.entry) resetMenuNav(); // a stick held through the spectacle mustn't fire a phantom first move
  }
}

function update(dt) {
  // v3.6 P5: the death spectacle runs its own reduced sim. This branch sits BEFORE the general
  // early-return so "dying" isn't swallowed by the `state !== "playing"` gate below.
  if (game.state === "dying" && !game.paused) {
    updateDeath(dt);
    return;
  }
  if (game.state !== "playing" || game.paused) {
    AudioSys.thrust(false);
    return;
  }

  game.ship.update(dt);
  // CS009 P1: eased HUD hull fraction — chases the true value so a hit/heal reads as a drain/fill,
  // not a jump. Lives HERE, not in drawHUD(), because drawHUD() is gated by Capture.hudVisible: an
  // ease running only while drawn would freeze while the HUD is toggled off with H and then snap on
  // re-show. Math.pow(HUD_EASE, dt) is the shipped MAGNET_DAMP idiom — frame-rate independent.
  game.hudHull += (game.ship.hp / SHIP_MAX_HP - game.hudHull) * (1 - Math.pow(HUD_EASE, dt));
  // CS009 P3: linear decay of the CARGO ring's cap-up flash — lives here (not drawHUD()) for the same
  // Capture.hudVisible reason as hudHull above: a decay that only ran while drawn would freeze while
  // hidden and pop back on re-show.
  if (game.cargoFlash > 0) game.cargoFlash = Math.max(0, game.cargoFlash - dt);
  // CS010 P3: linear decay of the low-health relief "exhale" — lives HERE (not drawHUD()) for the same
  // Capture.hudVisible reason as hudHull/cargoFlash above: a decay that only ran while drawn would freeze
  // while the HUD is hidden with H and pop back on re-show.
  if (game.hpReliefFlash > 0) game.hpReliefFlash = Math.max(0, game.hpReliefFlash - dt);
  // Camera tracks the ship's world position every frame (world wraps, so no clamping)
  game.camera.x = game.ship.x;
  game.camera.y = game.ship.y;
  // Low-health alarm (v3.4 P5; CS010 P3): the STATE is a pure per-frame read (no stored flag), but the
  // AUDIO voice is edge-detected off game.lowHpSiren so lowhp(true/false) fires exactly once per
  // transition, not every frame. Driven from this one site; killShip/quitToTitle/openPause each tear the
  // voice down directly since they leave "playing" without passing back through here.
  const lowHp = game.ship.hp <= LOW_HP_THRESHOLD && !game.ship.dead;
  if (lowHp && !game.lowHpSiren) {
    AudioSys.lowhp(true); game.lowHpSiren = true;
    // CS010 P9: Dan announces the crisis on the GENUINE rising edge only. The SIREN latch re-arms on
    // every unpause (openPause/quitToTitle tear it down), so gating the voice on lowHpVoiced — which
    // those menus DON'T touch — is what stops Dan re-announcing "Hull integrity is critical." per unpause.
    if (!game.lowHpVoiced) { VoiceSys.say("health_low"); game.lowHpVoiced = true; }
  }
  else if (!lowHp && game.lowHpSiren) {
    // Falling edge — disengage. Reset the pulse phase, then arm the relief exhale ONLY IF THE SHIP IS
    // ALIVE (CS010 P3, §5, FLAG-CS010-a). THE GUARD IS LOAD-BEARING: `lowHp` also goes false when the
    // ship DIES (the `!dead` term), so this branch is the moment of death too — without `!ship.dead` the
    // hull ring would play a cheerful "you're okay now" pop at the instant the player is killed. (Today
    // killShip zeroes game.lowHpSiren directly and the dying state early-returns before this site, so the
    // edge isn't even reached at death — but that is incidental; guard explicitly.)
    AudioSys.lowhp(false); game.lowHpSiren = false;
    game.lowHpPhase = 0;
    if (!game.ship.dead) {
      game.hpReliefFlash = LOWHP_RELIEF_FLASH;   // relief, not death
      // CS010 P9: Dan's relief line is ADDITIVE to P3's visual exhale (both carry the falling edge —
      // parity with the four onset tells). Guarded on !ship.dead like the flash: death isn't relief.
      VoiceSys.say("health_relief");
    }
    game.lowHpVoiced = false;   // CS010 P9: the crisis is over — re-arm Dan for the NEXT low-HP episode
  }
  // CS010 P9: hull-FULL voice. Edge-detected on hp >= max (matching the HUD's hpMax, not === ) so it
  // fires ONCE per heal-to-full and never every frame while healthy — and, living here in update(),
  // catches healing from ANY source (Health powerup AND addScore()'s repair milestone) for free. The
  // latch starts true at spawn (see startGame) so a fresh full-HP run doesn't blurt "brand new ship".
  const hpFull = game.ship.hp >= SHIP_MAX_HP && !game.ship.dead;
  if (hpFull && !game.hpFullVoice) { VoiceSys.say("health_full"); game.hpFullVoice = true; }
  else if (!hpFull) game.hpFullVoice = false;
  // v3.5 P3: HP-scaled urgency for the pulsed voice — a per-frame call (not edge-detected), safe no-op
  // via lowhpSet's own guards when the state isn't engaged or the voice isn't live. CS010 P3: the SAME t
  // and the SAME lowhpPulseRate(t) also advance game.lowHpPhase, the shared accumulator the critical-hull
  // ring and the corner glow read via Math.sin — so siren, ring and glow are ONE alarm at ONE HP-ramped
  // rate. Integrating the phase (not phase = omega·clock) keeps it CONTINUOUS when the HP-dependent rate
  // changes mid-alarm; mod TAU keeps the accumulator bounded. Living here means it FREEZES while paused —
  // correct and deliberate (openPause tears the siren down; same rationale as hudHull/cargoFlash above).
  if (lowHp) {
    const t = 1 - game.ship.hp / LOW_HP_THRESHOLD;
    AudioSys.lowhpSet(t);
    game.lowHpPhase = (game.lowHpPhase + TAU * lowhpPulseRate(t) * dt) % TAU;
  }
  // Achievements (F9): per-game clock (Speed Recycler's 60s window) + lifetime play time & periodic save
  game.stats.gameTime += dt;
  Achievements.tick(dt);
  game.debris.forEach(a => a.update(dt));
  game.bullets.forEach(b => b.update(dt));
  game.saucers.forEach(s => s.update(dt));
  game.hunters.forEach(h => h.update(dt));
  game.particles.forEach(p => p.update(dt));
  game.floaters.forEach(f => f.update(dt));
  game.caption.life -= dt; // CS011 P2: age Dan's on-screen caption (drawCaption gates on life > 0)
  if (game.dock) game.dock.update(dt);

  // --- Salvage pickup & chain physics ---
  // Magnet (F6): while active, pull free garbage within an extended radius toward the ship (a real
  // attraction force reads better than a bigger invisible circle) AND widen the pickup radius.
  const magnet = powerActive("magnet");
  const pickR = magnet ? GARBAGE_PICKUP * MAGNET_PICKUP_MULT : GARBAGE_PICKUP;
  for (const g of game.garbage) {
    g.update(dt);
    if (g.dead || game.ship.dead) continue;
    if (magnet) {   // v3.4 P4: pull ALL garbage — singles AND clumps. The old pieces===1 gate is dead: v3.3's
                    // 9c made clumps directly scoopable, so pulling one is no longer "just noise".
      if (dist2(g, game.ship) < MAGNET_RANGE * MAGNET_RANGE) {
        const [dx, dy] = shortDelta(g.x, g.y, game.ship.x, game.ship.y); // vector toward the ship (wrap-aware)
        const d = Math.hypot(dx, dy) || 0.0001;
        const t = 1 - (d / MAGNET_RANGE);                                    // 1 at ship, 0 at max range
        let accel = MAGNET_PULL_MIN + (MAGNET_PULL - MAGNET_PULL_MIN) * Math.pow(t, MAGNET_FALLOFF_POW); // v3.6 P2a: falloff exponent hoisted to a constant (was hardcoded t*t)
        accel /= Math.sqrt(g.mass);     // FORK-6: sqrt, not linear mass. The 0.5 exponent is a PLAYTEST KNOB.
                                        // A mass-1 single is UNAFFECTED (sqrt(1)=1); a mass-11 clump pulls at ~30%.
        const damp = Math.pow(MAGNET_DAMP, dt);   // light in-range damping so the pull glides (not jitters)
        g.vx = g.vx * damp + (dx / d) * accel * dt;
        g.vy = g.vy * damp + (dy / d) * accel * dt;
      }
    }
    // Capture region = the base GARBAGE_PICKUP circle OR the Scoop mouth (v3.3 P3). MAGNET_PICKUP_MULT
    // multiplies the CIRCLE only, and the box is independent, so there's no double-counting; at
    // scoopLevel 0 inScoopBox is always false, so this is byte-identical to the pre-scoop pickup.
    if (game.chain.length < game.cargoMax &&
        (dist2(g, game.ship) < pickR * pickR || inScoopBox(g))) {
      if (g.pieces === 1) {
        // A single hooks onto the chain as one node (unchanged behavior).
        g.dead = true;
        game.chain.push({
          x: g.x, y: g.y, px: g.x, py: g.y,
          spin: g.spin, spinRate: g.spinRate, mass: g.mass  // carry towing weight onto the node (F5)
        });
        AudioSys.pickup();
        // Count-based Magnet expiry (B-5): spend one budget per canister HOOKED — counted at the hook,
        // not the pull, so a magnet that draws-then-hooks a piece only spends once (FLAG B-5-a).
        if (magnet && settings.magnetMode === "pieces" && game.powerBudget.magnet > 0) game.powerBudget.magnet--;
      } else {
        // v3.3 P4 (9c, reverses v3.2 P1's "a clump is un-hookable", FORK-6: UNCONDITIONAL, no scoopLevel
        // gate): scoop as many of the clump's pieces as fit the chain, each becoming its own node at the
        // clump's per-piece mass. Scooping is LOSSY but instant — a chain-full scoop of a big clump throws
        // the overflow away (that's the cost that keeps the lossless shatter tool alive). The Magnet still
        // ignores clumps (its pieces===1 gate above) — the scoop is the clump tool now.
        const room = game.cargoMax - game.chain.length;  // > 0 (checked in the gate)
        const take = Math.min(room, g.pieces);
        const pMass = g.mass / g.pieces;
        for (let k = 0; k < take; k++) {
          game.chain.push({
            x: g.x, y: g.y, px: g.x, py: g.y,
            spin: g.spin, spinRate: g.spinRate, mass: pMass
          });
        }
        AudioSys.pickup();
        // FLAG-7b (v3.4 P4): a clump scoop under an active pieces-mode Magnet spends `take` budget — else a
        // 6-piece clump would be free where 6 singles cost 6. Clamped at 0. (Singles spend 1 in the branch above.)
        if (magnet && settings.magnetMode === "pieces") game.powerBudget.magnet = Math.max(0, game.powerBudget.magnet - take);
        if (take === g.pieces) {
          g.dead = true;  // whole clump fit — total mass conserved onto the chain
        } else {
          // Leftover floats off: re-derive its size/mass, re-arm the coalesce delay, and kick it
          // directly away from the ship so "the rest of the ball floats away".
          g.pieces -= take;
          g.mass  -= take * pMass;
          g.radius = 7 * Math.sqrt(g.pieces);
          g.coalesceDelay = GARBAGE_COALESCE_DELAY;
          const [ax, ay] = shortDelta(game.ship.x, game.ship.y, g.x, g.y); // ship -> leftover (wrap-aware)
          const d = Math.hypot(ax, ay) || 0.0001;
          g.vx += (ax / d) * SCOOP_SPILL_KICK;
          g.vy += (ay / d) * SCOOP_SPILL_KICK;
        }
      }
      // CS010 P9: "Truck is full, let's go." fires on the pickup where the chain BECOMES full — after the
      // single/clump branches so BOTH paths trip it, and inside the capture branch so only a real hook
      // counts. cargoMax is the RUNTIME cap (grows 12→24), so "full" is a moving target; the pickup gate
      // above blocks further hooks once full, so this trips exactly once and re-arms after a delivery.
      if (game.chain.length === game.cargoMax) VoiceSys.say("cargo_full");
    }
  }
  coalesceGarbage(dt); // v3.1 P3: neglected scrap clumps; a 12-piece clump becomes a Hunter
  updateChain(dt);

  // --- Powerups: field pickups + active-effect countdown (F6) ---
  for (const p of game.powerups) {
    p.update(dt);
    if (!p.dead && !game.ship.dead) {
      const r = p.radius + SHIP_RADIUS;
      if (dist2(p, game.ship) < r * r) { p.dead = true; applyPowerup(p.type); }
    }
  }
  for (const k in game.powerFx) {
    if (game.powerFx[k] > 0) game.powerFx[k] = Math.max(0, game.powerFx[k] - dt);
  }
  // CS010 P9: powerup-EXPIRED voice — the falling edge of powerActive(t) per timed type. Routed through
  // powerActive() (never powerFx directly) so it correctly catches BOTH time mode (clock ran out) AND
  // count mode (shots/pieces budget hit 0) — hooking powerFx would silently miss the count modes. Runs
  // after the powerFx decay and after this frame's budget spends, so powerActive() is current.
  for (const t of POWERUP_DROP_TYPES) {
    const active = powerActive(t);
    if (!active && game.powerVoiced[t]) VoiceSys.say("expire_" + t);
    game.powerVoiced[t] = active;
  }
  for (const k in game.powerBank) {
    if (game.powerBank[k] > 0) game.powerBank[k] = Math.max(0, game.powerBank[k] - dt);
  }

  // --- Recycling dock offload ---
  if (game.dock) {
    const nearDock = !game.ship.dead &&
      dist2(game.ship, game.dock) < (game.dock.radius + 10) * (game.dock.radius + 10);
    if (nearDock && game.chain.length > 0) {
      game.offloadTimer -= dt;
      if (game.offloadTimer <= 0) {
        const node = game.chain.pop(); // canisters peel off from the tail
        game.deliveryCount++;
        const pts = DOCK_BASE_SCORE + DOCK_BONUS_STEP * (game.deliveryCount - 1);
        addScore(pts);
        // Achievement stats (F9): per-game delivered count (Scrap Runner) + best combo this visit
        // (Combo Collector); a first-canister-within-60s flag (Speed Recycler); a full 12-in-one-visit
        // milestone (Heavy Hauler weekly + The Long Haul lifetime); and lifetime delivered/score.
        game.stats.delivered++;
        // Tow-capacity progression (B-8): every CARGO_GROW_PER canisters recycled this run raises
        // the cap by 1, up to CARGO_CAP_MAX. Keyed off the per-run delivered count (increments by 1
        // here, so the cap climbs at most one step per canister) — a "TOW +1" float marks each bump.
        const growCap = Math.min(CARGO_CAP_MAX, CARGO_BASE + Math.floor(game.stats.delivered / CARGO_GROW_PER));
        if (growCap > game.cargoMax) {
          game.cargoMax = growCap;
          game.floaters.push(new FloatText("TOW +1", game.ship.x, game.ship.y - 22, COLOR.dock));
          // CS009 P3 (FORK-2 A): a cap-up SHRINKS the CARGO ring (same chain, bigger denominator) —
          // arm the flash so the ring reads gold+thick for HUD_CAP_FLASH sec, and drop the reward
          // text at the dock (where it was earned), not the ship.
          game.cargoFlash = HUD_CAP_FLASH;
          game.floaters.push(new FloatText("+1 CAP", game.dock.x, game.dock.y - 22, COLOR.ach));
        }
        game.stats.bestCombo = Math.max(game.stats.bestCombo, game.deliveryCount);
        // v3.6 P3 (Source 3, FORK-2): the recycle hub emits one powerup per visit, the first time
        // a visit's deliveryCount passes through 10 — same "exactly once per visit" idiom as the
        // deliveryCount===12 Heavy Hauler latch just below. Launched from the dock's own position
        // on a fresh random vector so it clears the dock's footprint before it's collectable.
        if (game.deliveryCount === 10) {
          const a = rand(0, TAU);
          dropPowerup(game.dock.x, game.dock.y, Math.cos(a) * DOCK_POWERUP_SPEED, Math.sin(a) * DOCK_POWERUP_SPEED);
          game.floaters.push(new FloatText("SALVAGE BONUS", game.dock.x, game.dock.y - 22, COLOR.dock));
        }
        // Salvage King (lifetime MAX): best canisters delivered in one game. game.stats.delivered only
        // climbs within a run, so Math.max here tracks the per-game best and keeps the all-time record.
        Achievements.lifetime.bestDeliveredGame = Math.max(Achievements.lifetime.bestDeliveredGame, game.stats.delivered);
        game.stats.pacifistStreak++;
        game.stats.pacifistBest = Math.max(game.stats.pacifistBest, game.stats.pacifistStreak);
        // Zen Master (lifetime, per-EVENT): each haul whose no-fire delivery streak REACHES 5 counts once.
        // pacifistStreak passes through 5 exactly once per haul (firing resets it to 0), so === 5 latches
        // once; a longer haul (6,7,…) doesn't re-fire, and a fresh 5-streak after firing is a new event.
        if (game.stats.pacifistStreak === 5) Achievements.lifetime.pacifistTowEvents++;
        if (game.stats.delivered === 1 && game.stats.gameTime <= 60) game.stats.speedRecycler = true;
        // Heavy Hauler (weekly) + The Long Haul (lifetime fullChains) + Freight Baron (lifetime, per-EVENT):
        // a FIXED >=12-in-one-visit milestone, deliberately decoupled from the growing game.cargoMax
        // (FLAG A-5-a / B-8-b) — deliveryCount passes through 12 exactly once per qualifying visit, so all
        // three latch once per visit.
        if (game.deliveryCount === 12) { game.stats.fullChainVisit = true; Achievements.lifetime.fullChains++; Achievements.lifetime.heavyHaulerEvents++; }
        // Maxed Out (lifetime, CS012 P3): deliveryCount passes through CARGO_CAP_MAX exactly once per
        // qualifying visit (same "passes through" latch idiom as the ===12 check above). Celebration
        // (floater + gold ring pulse) fires at this same instant — no voice line (deferred, FORK-CS012-B b).
        if (game.deliveryCount === CARGO_CAP_MAX) {
          game.stats.maxChainVisit = true;
          game.floaters.push(new FloatText("MAX HAUL", game.dock.x, game.dock.y - 22, COLOR.ach, 24));
          game.cargoFlash = HUD_CAP_FLASH;
        }
        Achievements.lifetime.delivered++;
        Achievements.lifetime.deliveryScore += pts;
        game.floaters.push(new FloatText("+" + pts, node.x, node.y, COLOR.dock));
        AudioSys.deliver(game.deliveryCount);
        // CS010 P9 (FORK-5 = b): Dan sizes up the haul on the pop that EMPTIES the chain — the offload
        // block only runs while chain.length > 0, so the emptying pop happens exactly once (THE GATE IS
        // THE LATCH, no flag needed) and deliveryCount is intact at this instant. 1–4 pieces says nothing.
        // breakChain()/scatterChain() also zero deliveryCount but never reach here, so they stay silent.
        if (game.chain.length === 0) VoiceSys.dockDelivery(game.deliveryCount);
        game.offloadTimer = DOCK_OFFLOAD_INTERVAL;
      }
    } else {
      game.offloadTimer = 0;
      // combo resets once you leave the dock's neighborhood
      if (!game.ship.dead &&
          dist2(game.ship, game.dock) > (game.dock.radius + 40) * (game.dock.radius + 40)) {
        game.deliveryCount = 0;
      }
    }
  }

  // --- Spawning ---
  game.saucerTimer -= dt;
  if (game.saucerTimer <= 0 && game.saucers.length === 0) {
    // Small (aimed, dangerous) saucer gets more common as difficulty ramps (F10 — folds in
    // the old score>8000 gate so escalation is wave-driven in one place).
    const smallChance = ramp(SAUCER_SMALL_CHANCE_FLOOR, SAUCER_SMALL_CHANCE_CEIL, game.wave);
    const small = Math.random() < smallChance;
    game.saucers.push(new Saucer(small));
    AudioSys.saucer(true, small);
    // Longer gaps between saucers early, tightening toward the shipped cadence at full difficulty.
    const gapMin = ramp(SAUCER_GAP_FLOOR_MIN, SAUCER_GAP_CEIL_MIN, game.wave);
    const gapMax = ramp(SAUCER_GAP_FLOOR_MAX, SAUCER_GAP_CEIL_MAX, game.wave);
    game.saucerTimer = rand(gapMin, gapMax);
  }

  // One Hunter lineage at a time: a fresh large core only spawns once the whole family is
  // clear (core + any homing children). Cadence is unchanged from the old Satellite; only the
  // Hunters' movement speed/agility ramps with difficulty (F4), not how often they appear.
  game.hunterTimer -= dt;
  if (game.hunterTimer <= 0 && game.hunters.length === 0 && game.wave >= 2) {
    game.hunters.push(HunterSatellite.spawnCore());
    game.stats.hunterLineageKills = 0; // start counting this lineage for Hunter's Bane (F9)
    game.hunterTimer = rand(20, 32);
  }

  // Ambient Health powerup (F6): drifts into the field on a saucer-like cadence, at most one at a
  // time (its own decay bounds coexistence — like the one-saucer-at-a-time gate).
  game.healthTimer -= dt;
  if (game.healthTimer <= 0) {
    if (!game.powerups.some(p => p.type === "health")) spawnHealthPowerup();
    game.healthTimer = rand(POWERUP_HEALTH_GAP[0], POWERUP_HEALTH_GAP[1]);
  }

  // --- Collisions: player bullets vs targets ---
  for (const b of game.bullets) {
    if (b.dead) continue;
    if (!b.hostile) {
      for (const a of game.debris) {
        if (!a.dead && dist2(b, a) < a.radius * a.radius) {
          b.dead = true; destroyDebris(a); break;
        }
      }
      if (b.dead) continue;
      for (const s of game.saucers) {
        if (!s.dead && dist2(b, s) < s.radius * s.radius) {
          b.dead = true; destroySaucer(s);
          break;
        }
      }
      if (b.dead) continue;
      for (const h of game.hunters) {
        if (!h.dead && dist2(b, h) < (h.radius + 3) * (h.radius + 3)) {
          b.dead = true;
          destroyHunter(h);   // score + boom + garbage + 3-way split, all tiers
          break;
        }
      }
      if (b.dead) continue;
      // v3.2 P2: a clump (pieces>1) is a bullet target — singles are debris, not targets, and
      // still pass straight through (pieces===1 is excluded here on purpose).
      for (const g of game.garbage) {
        if (!g.dead && g.pieces > 1 && dist2(b, g) < g.radius * g.radius) {
          b.dead = true; shatterClump(g); break;
        }
      }
    } else {
      // hostile bullet vs player
      if (!game.ship.dead && game.ship.invuln <= 0) {
        const r = game.ship.shieldOn ? SHIELD_RADIUS : SHIP_RADIUS;
        if (dist2(b, game.ship) < r * r) {
          b.dead = true;
          if (game.ship.shieldOn) {
            game.ship.energy = Math.max(0, game.ship.energy - SHIELD_HIT_COST);
            game.stats.deflects++; // Shield Surfer (F9): a hostile bullet blocked by the shield
            AudioSys.shieldPing();
          } else damageShip(DMG_BULLET, b.x, b.y);
        }
      }
      // hostile bullet vs tow chain
      if (!b.dead && game.chain.length) {
        for (let i = 0; i < game.chain.length; i++) {
          if (dist2(b, game.chain[i]) < 9 * 9) {
            b.dead = true; breakChain(i); break;
          }
        }
      }
    }
  }

  // --- Collisions: hazards vs ship ---
  if (!game.ship.dead && game.ship.invuln <= 0) {
    const hazards = [...game.debris, ...game.hunters];
    for (const h of hazards) {
      if (h.dead) continue;
      const r = (game.ship.shieldOn ? SHIELD_RADIUS : SHIP_RADIUS) + h.radius;
      if (dist2(h, game.ship) < r * r) {
        if (game.ship.shieldOn) {
          // Homing Hunters (medium/small, the old fragile "wedges") die on shield contact
          // and still split; debris and the large Hunter core bounce off elastically.
          if (h instanceof HunterSatellite && h.size < 3) {
            game.ship.energy = Math.max(0, game.ship.energy - SHIELD_HIT_COST);
            game.stats.deflects++; // Shield Surfer (F9): a homing Hunter killed on the shield
            AudioSys.shieldPing();
            destroyHunter(h);
          } else {
            shieldDeflect(h);
          }
        } else {
          const applied = damageShip(h.damage, h.x, h.y);
          // Close Shave (F9): survived a Hunter collision with under 10 HP left (still alive).
          if (applied && h instanceof HunterSatellite && !game.ship.dead && game.ship.hp < 10)
            game.stats.closeShave = true;
        }
      }
    }
    // saucer body contact
    for (const s of game.saucers) {
      if (s.dead) continue;
      const r = (game.ship.shieldOn ? SHIELD_RADIUS : SHIP_RADIUS) + s.radius;
      if (dist2(s, game.ship) < r * r) {
        if (game.ship.shieldOn) {
          game.stats.deflects++;                            // Shield Surfer (F9): saucer rammed into the shield
          destroySaucer(s);
        } else damageShip(s.damage, s.x, s.y);
      }
    }
  }

  // --- Hazards vs tow chain: a hit destroys that canister and cuts loose
  //     everything behind it (falls back to free garbage) ---
  if (game.chain.length) {
    const chainHazards = [...game.debris, ...game.hunters];
    chainScan:
    for (let i = 0; i < game.chain.length; i++) {
      const n = game.chain[i];
      for (const h of chainHazards) {
        if (h.dead) continue;
        const r = h.radius + 7;
        if (dist2(n, h) < r * r) { breakChain(i); break chainScan; }
      }
    }
  }

  // Saucer bullets can shatter debris satellites too (classic behavior)
  for (const b of game.bullets) {
    if (b.dead || !b.hostile) continue;
    for (const a of game.debris) {
      if (!a.dead && dist2(b, a) < a.radius * a.radius) {
        b.dead = true; destroyDebris(a, false); break;
      }
    }
  }

  // --- Cleanup ---
  const hadSaucer = game.saucers.length > 0;
  game.debris = game.debris.filter(a => !a.dead);
  game.bullets = game.bullets.filter(b => !b.dead);
  game.saucers = game.saucers.filter(s => !s.dead);
  game.hunters = game.hunters.filter(h => !h.dead);
  game.particles = game.particles.filter(p => !p.dead);
  game.garbage = game.garbage.filter(g => !g.dead);
  game.floaters = game.floaters.filter(f => !f.dead);
  game.powerups = game.powerups.filter(p => !p.dead);
  if (hadSaucer && game.saucers.length === 0) AudioSys.saucer(false);

  // --- Wave clear ---
  if (game.debris.length === 0 && game.hunters.length === 0) {
    game.waveClearTimer += dt;
    if (game.waveClearTimer > 2.5) {
      game.waveClearTimer = 0;
      // Achievements (F9): a wave completed with zero damage taken -> Perfect Wave (lifetime, 10×)
      // and, if it was wave 3, No Scratches (weekly). game.wave is still the completed wave here
      // (nextWave increments it), so read it before advancing.
      if (game.stats.dmgThisWave === 0) {
        Achievements.lifetime.perfectWaves++;
        if (game.wave === 3) game.stats.noScratchWave3 = true;
        // Flawless Run (weekly, P8 / FLAG A-6-b): a damage-free clear of wave 8 or later — a real feat
        // once the Hunter family + saucers + Debris density are all mid-ramp. game.wave is still the
        // completed wave here (nextWave increments it below).
        if (game.wave >= 8) game.stats.flawlessLateWave = true;
      }
      nextWave();
    }
  } else {
    game.waveClearTimer = 0;
  }

  // --- Achievements: evaluate every frame (already-unlocked ones short-circuit) ---
  Achievements.evaluate();

  // --- Heartbeat ---
  const density = game.debris.length + game.hunters.length * 2;
  game.beatInterval = Math.max(0.28, 1.05 - game.wave * 0.04 - Math.max(0, (14 - density)) * 0.02);
  game.beatTimer -= dt;
  if (game.beatTimer <= 0 && !game.ship.dead && density > 0) {
    AudioSys.beat(game.beatHigh);
    game.beatHigh = !game.beatHigh;
    game.beatTimer = game.beatInterval;
  }
}

// ---------- Draw ----------
function drawText(str, x, y, size, color = COLOR.text, align = "center") {
  ctx.font = `${size}px monospace`;
  ctx.textAlign = align;
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;
  ctx.fillText(str, x, y);
  ctx.shadowBlur = 0;
}

// CS013 P2 (§2.2): the shared control-hint footer look — larger + higher-contrast than the old
// literal size-12/COLOR.dim footers. Centered, like every menu footer.
function drawMenuHint(text, cx, y) {
  drawText(text, cx, y, MENU_HINT_SIZE, COLOR.menuIdle, "center");
}

// CS011 P2: Dan's on-screen caption — the voice channel's visible echo (settings.captions), centered near
// the viewport bottom. In-play only (never over a menu / gameover / the title). Independent of Capture's H
// HUD toggle by design (accessibility text, not a HUD readout) — a SIBLING of drawHUD() in draw(), not
// inside it. Fades over the last CAPTION_FADE s via ctx.globalAlpha (drawText leaves globalAlpha alone).
function drawCaption() {
  if (game.state === "playing" && !game.paused && game.caption.life > 0) {
    const a = game.caption.life < CAPTION_FADE ? game.caption.life / CAPTION_FADE : 1;
    ctx.globalAlpha = a;
    drawText(game.caption.text, VIEW_W/2, VIEW_H - CAPTION_Y, CAPTION_SIZE, COLOR.text, "center");
    ctx.globalAlpha = 1;
  }
}

// ---------- Pause menu / Options / Controls rendering (F8) ----------
// Screen-fixed overlays, drawn after the HUD when game.paused. A dimmed backdrop plus a
// glow-stroked panel keeps the vector aesthetic (Pillar 1). The state lives in game.menu.
function drawMenu() {
  ctx.fillStyle = "rgba(4,10,20,0.88)"; // v3.3 P1: backdrop dim raised 0.74->0.88 (look-call) so the
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);   // world recedes further behind an open menu panel.
  const s = game.menu.screen;
  if (s === "root") drawRootMenu();
  else if (s === "options") drawOptionsMenu();
  else if (s === "sound") drawSound();
  else if (s === "controls") drawControlsMenu();
  else if (s === "difficulty") drawDifficulty();
  else if (s === "achievements") drawAchievements();
  else if (s === "highscores") drawHighScores();
}

function menuPanel(w, h, title) {
  const x = (VIEW_W - w) / 2, y = (VIEW_H - h) / 2;
  // v3.3 P1: fill the panel before stroking it (look-call alpha) — previously only stroked, so the
  // world showed through and menu text was unreadable over a busy background.
  ctx.fillStyle = "rgba(2,6,14,0.95)";
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = COLOR.satellite; ctx.lineWidth = 2;
  ctx.shadowColor = COLOR.satellite; ctx.shadowBlur = 12;
  ctx.strokeRect(x, y, w, h);
  ctx.shadowBlur = 0;
  drawText(title, VIEW_W / 2, y + 46, 32, COLOR.text);
  return { x, y };
}

// CS013 P1: the "MENU" branch of the title ternary below, dead since CS012 P4 made the root
// play-only, is reachable again — gameover now opens this same root (rootItems() gives it the
// Play Again/Options/Quit to Title layout). Both root layouts are 3 items, so the 360x300 panel's
// row math (fixed 46px step) needs no resize for the gameover case.
function drawRootMenu() {
  const items = rootItems();
  const { y } = menuPanel(360, 300, game.state === "playing" ? "PAUSED" : "MENU");
  items.forEach((it, i) => {
    const sel = i === game.menu.index;
    drawText((sel ? "▶ " : "   ") + it, VIEW_W / 2, y + 118 + i * 46, 24, sel ? COLOR.text : COLOR.menuIdle);
  });
  drawMenuHint("↑↓ move    ENTER / A select    ESC / B back", VIEW_W / 2, y + 272);
}

// CS010 P4 (§9/§10a): now a pure nav list (Sound / Music, Controls, Achievements, High Scores,
// Difficulty, Back) — the value rows (volume sliders + Music Track) moved to drawSound() below, so
// this mirrors drawRootMenu's plain centered-list layout instead of the old split value/nav layout.
function drawOptionsMenu() {
  const { y } = menuPanel(600, 420, "OPTIONS");
  const m = game.menu;
  MENU_OPTIONS.forEach((label, i) => {
    const sel = m.index === i;
    drawText((sel ? "▶ " : "   ") + label, VIEW_W / 2, y + 118 + i * 42, 22, sel ? COLOR.text : COLOR.menuIdle);
  });

}

// Sound / Music sub-screen (CS010 P4, §9) — a relocation of the three volume sliders + Music Track
// cycler off Options, same control style. Follows drawOptionsMenu's pre-CS010-P4 value-row layout
// (left-aligned label + slider/value), dispatched off SOUND_ROWS by label, plus a centered Back row.
function drawSound() {
  const { x, y } = menuPanel(600, 602, "SOUND / MUSIC"); // CS011 P3: +92px for the Voice picker + Captions rows
  const m = game.menu;
  let cy = y + 100;
  SOUND_ROWS.forEach((label, i) => {
    if (label === "Back") return;
    const sel = m.index === i;
    drawText(label, x + 40, cy + 6, 18, sel ? COLOR.text : COLOR.menuIdle, "left");
    const vi = VOL_LABELS.indexOf(label);
    if (vi >= 0) { // volume slider
      const bx = x + 270, bw = 190, bh = 12, by = cy - 3;
      ctx.strokeStyle = sel ? COLOR.shield : COLOR.dim; ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, bw, bh);
      ctx.fillStyle = sel ? COLOR.shield : COLOR.dim;
      ctx.fillRect(bx + 1, by + 1, (bw - 2) * AudioSys.vol[VOL_CATS[vi]], bh - 2);
      drawText(Math.round(AudioSys.vol[VOL_CATS[vi]] * 100) + "%", bx + bw + 44, cy + 6, 16, sel ? COLOR.text : COLOR.menuIdle, "right");
      if (sel) { drawText("◄", bx - 16, cy + 7, 16, COLOR.text); drawText("►", bx + bw + 16, cy + 7, 16, COLOR.text); }
    } else { // value-column rows — a single dispatch mirroring drawDifficulty's toggle layout
      const ox = x + 270;
      let val;
      if (label === "Music Track")   val = MUSIC_TRACK_LABELS[settings.musicTrack];
      else if (label === "Voice")    val = VOICE_STYLE_LABELS[settings.voiceStyle];
      else if (label === "Captions") val = settings.captions ? "On" : "Off";
      drawText(val, ox, cy + 6, 18, sel ? COLOR.text : COLOR.menuIdle, "left");
      if (sel) { drawText("◄", ox - 20, cy + 7, 16, COLOR.text); drawText("►", ox + 150, cy + 7, 16, COLOR.text); }
    }
    cy += 46;
  });
  cy += 14;
  const backSel = m.index === SOUND_ROWS.indexOf("Back");
  drawText((backSel ? "▶ " : "   ") + "Back", VIEW_W / 2, cy + 6, 22, backSel ? COLOR.text : COLOR.menuIdle);
  drawMenuHint("↑↓ move    ◄► adjust    ENTER / A select    ESC / B back", VIEW_W / 2, y + 582);
}

// Difficulty screen renderer (v3.0 P5): two two-option toggle rows + Back. The active side of each
// toggle is lit (COLOR.text), the other dim; the selected row shows the ◄► adjust chevrons. Mirrors

function drawDifficulty() {

    { label: "Magnet expires",       left: "Time", right: "Pieces", rightActive: settings.magnetMode === "pieces" },
