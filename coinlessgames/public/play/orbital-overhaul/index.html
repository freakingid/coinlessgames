  eighty: "EY1 T IY", ninety: "N AY1 N T IY",
};
const DIGIT_WORD = {
  "0": "zero", "1": "one", "2": "two", "3": "three", "4": "four",
  "5": "five", "6": "six", "7": "seven", "8": "eight", "9": "nine",
};

// Pure: n -> word tokens ("twenty-three" -> ["twenty","three"]). n < 20 is a single ones/teens
// word; otherwise a tens word plus an ones word only if there's a remainder.
function numberToWords(n) {
  if (n < 20) return [numberToWords.ONES[n]];
  const tens = numberToWords.TENS[(n / 10) | 0];
  const ones = n % 10;
  return ones ? [tens, numberToWords.ONES[ones]] : [tens];
}
numberToWords.ONES = ["zero", "one", "two", "three", "four", "five", "six", "seven", "eight",
  "nine", "ten", "eleven", "twelve", "thirteen", "fourteen", "fifteen", "sixteen", "seventeen",
  "eighteen", "nineteen"];
numberToWords.TENS = [null, null, "twenty", "thirty", "forty", "fifty", "sixty", "seventy",
  "eighty", "ninety"];

// Pure: n -> full phon string for "Level n". n <= 99 speaks natural words; n >= 100 falls back
// to digit-by-digit (no "level two hundred" composition — out of scope, see phase doc FLAG).
function levelPhon(n) {
  if (n <= 99) return LEVEL_PHON + " / " + numberToWords(n).map(w => NUM_PHON[w]).join(" / ");
  return LEVEL_PHON + " / " + String(n).split("").map(d => NUM_PHON[DIGIT_WORD[d]]).join(" / ");
}

// §11e cooldown/priority — PLAYTEST KNOBS. VOICE_COOLDOWN: no line starts while one plays, or within
// this many seconds of the last one ENDING. VOICE_PRIORITY (default 1): a higher-priority line PRE-EMPTS
// a lower one that is currently playing; an equal/lower one is DROPPED (never queued — a queue would have
// Dan narrating events that finished ten seconds ago). 3 = hull critical, 2 = health milestones, 1 = rest.
const VOICE_COOLDOWN = 1.2;
const VOICE_PRIORITY = { health_low: 3, health_relief: 2, health_full: 2, level: 2, chain_broken: 2 };

// CS011 P2 — on-screen caption look/timing knobs (LOOK-CALL). The caption is Dan's VISIBLE echo, shown
// whenever settings.captions is on — even with voice audio OFF — and gated by the SAME cooldown/priority
// as the audio, so a dropped line is never captioned late. LINGER: seconds a fully-shown caption holds
// after the utterance ends. FADE: seconds of linear alpha fade-out at the end of its life. Y: px up from
// the viewport bottom. SIZE: font px. All four are pure presentation, tuned by eye, no gameplay effect.
const CAPTION_LINGER = 1.5, CAPTION_FADE = 0.4, CAPTION_Y = 64, CAPTION_SIZE = 20;

// VoiceSys — Dan's speech. A SEPARATE module alongside AudioSys/MusicSys (NOT folded into AudioSys, a
// flat bag of one-shots): it owns a small sequencer + a radio-processing chain that feeds AudioSys.voice
// (the volume bus). Every entry point no-ops when AudioSys.ctx is null (the headless-safe guard idiom).
const VoiceSys = {
  voiceBus: null, dry: null, rIn: null, rLP: null, rShaper: null, rComp: null, rGain: null,
  ringCarrier: null, ringMult: null, ringWet: null, ringDry: null, ringOut: null, // CS011 ring-mod stage
  staticGain: null, noiseBuf: null,
  cur: null,               // the currently-playing utterance's source handles, or null
  busyUntil: -Infinity,    // AudioSys-clock time the current utterance ends; also the cooldown anchor.
                           // -Infinity = "nothing has ever played" so the FIRST line (and any line in the
                           // AudioContext's first VOICE_COOLDOWN seconds) isn't swallowed by a phantom gap.
  curPriority: -Infinity,  // priority of the line occupying the channel (for pre-emption)

  // Build the noise bed + radio chain once the audio graph exists (first user gesture). Idempotent;
  // no-ops until AudioSys.init() has created AudioSys.voice. Mirrors MusicSys.ensureGraph().
  ensure() {
    if (this.voiceBus || !AudioSys.ctx || !AudioSys.voice) return;
    const ctx = AudioSys.ctx;
    const n = ctx.sampleRate * 2, b = ctx.createBuffer(1, n, ctx.sampleRate), d = b.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    this.noiseBuf = b;
    // voice bus -> ring-modulation stage (CS011) -> dry / radio fan-out. The ring stage sits BETWEEN the
    // bus and the dry+radio split so a robot voice (ring on) and a plain one (ring off) share one graph.
    this.voiceBus = ctx.createGain();
    // ring mod: out = signal * carrier (carrier drives a 0-baseline gain, i.e. multiply), mixed with dry.
    // Ring off (applyRing → wet 0 / dry 1) makes ringOut a transparent pass-through of voiceBus, so a
    // non-ring style behaves exactly as the pre-CS011 direct voiceBus->{dry,rIn} fan-out did.
    this.ringCarrier = ctx.createOscillator(); this.ringCarrier.type = "sine";
    this.ringMult = ctx.createGain(); this.ringMult.gain.value = 0; this.ringCarrier.connect(this.ringMult.gain);
    this.voiceBus.connect(this.ringMult);
    this.ringWet = ctx.createGain(); this.ringDry = ctx.createGain();
    this.ringMult.connect(this.ringWet); this.voiceBus.connect(this.ringDry);
    this.ringOut = ctx.createGain(); this.ringWet.connect(this.ringOut); this.ringDry.connect(this.ringOut);
    this.ringCarrier.start();
    // fan-out now taps ringOut (not voiceBus): dry path / radio path — both land on AudioSys.voice
    this.dry = ctx.createGain(); this.ringOut.connect(this.dry); this.dry.connect(AudioSys.voice);
    this.rIn = ctx.createBiquadFilter(); this.rIn.type = "highpass";
    this.rLP = ctx.createBiquadFilter(); this.rLP.type = "lowpass";
    this.rShaper = ctx.createWaveShaper();
    this.rComp = ctx.createDynamicsCompressor();
    this.rComp.threshold.value = -28; this.rComp.ratio.value = 8;
    this.rComp.attack.value = 0.003; this.rComp.release.value = 0.12;
    this.rGain = ctx.createGain();
    this.ringOut.connect(this.rIn); this.rIn.connect(this.rLP); this.rLP.connect(this.rShaper);
    this.rShaper.connect(this.rComp); this.rComp.connect(this.rGain); this.rGain.connect(AudioSys.voice);
    // squelch-gated static bed, colored through the same radio chain (feeds rIn DIRECTLY, not via the ring)
    const st = ctx.createBufferSource(); st.buffer = this.noiseBuf; st.loop = true;
    const sf = ctx.createBiquadFilter(); sf.type = "bandpass"; sf.frequency.value = 1700; sf.Q.value = 0.4;
    this.staticGain = ctx.createGain(); this.staticGain.gain.value = 0;
    st.connect(sf); sf.connect(this.staticGain); this.staticGain.connect(this.rIn);
    st.start();
    this.applyRadio();
    this.applyRing();
  },

  applyRadio() {
    if (!AudioSys.ctx || !this.rIn) return;
    const R = VOICE_PARAMS.radio;
    this.rIn.frequency.value = R.hp;
    this.rLP.frequency.value = R.lp;
    const k = Math.max(1.001, R.drive), N = 1024, curve = new Float32Array(N), th = Math.tanh(k);
    for (let i = 0; i < N; i++) { const x = i / (N - 1) * 2 - 1; curve[i] = Math.tanh(k * x) / th; }
    this.rShaper.curve = curve;
    this.dry.gain.value = R.on ? 0 : 1;
    this.rGain.gain.value = R.on ? 1.4 : 0;
  },

  // CS011: apply the current style's ring-modulation settings to the ring stage built in ensure(). Off
  // styles set wet 0 / dry 1 (transparent). freq is set unconditionally — the carrier always runs, so it
  // must never receive undefined (every VOICE_STYLES entry carries a full ring:{on,freq,mix}).
  applyRing() {
    if (!AudioSys.ctx || !this.ringOut) return;
    const R = VOICE_PARAMS.ring;
    this.ringCarrier.frequency.value = R.freq;
    this.ringWet.gain.value = R.on ? R.mix : 0;
    this.ringDry.gain.value = R.on ? (1 - R.mix) : 1;
  },

  // CS011: switch Dan's voice to a VOICE_STYLES entry (re-points the live VOICE_PARAMS) and re-apply the
  // radio + ring graph. "off" is NOT a style: it never reassigns VOICE_PARAMS (buildUtterance and the
  // graph must always have a valid full object), because silencing is handled by voiceEnabled()/say()
  // gating, not by tearing down the params. An unknown id is ignored (params/graph left as they are).
  setStyle(id) {
    if (id === "off") return;
    if (VOICE_STYLES[id]) VOICE_PARAMS = VOICE_STYLES[id];
    this.applyRadio();
    this.applyRing();
  },

  // Stop the current utterance immediately (pre-emption / reset). Ramps the static bed down.
  _stop() {
    if (this.cur) {
      for (const s of this.cur.sources) { try { s.onended = null; s.stop(); } catch (e) {} }
      try { this.cur.utterG.disconnect(); } catch (e) {}
      this.cur = null;
    }
    if (AudioSys.ctx && this.staticGain) {
      const now = AudioSys.ctx.currentTime, g = this.staticGain.gain;
      g.cancelScheduledValues(now); g.setValueAtTime(g.value, now); g.linearRampToValueAtTime(0, now + 0.05);
    }
  },

  // Fresh run: silence Dan and clear the cooldown/priority so a new game never inherits a stale gate.
  reset() { this._stop(); this.busyUntil = -Infinity; this.curPriority = -Infinity; },

  // Speak a random alternative for `event`, subject to §11e cooldown/priority. Returns the chosen line
  // (or null if dropped/unavailable). Selection is a plain random pick; the gate + caption + scheduling
  // all live in _emit, so an event maps to a line here and the channel logic is shared with any future
  // direct caller (e.g. CS011's coming sayLevel()).
  say(event) {
    const lines = VOICE_LINES[event];
    if (!lines || !lines.length) return null;
    const line = lines[(Math.random() * lines.length) | 0];
    return this._emit(line, VOICE_PRIORITY[event] || 1);
  },

  // CS011 P4: announce the wave number. Speaks natural words via levelPhon(); the caption (shown
  // by _emit) shows the numeral ("Level 23") since it's built from `line.text`, not `line.phon`.
  sayLevel(n) {
    return this._emit({ text: "Level " + n, phon: levelPhon(n) }, VOICE_PRIORITY.level);
  },

  // The voice CHANNEL (CS011 P2): run the §11e cooldown/priority gate for one already-chosen `line` at
  // priority `p`, and for a line that PASSES, show its caption (if settings.captions) and speak it (if a
  // voice style is selected). Captions and audio are INDEPENDENT outputs that SHARE this one gate, so a
  // caption obeys the same drop-not-queue rule as the audio — a superseded/in-cooldown line is dropped,
  // never shown late. The gate arithmetic (busyUntil/curPriority + VOICE_COOLDOWN) is BYTE-IDENTICAL to
  // the pre-split say(): buildUtterance moved up here from _schedule (so a captions-only run can read
  // utt.dur without building an audio graph), and busyUntil/curPriority advance whenever a line passes —
  // even in captions-only mode (voice OFF) — so the channel stays consistent. Returns the line, or null
  // if dropped / no ctx. NOTE: gates on the global voiceEnabled() helper (not a VoiceSys method).
  _emit(line, p) {
    if (!AudioSys.ctx) return null;
    this.ensure();
    const now = AudioSys.now();
    if (now < this.busyUntil) {              // a line is on the channel right now
      if (p <= this.curPriority) return null; // equal/lower → DROP (never queue)
      // higher → fall through: _schedule() stops the current line and takes the channel
    } else if (now < this.busyUntil + VOICE_COOLDOWN) {
      return null;                            // inside the post-line cooldown gap
    }
    const utt = buildUtterance(line.phon, VOICE_PARAMS);
    if (settings.captions) this.showCaption(line.text, utt.dur);
    if (voiceEnabled()) this._schedule(utt);
    this.curPriority = p;
    this.busyUntil = now + 0.10 + utt.dur;   // t0 = now + 0.10 (see _schedule); + utterance length
    return line;
  },

  // Overwrite (never queue) the on-screen caption with `text`, timed to utterance length `dur`. life =
  // the audio's 0.10 s t0 lead + the speech + CAPTION_LINGER; drawCaption() renders it, fading over the
  // last CAPTION_FADE seconds. Reassigns game.caption wholesale so a superseding line replaces the old.
  showCaption(text, dur) { game.caption = { text, dur, life: 0.10 + dur + CAPTION_LINGER }; },

  // Recycle-at-dock tiers (§11f / FORK-5 b): map pieces-delivered-this-visit to a line. 1–4 says nothing.
  dockDelivery(n) {
    const ev = n >= 20 ? "dock_20" : n >= 15 ? "dock_15" : n >= 10 ? "dock_10" : n >= 5 ? "dock_5" : null;
    if (ev) return this.say(ev);
    return null;
  },

  // The render scheduler — PORT-ME BLOCK A, verbatim from the lab's VL.speak(), retargeted onto
  // AudioSys.ctx / AudioSys.voice (via this.voiceBus). Schedules a PRE-BUILT utterance (`utt`) as a Web
  // Audio graph and returns it. buildUtterance() now runs one level up in _emit() (CS011 P2 — the ONLY
  // line lifted out of this block, so a captions-only run can read utt.dur without building any audio).
  // Do not re-tune here — tune in the lab, re-port.
  _schedule(utt) {
    this.ensure();
    if (!AudioSys.ctx) return null;
    const ctx = AudioSys.ctx;
    if (ctx.state === "suspended") ctx.resume();
    this._stop();
    if (!utt.segs.length) return utt;
    const t0 = ctx.currentTime + 0.10;

    // glottal source — custom pulse (richness = spectral tilt) or a native wave
    const osc = ctx.createOscillator();
    if (VOICE_PARAMS.srcType === "pulse") {
      const NH = 48, re = new Float32Array(NH + 1), im = new Float32Array(NH + 1);
      for (let h = 1; h <= NH; h++) im[h] = 1 / Math.pow(h, VOICE_PARAMS.richness);
      osc.setPeriodicWave(ctx.createPeriodicWave(re, im));
    } else osc.type = VOICE_PARAMS.srcType;
    const lfo = ctx.createOscillator(); lfo.type = "sine"; lfo.frequency.value = 5.1;
    const lfoG = ctx.createGain(); lfoG.gain.value = VOICE_PARAMS.wobble;
    lfo.connect(lfoG); lfoG.connect(osc.frequency);

    const vGain = ctx.createGain(); vGain.gain.value = 0;      // voicing envelope
    const srcMix = ctx.createGain();
    osc.connect(vGain); vGain.connect(srcMix);
    const aspSrc = ctx.createBufferSource(); aspSrc.buffer = this.noiseBuf; aspSrc.loop = true;
    const aspG = ctx.createGain(); aspG.gain.value = 0;        // aspiration/breath -> formants
    aspSrc.connect(aspG); aspG.connect(srcMix);

    // parallel formant bank: F1 direct, F2-F4 via hiBus (nasal murmur damps the highs)
    const utterG = ctx.createGain();
    const hiBus = ctx.createGain(); hiBus.connect(utterG);
    const FQ = [7, 10, 12, 14], FG = [0.9, 1.0, 0.7, 0.32], filts = [];
    for (let i = 0; i < 4; i++) {
      const f = ctx.createBiquadFilter(); f.type = "bandpass";
      f.Q.value = FQ[i] / VOICE_PARAMS.bwScale;
      const g = ctx.createGain(); g.gain.value = FG[i];
      srcMix.connect(f); f.connect(g); g.connect(i === 0 ? utterG : hiBus);
      filts.push(f);
    }
    filts[3].frequency.value = 3300;                            // fixed F4, naturalness only

    // frication path — bypasses the formant bank (Klatt parallel path)
    const fricSrc = ctx.createBufferSource(); fricSrc.buffer = this.noiseBuf; fricSrc.loop = true;
    const fricF = ctx.createBiquadFilter(); fricF.type = "bandpass";
    const fricG = ctx.createGain(); fricG.gain.value = 0;
    fricSrc.connect(fricF); fricF.connect(fricG); fricG.connect(utterG);
    utterG.connect(this.voiceBus);

    // ---- schedule: formants ramp THROUGH targets (pin previous, then ramp — the b/d/g cue)
    const prevF = [null, null, null];
    let prevAmp = 0, prevDamp = 1, prevBreath = 0;
    for (const s of utt.segs) {
      const at = t0 + s.t0;
      if (s.F) {
        const tr = Math.min(s.trans || 0.05, Math.max(0.015, s.dur * 0.6));
        for (let i = 0; i < 3; i++) {
          const p = filts[i].frequency;
          if (prevF[i] === null) p.setValueAtTime(s.F[i], at);
          else { p.setValueAtTime(prevF[i], at); p.linearRampToValueAtTime(s.F[i], at + tr); }
          prevF[i] = s.F[i];
          if (s.F2nd) {           // diphthong: hold, then glide to the second target
            p.setValueAtTime(s.F[i], at + s.dur * 0.45);
            p.linearRampToValueAtTime(s.F2nd[i], at + s.dur);
            prevF[i] = s.F2nd[i];
          }
        }
      }
      const vAt = at + (s.voiceDelay || 0);
      vGain.gain.setValueAtTime(prevAmp, vAt);
      vGain.gain.linearRampToValueAtTime(s.amp, vAt + 0.016);
      prevAmp = s.amp;
      const damp = s.hiDamp == null ? 1 : s.hiDamp;
      if (damp !== prevDamp) {
        hiBus.gain.setValueAtTime(prevDamp, at);
        hiBus.gain.linearRampToValueAtTime(damp, at + 0.02);
        prevDamp = damp;
      }
      const breath = s.amp > 0.3 ? VOICE_PARAMS.breath * 0.4 : 0;   // breathiness rides voicing
      if (breath !== prevBreath) {
        aspG.gain.setValueAtTime(prevBreath, vAt);
        aspG.gain.linearRampToValueAtTime(breath, vAt + 0.02);
        prevBreath = breath;
      }
    }
    const tEnd = t0 + utt.dur;
    vGain.gain.setValueAtTime(prevAmp, tEnd - 0.06);
    vGain.gain.linearRampToValueAtTime(0, tEnd);

    // aspiration events (HH, voiceless-stop VOT) — override the breath baseline
    for (const a of utt.asps) {
      const at = t0 + a.t;
      aspG.gain.setValueAtTime(a.g, at);
      aspG.gain.linearRampToValueAtTime(0.001, at + a.dur);
    }
    // frication: typed noise — instant-attack exponential-decay bursts, shaped fricatives
    for (const fr of utt.frics) {
      const at = t0 + fr.t;
      fricF.frequency.setValueAtTime(fr.cf, at);
      fricF.Q.setValueAtTime(fr.q, at);
      if (fr.burst) {
        fricG.gain.setValueAtTime(fr.g, at);
        fricG.gain.exponentialRampToValueAtTime(0.0001, at + fr.dur);
        fricG.gain.setValueAtTime(0, at + fr.dur + 0.001);
      } else {
        fricG.gain.setValueAtTime(0, at);
        fricG.gain.linearRampToValueAtTime(fr.g, at + 0.015);
        fricG.gain.setValueAtTime(fr.g, at + Math.max(0.02, fr.dur - 0.02));
        fricG.gain.linearRampToValueAtTime(0, at + fr.dur);
      }
    }
    // pitch contour
    const fp = osc.frequency;
    fp.setValueAtTime(utt.pitch[0][1], t0 + utt.pitch[0][0]);
    for (let i = 1; i < utt.pitch.length; i++)
      fp.linearRampToValueAtTime(utt.pitch[i][1], t0 + utt.pitch[i][0]);

    // utterance master envelope (belt-and-braces declick)
    utterG.gain.setValueAtTime(0, ctx.currentTime);
    utterG.gain.setValueAtTime(1, t0 - 0.02);
    utterG.gain.setValueAtTime(1, tEnd + 0.02);
    utterG.gain.linearRampToValueAtTime(0, tEnd + 0.12);

    // radio squelch: static bed keys up just before the voice, clicks off after
    if (VOICE_PARAMS.radio.on) {
      const g = this.staticGain.gain, lvl = VOICE_PARAMS.radio.static;
      g.cancelScheduledValues(ctx.currentTime);
      g.setValueAtTime(0, ctx.currentTime);
      g.setValueAtTime(lvl * 6, t0 - 0.07);
      g.linearRampToValueAtTime(lvl, t0 - 0.03);
      g.setValueAtTime(lvl, tEnd + 0.05);
      g.setValueAtTime(lvl * 5, tEnd + 0.07);
      g.linearRampToValueAtTime(0, tEnd + 0.11);
    }

    const sources = [osc, lfo, aspSrc, fricSrc];
    for (const s of sources) s.start(ctx.currentTime);
    for (const s of sources) s.stop(tEnd + 0.3);
    osc.onended = () => { if (this.cur && this.cur.osc === osc) this.cur = null; };
    this.cur = { sources, utterG, osc };
    return utt;
  },
};

// ---------- Input ----------
// One input layer serves both keyboard and gamepad. Everything downstream only ever calls
// input.left()/right()/thrust()/fire()/shield() — it never reads keys{} or the gamepad directly,
// so the two input methods stay swappable and Phase 8's rebinding UI has a single table to edit.

const keys = {};

// W3C "Standard Gamepad" button/axis layout (developer.mozilla.org/en-US/docs/Web/API/Gamepad).
// These are the physical hardware indices, not tunable balance — they name the binding table below.
const GP = {
  A: 0, B: 1, X: 2, Y: 3,          // face buttons
  LB: 4, RB: 5, LT: 6, RT: 7,      // shoulders / triggers
  BACK: 8, START: 9,               // center buttons
  LS: 10, RS: 11,                  // stick presses
  DPAD_UP: 12, DPAD_DOWN: 13, DPAD_LEFT: 14, DPAD_RIGHT: 15,
  AXIS_LX: 0, AXIS_LY: 1, AXIS_RX: 2, AXIS_RY: 3   // analog axis indices
};

// Human-readable names for the Controls screen (F8) — button index -> label.
const GP_NAME = {
  0: "A", 1: "B", 2: "X", 3: "Y", 4: "LB", 5: "RB", 6: "LT", 7: "RT",
  8: "Back", 9: "Start", 10: "L-Stick", 11: "R-Stick",
  12: "D-Pad ↑", 13: "D-Pad ↓", 14: "D-Pad ←", 15: "D-Pad →"
};

// The binding table — the single source of truth for what triggers each action, as DATA (not
// per-action logic) so Phase 8 can render/rebind it directly. Each action lists the keyboard keys
// (lowercased, matching the keys{} map), the gamepad buttons, and optionally one analog axis
// (dir < 0 = negative half past the deadzone, dir > 0 = positive half). `fixed:true` marks the
// menu/system actions that F7 spec'd as non-rebindable (A confirm / B back / Start pause).
const bindings = {
  // Gameplay actions (held-state, polled every frame). Rebindable in Phase 8.
  left:    { label: "Rotate CCW", fixed: false, keys: ["arrowleft", "a"],  buttons: [GP.DPAD_LEFT],  axis: { index: GP.AXIS_LX, dir: -1 } },
  right:   { label: "Rotate CW",  fixed: false, keys: ["arrowright", "d"], buttons: [GP.DPAD_RIGHT], axis: { index: GP.AXIS_LX, dir: +1 } },
  thrust:  { label: "Thrust",     fixed: false, keys: ["arrowup", "w"],    buttons: [GP.DPAD_UP],    axis: { index: GP.AXIS_LY, dir: -1 } },
  fire:    { label: "Fire",       fixed: false, keys: [" "],               buttons: [GP.A] },
  shield:  { label: "Shield",     fixed: false, keys: ["shift"],           buttons: [GP.RT, GP.RB] }, // gap-fill: no controller shield was spec'd (see notes)
  // Menu / system actions (edge-triggered). Fixed per F7 — not exposed to rebinding.
  confirm: { label: "Confirm",    fixed: true,  keys: ["enter"],           buttons: [GP.A] },
  // back is context-aware (v3.0 P4): inside a menu it backs out; on title/gameover with no menu, B
  // opens OPTIONS directly (keyboard equivalent is "o", handled inline). ESC is shared with pause below.
  back:    { label: "Back",       fixed: true,  keys: ["escape"],          buttons: [GP.B] },
  // pause is ESC (P retired, v3.0 P4 FLAG P4-a): ESC pauses during play; inside a menu the keydown
  // handler resolves confirm->back->pause in order, so ESC there means "back" (back matches first).
  pause:   { label: "Pause",      fixed: true,  keys: ["escape"],          buttons: [GP.START] }
};

// The rebindable actions (the fixed:false gameplay ones) and a pristine snapshot of their shipped
// defaults, captured BEFORE any saved settings are applied (loadSettings runs later). The Controls
// screen's "Return to Defaults" (F8) restores exactly this. Keep the snapshot deep — mutating a
// binding must never reach back into it.
const REBINDABLE = Object.keys(bindings).filter(n => !bindings[n].fixed); // left/right/thrust/fire/shield
const DEFAULT_BINDINGS = {};
for (const n of REBINDABLE) {
  const b = bindings[n];
  DEFAULT_BINDINGS[n] = {
    keys: b.keys.slice(),
    buttons: (b.buttons || []).slice(),
    axis: b.axis ? { index: b.axis.index, dir: b.axis.dir } : null
  };
}

// Snapshot of the first connected gamepad, refreshed once per frame by pollGamepad() (main loop,
// before update()). buttons/axes are the current frame; prevButtons is last frame, for edge detection.
const gamepad = { connected: false, buttons: [], axes: [], prevButtons: [] };

function pollGamepad() {
  const pads = (navigator.getGamepads && navigator.getGamepads()) || [];
  let pad = null;
  for (const p of pads) { if (p) { pad = p; break; } }   // first connected only; ignore the rest (F7)
  gamepad.prevButtons = gamepad.buttons;                 // keep last frame's booleans for edge detection
  if (!pad) { gamepad.connected = false; gamepad.buttons = []; gamepad.axes = []; return; }
  gamepad.connected = true;
  // GamepadButton objects expose .pressed; some environments hand back raw numbers — support both.
  gamepad.buttons = pad.buttons.map(b => (b && typeof b === "object") ? b.pressed : b > 0.5);
  gamepad.axes = pad.axes.slice();
}

// --- Binding resolution (shared by held-state predicates and edge-triggered menu reads) ---
function kbActive(b) {              // any bound keyboard key currently down?
  for (const k of b.keys) if (keys[k]) return true;
  return false;
}
function gpActive(b) {              // any bound gamepad button held, or the bound axis past its deadzone?
  if (!gamepad.connected) return false;
  if (b.buttons) for (const i of b.buttons) if (gamepad.buttons[i]) return true;
  if (b.axis) {
    const v = gamepad.axes[b.axis.index];
    if (v !== undefined && (b.axis.dir < 0 ? v < -GP_DEADZONE : v > GP_DEADZONE)) return true;
  }
  return false;
}
function actionHeld(name) {         // held-state: keyboard OR gamepad, for the gameplay predicates
  const b = bindings[name];
  return kbActive(b) || gpActive(b);
}
function gpPressed(b) {             // gamepad edge: a bound button newly pressed THIS frame (not held)
  if (!gamepad.connected || !b.buttons) return false;
  for (const i of b.buttons) if (gamepad.buttons[i] && !gamepad.prevButtons[i]) return true;
  return false;
}

// The predicate object the rest of the game reads — call signature unchanged from before F7.
const input = {
  left:   () => actionHeld("left"),
  right:  () => actionHeld("right"),
  thrust: () => actionHeld("thrust"),
  fire:   () => actionHeld("fire"),
  shield: () => actionHeld("shield")
};

// Keyboard events. Three input CONTEXTS, checked in priority order so they never fight (F8):
//   (1) rebind capture  — the pressed key IS the new binding (or Esc cancels). Consumed entirely.
//   (2) menu open       — keys drive menu navigation only, never the ship.
//   (3) normal play      — recorded into keys{} for input.*(), plus the confirm/pause edges.
// Crucially, (1) and (2) return WITHOUT writing keys{}, so a menu keypress (or a captured rebind)
// can never leak through into ship rotation/thrust.
window.addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  AudioSys.init(); AudioSys.resume();

  // (1) Rebind capture — exclusive; the key never reaches gameplay or nav.
  if (game.menu.rebinding) {
    e.preventDefault();
    if (game.menu.rebinding.device === "key") captureKeyRebind(k);
    else if (k === "escape") { game.menu.rebinding = null; AudioSys.ui(false); } // Esc cancels a pad-capture
    return;
  }

  // (2) A menu is open — route to menu navigation, do NOT record gameplay keys.
  if (menuActive()) {
    e.preventDefault();
    // Browser key auto-repeat (~30/sec while held) would otherwise spam menu actions — e.g. spin
    // the 3-value Music Track row back to its start and re-enter setState() nearly every frame,
    // restarting the crossfade ramp and pinning the music near-silent. Matches the gamepad path
    // (handleGamepadMenu -> menuNavEdges()), which is already strictly edge-detected.
    if (e.repeat) return;
    handleMenuKey(k);
    return;
  }

  // (3) Normal play/title/gameover keyboard input.
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
  keys[k] = true;

  // v3.6 P6: high-score initials entry (live only on "gameover", armed at the "dying"->"gameover"
  // seam) intercepts nav/confirm here — and returns, so a confirm that just committed the entry
  // (clearing game.entry) can't fall through to the startGame() check below in the SAME keypress.
  // e.repeat guard matches the v3.5 P1 menu-nav fix (a held key must not spin the letter).
  if (game.entry) {
    if (!e.repeat) {
      if (k === "arrowup" || k === "w") entryInput("up");
      else if (k === "arrowdown" || k === "s") entryInput("down");
      else if (k === "arrowleft" || k === "a") entryInput("left");
      else if (k === "arrowright" || k === "d") entryInput("right");
      else if (bindings.confirm.keys.includes(k)) entryInput("confirm");
    }
    return;
  }

  // THE LOAD-BEARING GUARD (v3.6 P6, §10): without `&& !game.entry`, confirm would restart the run
  // instead of committing the initials — belt-and-suspenders alongside the early return above, in
  // case entry-handling is ever restructured.
  if (bindings.confirm.keys.includes(k) && (game.state === "title" || game.state === "gameover") && !game.entry) startGame();
  if (bindings.pause.keys.includes(k) && game.state === "playing") openPause();
  // "O" opens OPTIONS directly from title/gameover (v3.0 P4 replaced the old P->options path; CS012 P4
  // FORK-CS012-C → a replaced the Options/Achievements system-menu root with Options itself). No game to
  // pause here — openPause() routes to the Options screen off game.state.
  // Guarded off during initials entry so O can't pop the menu mid-entry.
  if (k === "o" && (game.state === "title" || game.state === "gameover") && !game.entry) openPause();
});
window.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

// Gamepad menu/system dispatcher, mirroring the keydown handler's three contexts. Called once per
// frame from the main loop right after pollGamepad(). Same priority order:
//   (1) rebind capture (pad) — the first newly-pressed button becomes the binding; nothing else.
//   (2) menu open            — D-Pad / L-Stick nav, A confirm, B back, Start resume.
//   (3) normal play          — Start starts/pauses, A confirms on title/gameover (never mid-play).
function handleGamepadMenu() {
  // (1) Capturing a binding: exclusive. A pad-capture eats the next button; a key-capture ignores
  // the pad entirely (so it can't navigate the menu while the player is picking a keyboard key).
  if (game.menu.rebinding) {
    if (game.menu.rebinding.device === "pad") {
      const btn = firstPressedButton();
      if (btn !== -1) capturePadRebind(btn);
    }
    return;
  }

  const pressedStart   = gpPressed(bindings.pause);
  const pressedConfirm = gpPressed(bindings.confirm);
  const pressedBack    = gpPressed(bindings.back);
  if (pressedStart || pressedConfirm || pressedBack) { AudioSys.init(); AudioSys.resume(); } // best-effort audio unlock

  // (2) A menu is open — everything routes to menu navigation.
  if (menuActive()) {
    const nav = menuNavEdges();
    if (nav.up)    menuInput("up");
    if (nav.down)  menuInput("down");
    if (nav.left)  menuInput("left");
    if (nav.right) menuInput("right");
    if (pressedConfirm) menuInput("confirm");
    if (pressedBack)    menuInput("back");
    if (pressedStart)   menuInput("pause");   // Start fully resumes from any menu screen
    return;
  }

  // (2.5) v3.6 P6: high-score initials entry — same edge-detected latch as real menu nav
  // (menuNavEdges is already strictly edge-detected; gpPressed(confirm) already excludes held-button
  // repeats), so a held stick/button can't spin the letter or double-commit. Swallows Start/B too —
  // nothing should interrupt entry — mirroring the keyboard path's early guard on "o".
  if (game.entry) {
    const nav = menuNavEdges();
    if (nav.up)    entryInput("up");
    if (nav.down)  entryInput("down");
    if (nav.left)  entryInput("left");
    if (nav.right) entryInput("right");
    if (pressedConfirm) entryInput("confirm");
    return;
  }

  // (3) Not in a menu: session/system inputs, keyed on state. The else-if chain guarantees a single
  // frame can't both open a menu AND start a game (FLAG P4-b); priority Start > B > A.
  //   Start = session toggle : title/gameover -> start a game ; playing -> open pause (resume is the
  //           menu-branch case above).
  //   B     = context-aware  : title/gameover with no menu -> open OPTIONS directly (mirrors ESC/O).
  //   A     = confirm        : title/gameover -> start a game (never mid-play, where A is fire).
  const onTitleOrOver = game.state === "title" || game.state === "gameover";
  if (pressedStart) {
    if (game.state === "playing") openPause();
    else startGame();
  } else if (pressedBack && onTitleOrOver) {
    openPause();
  } else if (pressedConfirm && onTitleOrOver) {
    startGame();
  }
}

// Directional menu nav from the gamepad: D-Pad or Left Stick, edge-detected against a latch so a
// held direction moves the cursor once (not every frame). Only consulted while a menu is open.
const menuNav = { up: false, down: false, left: false, right: false };
function menuDirState() {
  const b = gamepad.buttons, ax = gamepad.axes, dz = GP_DEADZONE;
  return {
    up:    !!b[GP.DPAD_UP]    || (ax[GP.AXIS_LY] < -dz),
    down:  !!b[GP.DPAD_DOWN]  || (ax[GP.AXIS_LY] >  dz),
    left:  !!b[GP.DPAD_LEFT]  || (ax[GP.AXIS_LX] < -dz),
    right: !!b[GP.DPAD_RIGHT] || (ax[GP.AXIS_LX] >  dz)
  };
}
function menuNavEdges() {
  const now = menuDirState();
  const edges = {
    up:    now.up    && !menuNav.up,
    down:  now.down  && !menuNav.down,
    left:  now.left  && !menuNav.left,
    right: now.right && !menuNav.right
  };
  Object.assign(menuNav, now);
  return edges;
}
// Prime the latch to the CURRENT direction state so a direction held at the moment a menu opens
// doesn't fire a phantom first move.
function resetMenuNav() { Object.assign(menuNav, menuDirState()); }
// First gamepad button that went down THIS frame (for pad rebind capture); -1 if none.
function firstPressedButton() {
  const cur = gamepad.buttons, prev = gamepad.prevButtons;
  for (let i = 0; i < cur.length; i++) if (cur[i] && !prev[i]) return i;
  return -1;
}

// ---------- Menu state machine, Options & Rebinding (F8) ----------
// The game's first nested menu: playing --(pause)--> menu:root (Continue/Options/Quit) -->
// menu:options (SFX/Music/Master sliders + Controls) --> menu:controls (rebind + Return to Defaults).
// game.paused is true iff a menu is open; game.menu.screen names the current screen (null = closed).
// Both keyboard (keydown -> handleMenuKey) and gamepad (handleGamepadMenu) funnel discrete actions
// into menuInput(action); the rendering lives near draw() (drawMenu). Gameplay stays frozen the
// whole time (update() early-returns on paused), so menu input can never move the ship.

// The root ("PAUSED"/"MENU") screen is context-aware. CS012 P4 (FORK-CS012-C → a) retired the
// separate system-menu root (the old MENU_ROOT_SYS = ["Options","Achievements","Back"]): from
// title, O/Start/B open OPTIONS directly (openPause routes there off game.state), so title has no
// root layout at all. CS013 P1 (FORK-CS013-A → a) restores a root for gameover — a session-end state
// with its own session verbs (Play Again / Quit to Title) — distinct from the paused-mid-game root
// (Continue / Quit). rootItems() picks the layout off game.state; update() skips the sim outside
// "playing", so game.paused is safe in any state.
const MENU_ROOT_PLAY = ["Continue", "Options", "Quit"];             // paused mid-game
const MENU_ROOT_OVER = ["Play Again", "Options", "Quit to Title"];  // gameover (CS013 P1)
const MENU_HINT_SIZE = 16;  // CS013 P2: control-hint footer text size (drawMenuHint) — playtest knob
const ACH_SCALE = 1.5;      // CS013 P3: Achievements-viewer text-size multiplier (readability pass) — playtest knob
const ACH_SCROLL_STEP = 60; // CS013 P3: px per up/down scroll press in the Achievements viewer, ~one row — playtest knob
function rootItems() { return game.state === "gameover" ? MENU_ROOT_OVER : MENU_ROOT_PLAY; }
// menuOptions()/drawOptionsMenu() dispatch by LABEL (like menuRoot), not by hardcoded index, so
// adding a row here is purely additive and can't silently shift the other handlers out from under
// themselves. CS010 P4 (§9/§10a): the three volume sliders + Music Track moved OFF this screen onto
// the new "Sound / Music" sub-screen (SOUND_ROWS below); "High Scores" (§8b) moved IN, nested here.
const MENU_OPTIONS = ["Sound / Music", "Controls", "Achievements", "High Scores", "Difficulty", "Back"];
// CS010 P4 (§9): the Sound/Music sub-screen's rows, same template as DIFFICULTY_ROWS. CS010 P9 (§11c)
// added the Voice Volume slider — SOUND_ROWS + VOL_LABELS + VOL_CATS grow together so the parallel
// label→category lookup stays paired. CS011 P3 added "Voice" (style picker) + "Captions" (toggle),
// both dispatched by label in menuSound/drawSound like the existing Music Track cycler.
const SOUND_ROWS   = ["SFX Volume", "Music Volume", "Master Volume", "Voice Volume", "Voice", "Captions", "Music Track", "Back"];
const VOL_CATS     = ["sfx", "music", "master", "voice"]; // parallel to VOL_LABELS (NOT to any MENU_OPTIONS/SOUND_ROWS position)
const VOL_LABELS   = ["SFX Volume", "Music Volume", "Master Volume", "Voice Volume"]; // the slider rows, by label
const VOL_STEP     = 0.1;                         // per left/right nudge on a volume slider
const clamp01 = v => Math.max(0, Math.min(1, v));

// Difficulty options (v3.0 P5, B-4/B-5): powerup-expiry modes, persisted additively in afd_settings_v1.
// Both default to "time" so the shipped timed behaviour is unchanged until a player opts in via the
// Options -> Difficulty screen. Structured to grow with future difficulty knobs (FLAG B-4-c).
const settings = {
  shotPowerupMode: "time", // "time" | "shots"  — governs Rapid Fire + Triple Shot expiry
  magnetMode:      "time", // "time" | "pieces" — governs Magnet expiry
  musicTrack:      "zen",  // "zen" | "derelict" | "drift" | "warehouse" — selected gameplay track (v3.5; zen default)
  shipTurnScale:   SHIP_TURN_SCALE_DEFAULT, // CS010 §10b: player rotation-speed multiplier (0.5..1.5), read by shipTurnRate()
  voiceStyle:      "comms", // CS011: selected Dan voice — "off" or a VOICE_STYLE_VALUES id. NOT persisted yet (later phase).
  captions:        true,    // CS011: show on-screen captions of Dan's lines. NOT persisted yet (later phase).
  autoShield:      false,   // CS012 P5: auto-raise the shield on a hit at critical hull (costs energy + AUTO_SHIELD_SCORE_PENALTY). Off by default.
};

// CS011: Dan speaks only when a real voice style is selected. voiceStyle "off" mutes him without disturbing
// VOICE_PARAMS (which keeps the last real style so the acoustic engine always has a valid full object).
function voiceEnabled() { return settings.voiceStyle !== "off"; }

// Music-track picker. Internal values drive gameplay-track selection; the labels are what the Options
// row shows. Cycled left/right like a Difficulty toggle. Ordered calm -> hot (v3.5).
const MUSIC_TRACK_VALUES = ["zen", "derelict", "drift", "warehouse"];
const MUSIC_TRACK_LABELS = { zen: "Zen", derelict: "Derelict", drift: "Drift", warehouse: "Warehouse" };

// CS011 P3: display labels for the Voice-style picker, parallel to VOICE_STYLE_VALUES.
const VOICE_STYLE_LABELS = { off: "Off", comms: "Comms", comms_f: "Comms ♀", flat: "Monotone", flat_f: "Monotone ♀", vintage: "Computer", vintage_f: "Computer ♀" };

function menuActive() { return game.paused; } // paused <=> a pause-menu screen is open

// --- Open / close / quit ---
function openPause() {
  game.paused = true;
  // CS012 P4 (FORK-CS012-C → a): paused mid-game opens the root menu; from title, O/Start/B open
  // OPTIONS directly (no separate system-menu root) — openPause routes off game.state. CS013 P1
  // (FORK-CS013-A → a): gameover is a session-end state with real session verbs (Play Again/Quit to
  // Title), so it now ALSO opens the root — a context-aware one, see rootItems(). Title alone has no
  // session verbs and keeps going straight to Options.
  game.menu.screen = (game.state === "playing" || game.state === "gameover") ? "root" : "options"; game.menu.index = 0; game.menu.row = 0; game.menu.col = 0;
  game.menu.rebinding = null;
  resetMenuNav();          // don't let a direction held at pause-time fire a phantom move
  AudioSys.thrust(false);  // kill the thrust loop immediately (update() would too, next frame)
  AudioSys.lowhp(false); game.lowHpSiren = false; // same — the siren must not drone through a pause menu
  game.hpReliefFlash = 0; // CS010 P3: a stale relief exhale must not survive a pause (the siren latch is torn down directly here, bypassing the falling-edge branch)
  AudioSys.ui(true);
}
function closePause() {
  game.paused = false;
  game.menu.screen = null; game.menu.rebinding = null;
  game.menu.index = 0; game.menu.row = 0; game.menu.col = 0;
  AudioSys.ui(false);
}
function quitToTitle() {
  game.paused = false;
  game.menu.screen = null; game.menu.rebinding = null;
  game.state = "title";
  AudioSys.thrust(false); AudioSys.saucer(false); // stop any continuous voices
  AudioSys.lowhp(false); game.lowHpSiren = false;
  game.hpReliefFlash = 0; // CS010 P3: no stale relief exhale survives a quit-to-title
  game.caption.life = 0;  // CS011 P2: no stale voice caption lingers into the title
  Achievements.save();  // persist lifetime progress earned during the abandoned game (F9)
  AudioSys.ui(false);
}
function gotoScreen(s, index) {
  game.menu.screen = s;
  game.menu.index = index || 0; game.menu.row = 0; game.menu.col = 0; game.menu.scroll = 0;
  AudioSys.ui(true);
}

// --- Keyboard -> menu action mapping (arrows + WASD nav; Enter/Esc/P via the binding table) ---
function handleMenuKey(k) {
  if (k === "arrowup" || k === "w") menuInput("up");
  else if (k === "arrowdown" || k === "s") menuInput("down");
  else if (k === "arrowleft" || k === "a") menuInput("left");
  else if (k === "arrowright" || k === "d") menuInput("right");
  else if (bindings.confirm.keys.includes(k)) menuInput("confirm"); // Enter
  else if (bindings.back.keys.includes(k)) menuInput("back");       // Esc
  else if (bindings.pause.keys.includes(k)) menuInput("pause");     // P
}

// --- The dispatcher: one entry point, both input methods feed it ---
function menuInput(action) {
  if (game.menu.rebinding) return; // capture mode owns all input; ignore stray nav
  switch (game.menu.screen) {
    case "root":         menuRoot(action); break;
    case "options":      menuOptions(action); break;
    case "sound":        menuSound(action); break;
    case "controls":     menuControls(action); break;
    case "difficulty":   menuDifficulty(action); break;
    case "achievements": menuAchievements(action); break;
    case "highscores":   menuHighScores(action); break;
  }
}

function menuRoot(a) {
  const m = game.menu, items = rootItems(), N = items.length;
  if (a === "up")   { m.index = (m.index + N - 1) % N; AudioSys.ui(false); }
  else if (a === "down") { m.index = (m.index + 1) % N; AudioSys.ui(false); }
  else if (a === "confirm") {
    // CS013 P1: the root is context-aware (see rootItems()) — paused mid-game gives
    // Continue/Options/Quit, gameover gives Play Again/Options/Quit to Title. Dispatch by label
    // (menuOptions precedent) so the two layouts share one handler without an index branch.
    const label = items[m.index];
    if (label === "Continue")          closePause();
    else if (label === "Play Again")   startGame();
    else if (label === "Options")      gotoScreen("options");
    else if (label === "Quit")         quitToTitle();
    else if (label === "Quit to Title") quitToTitle();
  }
  else if (a === "back" || a === "pause") closePause();
}

// Dispatch by LABEL (the menuRoot precedent), not by hardcoded index, so a new row is additive and
// no index-fragile branch has to shift. CS010 P4 (§8b/§9/§10a): now a pure nav list — the volume
// sliders + Music Track moved to "sound" (below), and "High Scores" (§8b) was nested in here.
function menuOptions(a) {
  const m = game.menu, N = MENU_OPTIONS.length, label = MENU_OPTIONS[m.index];
  if (a === "up")   { m.index = (m.index + N - 1) % N; AudioSys.ui(false); }
  else if (a === "down") { m.index = (m.index + 1) % N; AudioSys.ui(false); }
  else if (a === "confirm") {
    if (label === "Sound / Music") gotoScreen("sound"); // CS010 P4 §9
    else if (label === "Controls") gotoScreen("controls");
    else if (label === "Achievements") gotoScreen("achievements"); // viewer (F9)
    else if (label === "High Scores") gotoScreen("highscores"); // CS010 P4 §8b: nested under Options
    else if (label === "Difficulty") gotoScreen("difficulty"); // Difficulty screen (v3.0 P5)
    // CS012 P4 / CS013 P1: Back is context-aware — paused mid-game OR gameover (both have a root)
    // return to it (cursor on Options); from title, where Options is the top-level dialog, it closes
    // the overlay entirely.
    else if (label === "Back") { if (game.state === "playing" || game.state === "gameover") gotoScreen("root", rootItems().indexOf("Options")); else closePause(); }
  }
  else if (a === "back") { if (game.state === "playing" || game.state === "gameover") gotoScreen("root", rootItems().indexOf("Options")); else closePause(); }
  else if (a === "pause") closePause();
}

// Sound / Music sub-screen (CS010 P4, §9): the three volume sliders + Music Track cycler, relocated
// off Options — a relocation, not a redesign, so it's the SAME control style. Follows the
// menuDifficulty/menuOptions label-dispatch template exactly; VOL_LABELS/VOL_CATS stay a paired
// lookup (not tied to any row's position on THIS screen either).
function menuSound(a) {
  const m = game.menu, N = SOUND_ROWS.length, label = SOUND_ROWS[m.index];
  if (a === "up")   { m.index = (m.index + N - 1) % N; AudioSys.ui(false); }
  else if (a === "down") { m.index = (m.index + 1) % N; AudioSys.ui(false); }
  else if (a === "left" || a === "right") {
    const vi = VOL_LABELS.indexOf(label);
    if (vi >= 0) { // a volume slider
      const cat = VOL_CATS[vi];
      AudioSys.setVol(cat, clamp01(AudioSys.vol[cat] + (a === "right" ? VOL_STEP : -VOL_STEP)));
      saveSettings();
      AudioSys.ui(false);
    } else if (label === "Music Track") { // cycle the gameplay-track selection (same idiom as Difficulty toggles)
      const idx = MUSIC_TRACK_VALUES.indexOf(settings.musicTrack), n = MUSIC_TRACK_VALUES.length;
      settings.musicTrack = MUSIC_TRACK_VALUES[(idx + (a === "right" ? 1 : -1) + n) % n];
      saveSettings();
      AudioSys.ui(false);
    } else if (label === "Voice") { // cycle Dan's voice style (same idiom as Music Track)
      const idx = VOICE_STYLE_VALUES.indexOf(settings.voiceStyle), n = VOICE_STYLE_VALUES.length;
      settings.voiceStyle = VOICE_STYLE_VALUES[(idx + (a === "right" ? 1 : -1) + n) % n];
      VoiceSys.setStyle(settings.voiceStyle);
      saveSettings();
      AudioSys.ui(false);
    } else if (label === "Captions") { // toggle on-screen captions
      settings.captions = !settings.captions;
      saveSettings();
      AudioSys.ui(false);
    }
  }
  else if (a === "confirm") {
    if (label === "Back") gotoScreen("options", MENU_OPTIONS.indexOf("Sound / Music"));
  }
  else if (a === "back") gotoScreen("options", MENU_OPTIONS.indexOf("Sound / Music"));
  else if (a === "pause") closePause();
}

// Achievements viewer (F9): a read-only list — no rows to select, so nav does nothing and any
// of confirm/back/pause exits back to Options (cursor left on the "Achievements" row).
function menuAchievements(a) {
  if (a === "pause") closePause();
  // CS013 P3: up/down drive the continuous vertical scroll (FLAG-2c) — the viewer has no row
  // selection to conflict with. Keyboard and gamepad d-pad/L-stick both normalize to "up"/"down"
  // through menuInput, so this covers both inputs uniformly. Clamped against the SAME achMaxScroll()
  // drawAchievements() renders with, so input and render never disagree about the scroll ceiling.
  else if (a === "up")   game.menu.scroll = Math.max(0, game.menu.scroll - ACH_SCROLL_STEP);
  else if (a === "down") game.menu.scroll = Math.min(achMaxScroll(), game.menu.scroll + ACH_SCROLL_STEP);
  // CS012 P4: Achievements now lives ONLY under Options (reached the same way from title/gameover AND
  // from pause), so Back always returns to Options with the cursor on "Achievements" — the old
  // achReturn tracker (which distinguished a direct system-root entry) is retired.
  else if (a === "confirm" || a === "back") gotoScreen("options", MENU_OPTIONS.indexOf("Achievements"));
}

// High Scores viewer: read-only top-10 table, nested under Options (CS010 P4 §8b) — reachable from
// BOTH title/gameover (via Options) and the pause menu mid-game, unlike the old root-only entry. One
// entry point -> one back-destination, no return-context tracker needed (like Achievements as of CS012 P4).
function menuHighScores(a) {
  if (a === "pause") closePause();
  else if (a === "confirm" || a === "back") gotoScreen("options", MENU_OPTIONS.indexOf("High Scores"));
}

// Difficulty screen (v3.0 P5, B-4/B-5): two left/right mode toggles + Back. Left picks the timed
// default, right picks the count variant, matching the on-screen "Time | Shots/Pieces" layout.
// Structured to grow with future difficulty knobs (FLAG B-4-c): add a row here + a case in the
// switch and the renderer picks it up.
const DIFFICULTY_ROWS = ["shot", "magnet", "autoshield", "back"];
function menuDifficulty(a) {
  const m = game.menu, N = DIFFICULTY_ROWS.length;
  const row = DIFFICULTY_ROWS[m.index];
  if (a === "up")   { m.index = (m.index + N - 1) % N; AudioSys.ui(false); }
  else if (a === "down") { m.index = (m.index + 1) % N; AudioSys.ui(false); }
  else if (a === "left" || a === "right") {
    if (row === "shot")        { settings.shotPowerupMode = a === "right" ? "shots"  : "time"; saveSettings(); AudioSys.ui(false); }
    else if (row === "magnet") { settings.magnetMode      = a === "right" ? "pieces" : "time"; saveSettings(); AudioSys.ui(false); }
    else if (row === "autoshield") { settings.autoShield  = a === "right"; saveSettings(); AudioSys.ui(false); }
  }
  else if (a === "confirm") {
    if (row === "back") gotoScreen("options", MENU_OPTIONS.indexOf("Difficulty"));
  }
  else if (a === "back") gotoScreen("options", MENU_OPTIONS.indexOf("Difficulty"));
  else if (a === "pause") closePause();
}

function menuControls(a) {
  const m = game.menu;
  const ACTIONS = REBINDABLE;               // one row per rebindable action, col 0 = kb, col 1 = pad
  // Row order: [rebindable actions...], Ship Rotation slider (§10b), Return to Defaults, Back. Derive
  // the three trailing indices from ACTIONS.length so inserting the slider row can't desync them (nor
  // can adding/removing a rebindable action later). drawControlsMenu derives them the same way.
  const turnRow = ACTIONS.length;
  const defaultsRow = ACTIONS.length + 1, backRow = ACTIONS.length + 2;
  const ROWS = ACTIONS.length + 3;          // + Ship Rotation + Return to Defaults + Back
  if (a === "up")   { m.row = (m.row + ROWS - 1) % ROWS; AudioSys.ui(false); }
  else if (a === "down") { m.row = (m.row + 1) % ROWS; AudioSys.ui(false); }
  else if (a === "left" || a === "right") {
    if (m.row < ACTIONS.length) { m.col = 1 - m.col; AudioSys.ui(false); }                          // toggle kb/pad column
    else if (m.row === turnRow) { adjustShipTurnScale(a === "right" ? 1 : -1); AudioSys.ui(false); } // §10b rotation slider
  }
  else if (a === "confirm") {
    if (m.row < ACTIONS.length) startRebind(ACTIONS[m.row], m.col === 0 ? "key" : "pad");
    // turnRow has no confirm action — it's a ◄/► slider (Paul: rotation returns to default manually).
    else if (m.row === defaultsRow) { returnToDefaults(); AudioSys.ui(true); }
    else if (m.row === backRow) gotoScreen("options", MENU_OPTIONS.indexOf("Controls")); // back to Options, cursor on "Controls"
  }
  else if (a === "back") gotoScreen("options", MENU_OPTIONS.indexOf("Controls"));
  else if (a === "pause") closePause();
}

// --- Live rebinding capture ---
// startRebind arms capture for (action, device); the next key (keydown) or button (handleGamepadMenu)
// is written into the binding. The captured input is consumed by those handlers BEFORE keys{} or
// nav, so it can never leak into ship control.
function startRebind(action, device) {
  game.menu.rebinding = { action, device };
  AudioSys.ui(true);
}
function captureKeyRebind(k) {
  if (k === "escape") { game.menu.rebinding = null; AudioSys.ui(false); return; } // cancel
  const action = game.menu.rebinding.action;
  bindings[action].keys = [k];   // replace with the single chosen key
  game.menu.rebinding = null;
  saveSettings();
  AudioSys.ui(true);
}
function capturePadRebind(btn) {
  const action = game.menu.rebinding.action;
  bindings[action].buttons = [btn]; // chosen button replaces the button set...
  bindings[action].axis = null;     // ...and drops the analog axis so the shown binding matches reality
  game.menu.rebinding = null;
  saveSettings();
  AudioSys.ui(true);
}
// Controls-screen "Return to Defaults": resets rebindable key/pad bindings ONLY.
// FLAG-10a (CS010 §10b): this deliberately does NOT reset settings.shipTurnScale — Paul asked that the
// rotation-speed slider return to 100% MANUALLY, not via this button. Do NOT "fix" it to also reset
// shipTurnScale; that would reverse an explicit design call. (Counter-intuitive because the slider row
// lives on this same screen, hence this comment.)
function returnToDefaults() {
  for (const name of REBINDABLE) {
    const d = DEFAULT_BINDINGS[name];
    bindings[name].keys = d.keys.slice();
    bindings[name].buttons = d.buttons.slice();
    bindings[name].axis = d.axis ? { index: d.axis.index, dir: d.axis.dir } : null;
  }
  saveSettings();
}

// CS010 §10b: nudge the rotation-speed preference by one 10% step (dir = +1 for ►, -1 for ◄), clamp to
// [MIN, MAX], snap to the 0.10 grid to kill float accumulation, then persist. Held ◄/► only nudges once
// — the menu-open keydown branch early-returns on e.repeat (v3.5 P1 guard) and the gamepad path is
// edge-detected, so this can never spin.
function adjustShipTurnScale(dir) {
  const stepped = Math.round((settings.shipTurnScale + dir * SHIP_TURN_SCALE_STEP) * 10) / 10;
  settings.shipTurnScale = Math.max(SHIP_TURN_SCALE_MIN, Math.min(SHIP_TURN_SCALE_MAX, stepped));
  saveSettings();
}

// --- Persistence (localStorage, guarded). Note: unavailable in the claude.ai artifact sandbox but
// works as a real local file; a storage failure must never crash the game, so everything is wrapped. ---
// v3.3 P1 rename (Orbital Overhaul): the "afd_" prefix is FROZEN. Renaming this key wipes every
// player's saved settings/bindings on their next load — do not "tidy" it to match the new name.
const STORAGE_KEY = "afd_settings_v1";
function storageOK() {
  try { return typeof localStorage !== "undefined" ? localStorage : null; } catch (e) { return null; }
}
function saveSettings() {
  const ls = storageOK(); if (!ls) return;
  try {
    const data = { vol: { ...AudioSys.vol }, bindings: {},
      shotPowerupMode: settings.shotPowerupMode, magnetMode: settings.magnetMode, // v3.0 P5 (additive)
      musicTrack: settings.musicTrack,                                            // v3.4 P6 (additive)
      shipTurnScale: settings.shipTurnScale,                                      // CS010 §10b (additive)
      voiceStyle: settings.voiceStyle, captions: settings.captions,               // CS011 P3 (additive)
      autoShield: settings.autoShield };                                          // CS012 P5 (additive)
    for (const name of REBINDABLE) {
      const b = bindings[name];
      data.bindings[name] = { keys: b.keys, buttons: b.buttons || [], axis: b.axis || null };
    }
    ls.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) { /* quota / privacy mode / disabled — ignore */ }
}
function loadSettings() {
  const ls = storageOK(); if (!ls) return;
  try {
    const raw = ls.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.vol) {
      // CS010 P9: derive the categories from vol's own keys (now incl. "voice") so a newly-added bus
      // persists automatically — a hardcoded list would silently drop voice volume on every load.
      for (const c of Object.keys(AudioSys.vol))
        if (typeof data.vol[c] === "number") AudioSys.vol[c] = clamp01(data.vol[c]);
    }
    if (data.bindings) {
      for (const name of REBINDABLE) {
        const b = data.bindings[name];
        if (!b) continue;
        if (Array.isArray(b.keys)) bindings[name].keys = b.keys.slice();
        if (Array.isArray(b.buttons)) bindings[name].buttons = b.buttons.slice();
        if ("axis" in b) bindings[name].axis = b.axis ? { index: b.axis.index, dir: b.axis.dir } : null;
      }
    }
    // v3.0 P5: difficulty modes are additive fields — tolerate a missing key (older saves) and only
    // accept a known value, so a corrupt string falls back to the "time" default rather than sticking.
    if (data.shotPowerupMode === "time" || data.shotPowerupMode === "shots") settings.shotPowerupMode = data.shotPowerupMode;
    if (data.magnetMode === "time" || data.magnetMode === "pieces") settings.magnetMode = data.magnetMode;
    // v3.4 P6: only accept a known track name, so a corrupt/unknown value falls back to the default.
    if (MUSIC_TRACK_VALUES.includes(data.musicTrack)) settings.musicTrack = data.musicTrack;
    // CS010 §10b: rotation-speed preference is additive — tolerate a missing key (older saves) and
    // accept only a finite in-range number; anything else (string / NaN-as-null / 99 / 0) snaps to the
    // 1.0 default rather than sticking. Snap to the 0.10 grid so a hand-edited save can't desync the slider.
    if (typeof data.shipTurnScale === "number" && isFinite(data.shipTurnScale) &&
        data.shipTurnScale >= SHIP_TURN_SCALE_MIN && data.shipTurnScale <= SHIP_TURN_SCALE_MAX) {
      settings.shipTurnScale = Math.round(data.shipTurnScale * 10) / 10;
    } else {
      settings.shipTurnScale = SHIP_TURN_SCALE_DEFAULT;
    }
    // CS011 P3: voice style + captions are additive fields — tolerate a missing/corrupt value by
    // leaving the runtime default in place rather than snapping to a wrong fallback. Captions in
    // particular must stay true (the default) unless a real boolean was saved — no else-branch.
    if (VOICE_STYLE_VALUES.includes(data.voiceStyle)) settings.voiceStyle = data.voiceStyle;
    VoiceSys.setStyle(settings.voiceStyle);
    if (typeof data.captions === "boolean") settings.captions = data.captions;
    // CS012 P5: auto-shield is an additive boolean — missing/non-boolean leaves the runtime default (false) in place.
    if (typeof data.autoShield === "boolean") settings.autoShield = data.autoShield;
  } catch (e) { /* corrupt / unreadable — fall back to defaults, don't crash */ }
}
loadSettings(); // apply saved settings (if any) over the shipped defaults, once at startup

// ---------- Helpers ----------
const rand = (a, b) => a + Math.random() * (b - a);
const randSign = () => Math.random() < 0.5 ? -1 : 1;

// Global difficulty ramp (F10). Returns 0 at wave 1 and climbs asymptotically toward 1
// over many waves — the single curve every wave-driven threat parameter scales off.
// RAMP_WAVES sets how fast the whole game gets hard; this is the one knob to turn.
function difficultyFactor(wave) {
  return 1 - Math.exp(-(wave - 1) / RAMP_WAVES);
}
// Interpolate a threat parameter between its easy wave-1 floor and its full-intensity
// ceiling using the difficulty curve. Every early-game pacing value flows through this.
function ramp(floor, ceil, wave) {
  return floor + (ceil - floor) * difficultyFactor(wave);
}

// A difficulty lever scales a quantity from `start` (wave 1) toward `floor` (full difficulty)
// along the SHIPPED difficultyFactor() curve — levers never get their own curve. When
// `enabled` is false the lever is INERT: the quantity is pinned at `start`, so the lever is
// built, wired and testable but does not ramp. `floor` is a HARD CLAMP — a lever can never
// take a quantity below its shipped baseline. See DIFFICULTY-LEVERS.md.
function leverScale(lever, wave) {
  const s = lever.enabled ? ramp(lever.start, lever.floor, wave) : lever.start;
  return Math.max(lever.floor, s);
}

function wrap(obj) {
  if (obj.x < -60) obj.x += WORLD_W;
  if (obj.x > WORLD_W + 60) obj.x -= WORLD_W;
  if (obj.y < -60) obj.y += WORLD_H;
  if (obj.y > WORLD_H + 60) obj.y -= WORLD_H;
}

function dist2(a, b) {
  // shortest distance squared on a wrapping field
  let dx = Math.abs(a.x - b.x); if (dx > WORLD_W / 2) dx = WORLD_W - dx;
  let dy = Math.abs(a.y - b.y); if (dy > WORLD_H / 2) dy = WORLD_H - dy;
  return dx * dx + dy * dy;
}

function angleTo(from, to) {
  let dx = to.x - from.x, dy = to.y - from.y;
  if (dx > WORLD_W / 2) dx -= WORLD_W; if (dx < -WORLD_W / 2) dx += WORLD_W;
  if (dy > WORLD_H / 2) dy -= WORLD_H; if (dy < -WORLD_H / 2) dy += WORLD_H;
  return Math.atan2(dy, dx);
}

function shortDelta(ax, ay, bx, by) {
  // shortest vector from a to b on the wrapping field
  let dx = bx - ax, dy = by - ay;
  if (dx > WORLD_W / 2) dx -= WORLD_W; if (dx < -WORLD_W / 2) dx += WORLD_W;
  if (dy > WORLD_H / 2) dy -= WORLD_H; if (dy < -WORLD_H / 2) dy += WORLD_H;
  return [dx, dy];
}

// Nearest wrapped image offset of a world coord relative to a reference (camera).
function wrapOffset(coord, refCoord, size) {
  const d = coord - refCoord;
  if (d > size / 2) return -size;
  if (d < -size / 2) return size;
  return 0;
}

// Fold a world position into [0,WORLD) — used when placing freshly spawned entities.
function wrapPos(p) {
  p.x = ((p.x % WORLD_W) + WORLD_W) % WORLD_W;
  p.y = ((p.y % WORLD_H) + WORLD_H) % WORLD_H;
  return p;
}

// Vector-glow stroke
function glowStroke(color, width = 1.6, blur = 10) {
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawPoly(points, x, y, angle, color, closed = true) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
  if (closed) ctx.closePath();
  glowStroke(color);
  ctx.restore();
}

// A HUD ring arc: from 12 o'clock, clockwise, sweeping `frac` of a full turn. `frac` is NOT clamped
// here — callers clamp (banking can exceed 1.0, see the overcharge arc). Track-only when frac <= 0.
function drawRingArc(x, y, r, frac, color, width = HUD_RING_W, blur = HUD_RING_BLUR) {
  if (frac <= 0) return;
  ctx.beginPath();
  ctx.arc(x, y, r, -Math.PI / 2, -Math.PI / 2 + TAU * frac);
  glowStroke(color, width, blur);   // never closePath() — an arc, not a poly
}

// A segmented HUD ring: `segs` equal wedges from 12 o'clock, clockwise, each separated by
// HUD_RING_SEG_GAP radians of empty space. Wedges 0..filled-1 are lit (glowStroke, like every
// other ring arc); the rest are a dim, glow-less stroke — same track idiom as the powerup rows'
// full-circle track. STROKE ONLY, no fills — never closePath() — arcs, not polys.
function drawRingSegments(x, y, r, segs, filled, litColor, dimColor) {
  const step = TAU / segs;
  for (let i = 0; i < segs; i++) {
    const start = -Math.PI / 2 + i * step + HUD_RING_SEG_GAP / 2;
    const end = -Math.PI / 2 + (i + 1) * step - HUD_RING_SEG_GAP / 2;
    ctx.beginPath();
    ctx.arc(x, y, r, start, end);
    if (i < filled) {
      glowStroke(litColor, HUD_RING_W, HUD_RING_BLUR);
    } else {
      ctx.strokeStyle = dimColor; ctx.lineWidth = HUD_RING_TRACK_W; ctx.stroke();
    }
  }
}

// ---------- Entities ----------
class Ship {
  constructor() { this.reset(); }
  reset() {
    this.x = WORLD_W / 2; this.y = WORLD_H / 2;
    this.vx = 0; this.vy = 0;
    this.angle = -Math.PI / 2;
    this.cooldown = 0;
    this.dead = false;
    this.hp = SHIP_MAX_HP;  // one hull pool for the whole run (F2)
    this.invuln = 0;        // hit-stun i-frames; set on each non-lethal hit (drives the blink)
    this.shieldOn = false;
    this.energy = 1;        // 0..1
    this.autoShieldRegenLock = 0; // CS013 P4: passive-regen freeze window after an auto-save. Runtime only, no persistence.
    this.thrusting = false;
  }
  update(dt) {
    if (this.dead) return;
    const turn = shipTurnRate() * dt;   // player rotation scale (§10b) + optional cargo-turn penalty (§3), one source
    if (input.left())  this.angle -= turn;
    if (input.right()) this.angle += turn;

    this.thrusting = input.thrust();
    // towed cargo makes the ship heavier: weaker thrust, lower top speed. Scales with
    // the chain's total mass, not its node count (F5) — all-mass-1.0 cargo behaves
    // exactly as the old length-based penalty did.
    const cargo = chainMass();
    const thrustMul = 1 / (1 + cargo * CARGO_THRUST);
    const maxSp = SHIP_MAX_SPEED / (1 + cargo * CARGO_MAXSPD);
    if (this.thrusting) {
      this.vx += Math.cos(this.angle) * SHIP_THRUST * thrustMul * dt;
      this.vy += Math.sin(this.angle) * SHIP_THRUST * thrustMul * dt;
      const sp = Math.hypot(this.vx, this.vy);
      if (sp > maxSp) {
        this.vx *= maxSp / sp;
        this.vy *= maxSp / sp;
      }
    }
    AudioSys.thrust(this.thrusting && game.state === "playing" && !game.paused);

    const drag = Math.pow(1 - SHIP_DRAG, dt);
    this.vx *= drag; this.vy *= drag;
    this.x += this.vx * dt; this.y += this.vy * dt;
    wrap(this);

    // Shield
    if (input.shield() && this.energy > 0.02) {
      this.shieldOn = true;
      this.energy = Math.max(0, this.energy - SHIELD_DRAIN * dt);
      if (this.energy <= 0.02) this.shieldOn = false;
    } else {
      this.shieldOn = false;
      // FLAG-3b: gate ONLY this passive recharge — manual shield-drain above is untouched.
      if (this.autoShieldRegenLock <= 0) this.energy = Math.min(1, this.energy + SHIELD_RECHARGE * dt);
    }

    // Fire. The bullet cap flexes with the weapon powerups (F6): Rapid Fire raises it to
    // RAPID_MAX_BULLETS, Triple Shot to TRIPLE_MAX_BULLETS and fires a 3-bullet spread; both
    // active uses the higher (Triple) cap, not the product (see maxBullets()). Rapid Fire also
    // speeds up cadence via RAPID_FIRE_COOLDOWN (B-6) — Triple stays on the base cadence, so
    // Rapid+Triple together is the strongest combo (fires fast AND wide, FLAG B-6-a).
    this.cooldown -= dt;
    if (input.fire() && this.cooldown <= 0 &&
        game.bullets.filter(b => !b.hostile).length < maxBullets()) {
      const shoot = a => game.bullets.push(new Bullet(
        this.x + Math.cos(a) * SHIP_RADIUS, this.y + Math.sin(a) * SHIP_RADIUS,
        this.vx + Math.cos(a) * BULLET_SPEED, this.vy + Math.sin(a) * BULLET_SPEED, false));
      if (powerActive("triple")) {
        shoot(this.angle - TRIPLE_SPREAD); shoot(this.angle); shoot(this.angle + TRIPLE_SPREAD);
      } else {
        shoot(this.angle);
      }
      this.cooldown = powerActive("rapid") ? RAPID_FIRE_COOLDOWN : FIRE_COOLDOWN;
      // Count-based shot expiry (B-4): one trigger-pull spends one from each active shot budget. A
      // Triple 3-fan is ONE pull; with both active, both budgets tick once and end independently
      // (FLAG B-4-b). Decrement AFTER the fan/cadence reads so this pull is fully a "rapid/triple" pull.
      if (settings.shotPowerupMode === "shots") {
        if (game.powerBudget.rapid  > 0) game.powerBudget.rapid--;
        if (game.powerBudget.triple > 0) game.powerBudget.triple--;
      }
      game.stats.pacifistStreak = 0; // firing breaks the no-fire delivery streak (Pacifist Tow, F9)
      AudioSys.fire();
    }

    if (this.invuln > 0) this.invuln -= dt;
    if (this.autoShieldRegenLock > 0) this.autoShieldRegenLock -= dt;
  }
  draw() {
    if (this.dead) return;
    const blink = this.invuln > 0 && Math.floor(this.invuln * 10) % 2 === 0;
    if (!blink) {
      // Scoop mouth (v3.3 P3; prong-V render restored CS010 P1 — see GDD §2.14.1 for the box-render
      // supersession history). Drawn BEFORE the hull in COLOR.dock green so it reads as a collector's
      // throat: an open V from the ship's nose (16,0) flaring forward to +/-SCOOP_WIDTH[lvl]/2 at
      // SCOOP_DEPTH[lvl]. This is a TELL for inScoopBox()'s capture region, not a literal outline of
      // it — the box's rear edge at forward=-SHIP_RADIUS isn't shown. Corners derived, never
      // hardcoded. No fill. Hidden at level 0.
      if (game.scoopLevel > 0) {
        const lvl = game.scoopLevel, hw = SCOOP_WIDTH[lvl] / 2, d = SCOOP_DEPTH[lvl];
        drawPoly([[d, -hw], [16, 0], [d, hw]], this.x, this.y, this.angle, COLOR.dock, false);
      }
      const pts = [[16, 0], [-11, -9], [-6, 0], [-11, 9]];
      drawPoly(pts, this.x, this.y, this.angle, COLOR.ship);
      if (this.thrusting && Math.random() < 0.8) {
        const flame = [[-7, -4], [-15 - Math.random() * 6, 0], [-7, 4]];
        drawPoly(flame, this.x, this.y, this.angle, "#ffb060", false);
      }
    }
    if (this.shieldOn) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, SHIELD_RADIUS, 0, TAU);
      ctx.globalAlpha = 0.5 + Math.random() * 0.4;
      glowStroke(COLOR.shield, 2, 14);
      ctx.globalAlpha = 1;
    }
  }
}

class Bullet {
  constructor(x, y, vx, vy, hostile) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = hostile ? 1.4 : BULLET_LIFE;
    this.hostile = hostile;
    this.dead = false;
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    wrap(this);
    this.life -= dt;
    if (this.life <= 0) this.dead = true;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, 2, 0, TAU);
    ctx.fillStyle = this.hostile ? "#ff9090" : COLOR.bullet;
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}
