// Debris Satellite (F3): the passive main hazard (formerly Asteroid). Drifts randomly
// like the old rocks, but reads as wrecked hardware — an authored satellite silhouette
// (SAT_ART, v3.3 P2) — and splits 3-ways at the large/medium tiers, emitting garbage at
// every tier.
class DebrisSatellite {
  constructor(x, y, size, speedMul = 1) {
    this.x = x; this.y = y;
    this.size = size;
    this.radius = DEBRIS_RADII[size];
    this.damage = DEBRIS_DAMAGE[size];   // contact damage to the ship (F2)
    const sp = DEBRIS_SPEEDS[size] * speedMul * rand(0.7, 1.3);
    const a = rand(0, TAU);
    this.vx = Math.cos(a) * sp;
    this.vy = Math.sin(a) * sp;
    this.angle = rand(0, TAU);          // random spawn rotation (v3.3 item 5 — preserved by the SAT_ART draw path)
    this.spin = rand(-1.2, 1.2);        // random tumble (ditto)
    this.dead = false;
    // Authored satellite silhouette (v3.3 P2). Pick one archetype per instance (splits
    // re-roll independently), use the simplified `small` variant at the r=13 small tier,
    // then bake a per-instance copy scaled to `this.radius` with a small random per-vertex
    // jitter — the "wrecked/no two alike" look, applied ONCE here, never per frame. All the
    // draw path does is rotate this by this.angle; nothing anchors art to a fixed "up".
    const artDef = SAT_ART[Math.floor(rand(0, SAT_ART.length))];
    const polys = this.size === 1 ? artDef.small : artDef.full;
    const jit = this.radius * 0.045;    // per-vertex bend/jitter (px); subtle, keeps silhouettes legible
    this.art = polys.map(pl => ({
      closed: pl.closed,
      pts: pl.pts.map(([px, py]) => [px * this.radius + rand(-jit, jit),
                                     py * this.radius + rand(-jit, jit)])
    }));
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.angle += this.spin * dt;
    wrap(this);
  }
  draw() {
    for (const pl of this.art) drawPoly(pl.pts, this.x, this.y, this.angle, COLOR.debris, pl.closed);
  }
}

// Hunter Satellite (F4): the reshaped killer-satellite/wedge system. A diamond core drifts
// passively toward the ship (like the old Satellite); when shot it splits 3-ways into
// actively-homing children — medium then small, each faster and more agile than the last
// (like the old Wedge). Every tier emits garbage; the final small tier drops a larger burst
// of LOW-mass scrap. All speeds/turn rates scale from a gentle wave-1 floor up to their
// ceilings via the difficulty ramp (§2.13), so early waves are calm and full pressure
// arrives ~wave 20. Tiers use the Debris 3/2/1 convention: 3 large, 2 medium, 1 small.
class HunterSatellite {
  constructor(x, y, size, scatterAngle = 0) {
    this.x = x; this.y = y;
    this.size = size;                       // 3 large (core) / 2 medium / 1 small
    this.radius = HUNTER_RADII[size];
    this.damage = HUNTER_DAMAGE[size];      // contact damage to the ship (F2/F4)
    this.dead = false;
    // v3.3 P4 (9b, FORK-5): the `bornOfScrap` flag is GONE. Every Hunter of every origin now drops
    // garbage at its tier counts — the v3.2 P3 suppression is reversed. 9a's single-decay is the new
    // governor for the 12-in/66-out amplifier that flag used to close.
    // Wave-scaled from a gentle floor (HUNTER_FLOOR_FRAC × ceiling) up to the full ceiling.
    // game.wave is fixed for a Hunter's lifetime (Hunters block wave-clear), so sample once.
    this.speed    = ramp(HUNTER_SPEED_CEIL[size] * HUNTER_FLOOR_FRAC, HUNTER_SPEED_CEIL[size], game.wave);
    this.turnRate = ramp(HUNTER_TURN_CEIL[size]  * HUNTER_FLOOR_FRAC, HUNTER_TURN_CEIL[size],  game.wave);
    if (size === 3) {
      // Large core: passive drift toward the ship's position AT SPAWN — no continuous re-aim
      // (confirmed design). Only its drift *speed* scales with difficulty, not its behavior.
      this.homing = false;
      this.heading = angleTo(this, game.ship) + rand(-0.4, 0.4);
      this.angle = rand(0, TAU);
      this.spinRate = rand(0.6, 1.0) * randSign();  // slow visual tumble (reads as "not aiming at you")
    } else {
      // Medium/small: relentless wrap-aware homing after a brief outward scatter.
      this.homing = true;
      this.heading = scatterAngle;
      this.scatter = HUNTER_SCATTER;
    }
    this.vx = Math.cos(this.heading) * this.speed;
    this.vy = Math.sin(this.heading) * this.speed;
    // Diamond silhouette, scaled per tier. The large core is a symmetric diamond that spins
    // in place; homers are a forward-elongated kite-diamond that points along the pursuit
    // heading (reads as "aiming at you"). Inner diamond on the two larger tiers for presence.
    const r = this.radius;
    this.shape = this.homing
      ? [[r * 1.35, 0], [0, -r * 0.8], [-r * 0.75, 0], [0, r * 0.8]]
      : [[r, 0], [0, -r], [-r, 0], [0, r]];
    this.inner = size >= 2
      ? [[r * 0.5, 0], [0, -r * 0.4], [-r * 0.4, 0], [0, r * 0.4]]
      : null;
  }
  // Spawn a fresh large core from just beyond a random viewport edge, relative to the ship,
  // so it still slides in from off-screen and drifts toward the ship (feel unchanged from
  // the old Satellite). Children are created directly at the parent's position in destroyHunter.
  static spawnCore() {
    const edge = Math.floor(rand(0, 4));
    const p = { x: game.ship.x, y: game.ship.y };
    if (edge === 0)      { p.x -= VIEW_W / 2 + 40; p.y += rand(-VIEW_H / 2, VIEW_H / 2); }
    else if (edge === 1) { p.x += VIEW_W / 2 + 40; p.y += rand(-VIEW_H / 2, VIEW_H / 2); }
    else if (edge === 2) { p.y -= VIEW_H / 2 + 40; p.x += rand(-VIEW_W / 2, VIEW_W / 2); }
    else                 { p.y += VIEW_H / 2 + 40; p.x += rand(-VIEW_W / 2, VIEW_W / 2); }
    wrapPos(p);
    return new HunterSatellite(p.x, p.y, 3);
  }
  update(dt) {
    if (this.homing) {
      if (this.scatter > 0) {
        this.scatter -= dt;
      } else if (!game.ship.dead) {
        const target = angleTo(this, game.ship);
        let diff = target - this.heading;
        while (diff > Math.PI) diff -= TAU;
        while (diff < -Math.PI) diff += TAU;
        const maxTurn = this.turnRate * dt;
        this.heading += Math.max(-maxTurn, Math.min(maxTurn, diff));
      }
      this.vx = Math.cos(this.heading) * this.speed;
      this.vy = Math.sin(this.heading) * this.speed;
    } else {
      this.angle += this.spinRate * dt;   // large core tumbles; keeps its fixed spawn-time drift velocity...
      // ...UNLESS it's the last satellite standing (v3.6 P2b): once Debris is cleared, a large core slowly
      // steers toward the ship — a search-ender for late-wave stalling, not a second homing tier. Do NOT
      // flip this.homing: shape/inner and draw()'s angle-vs-heading pick are baked off it at construction,
      // so that would silently swap the diamond for the kite silhouette and freeze the tumble. Evaluated
      // inline instead of a stored flag — the tumble is the unchanged visual, the steering is the tell.
      if (game.debris.length === 0 && !game.ship.dead) {
        const target = angleTo(this, game.ship);          // wrap-aware — a naive angle is ~180° wrong across a seam
        let diff = target - this.heading;
        while (diff > Math.PI) diff -= TAU;
        while (diff < -Math.PI) diff += TAU;
        const maxTurn = HUNTER_LAST_STAND_TURN * dt;
        this.heading += Math.max(-maxTurn, Math.min(maxTurn, diff));
        this.vx = Math.cos(this.heading) * HUNTER_LAST_STAND_SPEED;
        this.vy = Math.sin(this.heading) * HUNTER_LAST_STAND_SPEED;
      }
    }
    this.x += this.vx * dt; this.y += this.vy * dt;
    wrap(this);
  }
  draw() {
    const ang = this.homing ? this.heading : this.angle;
    drawPoly(this.shape, this.x, this.y, ang, COLOR.satellite);
    if (this.inner) {
      // homers: inner tracks the nose; core: counter-rotate for a faceted shimmer
      drawPoly(this.inner, this.x, this.y, this.homing ? ang : -this.angle * 1.5, COLOR.satellite);
    }
  }
}

class Saucer {
  constructor(small) {
    this.small = small;
    this.radius = small ? 12 : 20;
    this.damage = small ? DMG_SMALL : DMG_MEDIUM;   // ramming contact damage to the ship (F2)
    this.fromLeft = Math.random() < 0.5;
    // enter from just beyond the left/right viewport edge, relative to the ship
    const p = wrapPos({
      x: game.ship.x + (this.fromLeft ? -(VIEW_W / 2 + 40) : VIEW_W / 2 + 40),
      y: game.ship.y + rand(-VIEW_H * 0.35, VIEW_H * 0.35)
    });
    this.x = p.x; this.y = p.y;
    this.baseY = this.y;   // vertical zig-zag stays in a band around the entry height
    this.vx = (this.fromLeft ? 1 : -1) * (small ? 150 : 100);
    this.vy = 0;
    this.dead = false;
    this.fireTimer = this.rollFireTimer(SAUCER_FIRE_INIT);   // first shot delayed harder at low waves (F10)
    this.zigTimer = rand(0.8, 1.8);
    this.travel = 0;
  }
  // Between-shot / first-shot delay for a [min,max] base range, slowed by the F10 fire
  // multiplier: ~1.8× the shipped interval at wave 1, easing to 1.0× at full difficulty.
  rollFireTimer(range) {
    const mult = ramp(SAUCER_FIRE_MULT_FLOOR, SAUCER_FIRE_MULT_CEIL, game.wave);
    return rand(range[0], range[1]) * mult;
  }
  update(dt) {
    this.zigTimer -= dt;
    if (this.zigTimer <= 0) {
      this.vy = randSign() * rand(40, 110);
      this.zigTimer = rand(0.8, 1.8);
    }
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    // keep the zig-zag within a screen-height band around the entry height
    if (this.y < this.baseY - (VIEW_H / 2 - 30) || this.y > this.baseY + (VIEW_H / 2 - 30)) this.vy *= -1;
    this.travel += Math.abs(this.vx) * dt;
    if (this.travel > VIEW_W + 120) { this.dead = true; return; } // exits, no wrap-x

    this.fireTimer -= dt;
    if (this.fireTimer <= 0 && !game.ship.dead) {
      let a;
      if (this.small) {
        // aimed, but the error widens toward a barely-aimed spray at low waves (F10)
        const err = ramp(SAUCER_AIM_ERR_FLOOR, SAUCER_AIM_ERR_CEIL, 1 + (game.wave - 1) * SAUCER_ACCURACY_RAMP_SCALE);
        a = angleTo(this, game.ship) + rand(-err, err);
      } else {
        a = rand(0, TAU); // random
      }
      game.bullets.push(new Bullet(this.x, this.y,
        Math.cos(a) * 380, Math.sin(a) * 380, true));
      this.fireTimer = this.rollFireTimer(this.small ? SAUCER_FIRE_SMALL : SAUCER_FIRE_BIG);
    }
  }
  draw() {
    const s = this.small ? 0.62 : 1;
    const body = [[-20*s,4*s],[-9*s,-4*s],[9*s,-4*s],[20*s,4*s],[9*s,11*s],[-9*s,11*s]];
    const dome = [[-9*s,-4*s],[-5*s,-11*s],[5*s,-11*s],[9*s,-4*s]];
    drawPoly(body, this.x, this.y, 0, COLOR.saucer);
    drawPoly(dome, this.x, this.y, 0, COLOR.saucer, false);
    // middle line
    ctx.beginPath();
    ctx.moveTo(this.x - 20*s, this.y + 4*s);
    ctx.lineTo(this.x + 20*s, this.y + 4*s);
    glowStroke(COLOR.saucer);
  }
}

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    const a = rand(0, TAU), sp = rand(30, 240);
    this.vx = Math.cos(a) * sp; this.vy = Math.sin(a) * sp;
    this.life = rand(0.3, 0.9);
    this.maxLife = this.life;
    this.color = color;
    this.dead = false;
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.life -= dt;
    if (this.life <= 0) this.dead = true;
  }
  draw() {
    ctx.globalAlpha = this.life / this.maxLife;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x - 1, this.y - 1, 2, 2);
    ctx.globalAlpha = 1;
  }
}

// Shared renderer for radioactive canisters (free-floating and chained). Low-mass scrap
// (Hunter small-tier drops) renders in a paler tint so it's visibly the easier-to-tow bonus.
// v3.5 P2: trailing `scale` param (default 1, so the two pre-existing call sites — the single
// canister and chain nodes — stay byte-identical) lets a garbage clump draw as one larger canister.
function drawCanister(x, y, angle, alpha, color = COLOR.garbage, scale = 1) {
  ctx.globalAlpha = alpha * (0.75 + Math.random() * 0.25); // radioactive flicker
  const body = [[7 * scale, -5 * scale], [7 * scale, 5 * scale], [-7 * scale, 5 * scale], [-7 * scale, -5 * scale]];
  drawPoly(body, x, y, angle, color);
  ctx.save();
  ctx.translate(x, y); ctx.rotate(angle);
  ctx.beginPath(); ctx.moveTo(-7 * scale, 0); ctx.lineTo(7 * scale, 0); // hazard stripe
  glowStroke(color, 1, 5);
  ctx.restore();
  ctx.globalAlpha = 1;
}

class Garbage {
  // v3.3 P4 (9a): a loose SINGLE decays again on GARBAGE_DECAY (see update()). Not a ctor param — every
  // piece is born a single with a full life; a clump (pieces > 1) simply never counts it down (FORK-4).
  constructor(x, y, vx = 0, vy = 0, mass = 1.0) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.spin = rand(0, TAU);
    this.spinRate = rand(-1.5, 1.5);
    this.mass = mass;   // towing weight (F5): 1.0 for Debris scrap; lighter scrap tows easier
    this.decay = GARBAGE_DECAY; // v3.3 P4: single-canister life clock; counts down only while pieces === 1
    // Coalescence (v3.2 P1). These constructor defaults are inherited by all three emission sites
    // AND Garbage.fromNode. `coalesceDelay` counts down in update(); a piece is "active" (attracts +
    // can merge) once it hits 0. `pieces` is the 1..11 threat counter (at 12 the clump transforms).
    // v3.2 P1 reverses FORK-2: on merge `mass` now SUMS and `radius` DERIVES from pieces (a clump is
    // a real, heavy, big, un-hookable body — you must shoot it apart first). radius = 7*sqrt(pieces),
    // so a single piece still reads 7 (the base canister radius).
    this.coalesceDelay = GARBAGE_COALESCE_DELAY;
    this.pieces = 1;
    this.radius = 7 * Math.sqrt(this.pieces);
    this.dead = false;
  }
  static fromNode(n) { // chain node knocked loose -> free garbage (v3.2 P3: no decay)
    const a = rand(0, TAU);
    return new Garbage(n.x, n.y,
      Math.cos(a) * rand(20, 60), Math.sin(a) * rand(20, 60), n.mass);
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.spin += this.spinRate * dt;
    wrap(this);
    // v3.3 P4 (9a): a loose SINGLE ages out — GARBAGE_DECAY is the density governor. A CLUMP (pieces > 1)
    // never decays (FORK-4: a clump is a target and a scoopable pickup). Chain nodes aren't Garbage, so
    // they never reach here. A pickup still sets `dead` externally; coalescence still consumes pieces.
    if (this.pieces === 1) {
      this.decay -= dt;
      if (this.decay <= 0) this.dead = true;
    }
    // `coalesceDelay` still gates attraction/merge (see coalesceGarbage).
    if (this.coalesceDelay > 0) this.coalesceDelay -= dt;
  }
  draw() {
    if (this.pieces === 1) {
      // A single centered canister. v3.3 P4 (9a): in its last GARBAGE_FADE sec it blinks out as an
      // expiry tell — otherwise byte-identical to the pre-decay single render.
      const color = this.mass < 1 ? COLOR.garbageLight : COLOR.garbage;
      let alpha = 0.9;
      if (this.decay < GARBAGE_FADE) {
        // fast on/off blink (skip the "off" frames) that fades as death nears
        if (Math.sin(this.decay * 18) < 0) return;
        alpha = 0.9 * Math.max(0.2, this.decay / GARBAGE_FADE);
      }
      drawCanister(this.x, this.y, this.spin, alpha, color);
      return;
    }
    // v3.5 P2 (reverses v3.3 P1): a clump (pieces > 1) draws as ONE ordinary canister scaled up by
    // sqrt(pieces) (= this.radius / 7) — a larger canister, not a jittered-hull asteroid — so it
    // reads as "a bigger pickup," not "a hazard." Scaling by radius/7 makes the drawn long half-axis
    // exactly equal this.radius, so the visual and the (unchanged) collision radius agree by
    // construction. v3.6 P1a: colour now follows the same per-piece-mass rule as a single (the red
    // proximity-to-Hunter lerp is gone) — size (radius = 7*sqrt(pieces)) is the only remaining tell
    // that a clump is nearing the Hunter transform.
    const color = (this.mass / this.pieces) < 1 ? COLOR.garbageLight : COLOR.garbage;
    drawCanister(this.x, this.y, this.spin, 0.9, color, this.radius / 7);
  }
}

// Draw a powerup's type glyph centered at (x,y), scaled to icon radius r, in `color`.
// Reused by the field entity (with a housing ring) and the HUD active-effect row (bare glyph),
// so a powerup reads identically in the world and on the HUD. Local-space icons designed at r=12.
function drawPowerupGlyph(type, x, y, r, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(r / 12, r / 12);
  ctx.beginPath();
  switch (type) {
    case "rapid":  // fast-forward: two right-pointing chevrons
      ctx.moveTo(-6, -6); ctx.lineTo(0, 0); ctx.lineTo(-6, 6);
      ctx.moveTo(1, -6);  ctx.lineTo(7, 0); ctx.lineTo(1, 6);
      break;
    case "triple": // a 3-way spread fan from a single origin
      ctx.moveTo(-7, 0); ctx.lineTo(7, -7);
      ctx.moveTo(-7, 0); ctx.lineTo(8, 0);
      ctx.moveTo(-7, 0); ctx.lineTo(7, 7);
      break;
    case "health": // plus / medical cross
      ctx.moveTo(0, -8); ctx.lineTo(0, 8);
      ctx.moveTo(-8, 0); ctx.lineTo(8, 0);
      break;
    case "magnet": // horseshoe magnet opening up, with pole tips
      ctx.arc(0, 1, 5, 0, Math.PI);
      ctx.moveTo(-5, 1); ctx.lineTo(-5, -7);
      ctx.moveTo(5, 1);  ctx.lineTo(5, -7);
      ctx.moveTo(-7, -7); ctx.lineTo(-3, -7);
      ctx.moveTo(3, -7);  ctx.lineTo(7, -7);
      break;
    case "engine": // thruster bell firing exhaust
      ctx.moveTo(-4, -8); ctx.lineTo(4, -8); ctx.lineTo(6, 2); ctx.lineTo(-6, 2); ctx.closePath();
      ctx.moveTo(-4, 3); ctx.lineTo(-3, 8);
      ctx.moveTo(0, 3);  ctx.lineTo(0, 9);
      ctx.moveTo(4, 3);  ctx.lineTo(3, 8);
      break;
    case "scoop":  // a widening funnel / collector mouth (v3.3 P3): narrow throat, flaring open forward
      ctx.moveTo(-8, -7); ctx.lineTo(-3, 4); ctx.lineTo(3, 4); ctx.lineTo(8, -7);
      break;
  }
  glowStroke(color, 1.6, 8);
  ctx.restore();
}

// Powerup (F6): a free-floating pickup following the standard entity contract. A rotating
// hexagon housing (so every kind reads as one "collect me" family) wraps a distinct per-type
// glyph. Health spawns ambiently and is instant; rapid/triple/magnet/engine are timed drops.
// Uncollected powerups fade after POWERUP_DECAY with the same blink countdown as garbage.
class Powerup {
  constructor(x, y, type, vx = 0, vy = 0) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.type = type;
    this.radius = POWERUP_RADIUS * leverScale(LEVER_POWERUP_SIZE, game.wave);
    this.spin = rand(0, TAU);
    this.spinRate = rand(-0.8, 0.8);
    this.pulse = rand(0, TAU);
    this.decay = POWERUP_DECAY;
    this.dead = false;
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.spin += this.spinRate * dt;
    this.pulse += dt * 4;
    wrap(this);
    this.decay -= dt;
    if (this.decay <= 0) this.dead = true;
  }
  draw() {
    const blink = this.decay < 4 && Math.floor(this.decay * (this.decay < 2 ? 8 : 4)) % 2 === 0;
    if (blink) return;
    const color = POWERUP_COLOR[this.type];
    const r = this.radius;
    const hex = [];
    for (let i = 0; i < 6; i++) { const th = (i / 6) * TAU; hex.push([Math.cos(th) * r, Math.sin(th) * r]); }
    ctx.globalAlpha = 0.75 + 0.25 * Math.sin(this.pulse);
    drawPoly(hex, this.x, this.y, this.spin, color);
    ctx.globalAlpha = 1;
    drawPowerupGlyph(this.type, this.x, this.y, r * 0.62, color);
  }
}

class FloatText {
  constructor(text, x, y, color, size = 16) {
    this.text = text; this.x = x; this.y = y; this.color = color; this.size = size;
    this.life = 1.1; this.dead = false;
  }
  update(dt) {
    this.y -= 30 * dt;
    this.life -= dt;
    if (this.life <= 0) this.dead = true;
  }
  draw() {
    ctx.globalAlpha = Math.max(0, this.life / 1.1);
    drawText(this.text, this.x, this.y, this.size, this.color);
    ctx.globalAlpha = 1;
  }
}

class Dock {
  constructor() {
    // place within reach of the ship's current world position, but not on top of it
    const a = rand(0, TAU);
    const d = rand(DOCK_MIN_DIST, DOCK_MAX_DIST);
    const p = wrapPos({ x: game.ship.x + Math.cos(a) * d, y: game.ship.y + Math.sin(a) * d });
    this.x = p.x; this.y = p.y;
    this.radius = DOCK_RADIUS * leverScale(LEVER_DOCK_SIZE, game.wave);
    this.spin = 0;
    this.pts = [];
    for (let i = 0; i < 8; i++) {
      const th = (i / 8) * TAU + TAU / 16;
      this.pts.push([Math.cos(th) * this.radius, Math.sin(th) * this.radius]);
    }
  }
  update(dt) { this.spin += dt * 0.7; }
  draw() {
    drawPoly(this.pts, this.x, this.y, 0, COLOR.dock);
    // rotating intake vanes — vane inner radius (14) and label offset (22) scale proportionally
    // with this.radius so they stay correct under the v3.4 P2 dock-size lever.
    const vaneScale = this.radius / DOCK_RADIUS;
    for (let i = 0; i < 3; i++) {
      const th = this.spin + (i * TAU) / 3;
      ctx.beginPath();
      ctx.moveTo(this.x + Math.cos(th) * (this.radius - 10),
                 this.y + Math.sin(th) * (this.radius - 10));
      ctx.lineTo(this.x + Math.cos(th + 0.25) * (14 * vaneScale),
                 this.y + Math.sin(th + 0.25) * (14 * vaneScale));
      glowStroke(COLOR.dock, 1.4, 8);
    }
    const hot = game.chain.length > 0 && Math.floor(performance.now() / 350) % 2 === 0;
    drawText("RECYCLE", this.x, this.y + this.radius + (22 * vaneScale), 14,
      hot ? COLOR.garbage : COLOR.dim);
  }
}

// ---------- Game state ----------
// Fresh per-game achievement stats (F9). One flat bag of counters/flags observed at the points
// events already happen (kills, deliveries, hits, deliveries, powerups). Reset at startGame; the
// weekly (single-game) achievements read off this, lifetime ones read Achievements.lifetime.
function resetGameStats() {
  return {
    gameTime: 0,             // sec since this game started (Speed Recycler's 60s window)
    delivered: 0,            // canisters delivered to the dock this game (Scrap Runner)
    fullChainVisit: false,   // a single dock visit reached 12 deliveries (Heavy Hauler)
    maxChainVisit: false,    // a single dock visit reached CARGO_CAP_MAX (24) deliveries (Maxed Out, CS012 P3)
    bestCombo: 0,            // highest delivery combo reached in one visit (Combo Collector)
    speedRecycler: false,    // first canister delivered within 60s (Speed Recycler)
    pacifistStreak: 0,       // consecutive deliveries with no shot fired between them
    pacifistBest: 0,         // best such streak this game (Pacifist Tow, goal 5)
    debrisKills: 0,          // Debris Satellites the player destroyed (Satellite Buster)
    hunterLineageKills: 0,   // kills in the CURRENT Hunter lineage (reset when a fresh core spawns)
    hunterLineComplete: false,// wiped a full 13-member Hunter line from one spawn (Hunter's Bane)
    largeHunterKills: 0,     // large Hunter cores destroyed this game (Diamond Cutter)
    smallSaucerKills: 0,     // small (aimed) saucers destroyed this game (Small Ball)
    deflects: 0,             // hazards/bullets absorbed by the shield this game (Shield Surfer)
    healthPicked: 0,         // Health powerups picked up this game (Glass Cannon)
    powerupsPicked: 0,       // ANY powerups picked up this game (No Powerups Needed)
    powerUsed: { rapid: false, triple: false, magnet: false, engine: false }, // Powered Up (all four)
    dmgThisWave: 0,          // hits taken during the wave in progress (perfect-wave detection)
    noScratchWave3: false,   // completed wave 3 damage-free (No Scratches)
    flawlessLateWave: false, // cleared wave 8+ damage-free (Flawless Run weekly, v3.0 P8)
    closeShave: false,       // survived a Hunter collision under 10 HP (Close Shave)
    everBelowHalf: false,    // HP ever dropped below 50% this game (Untouchable inverts this)
    hunterCoalesced: 0,      // Hunters born this game from neglected scrap coalescing (Waste Not, v3.2 P3)
    gameEnded: false         // set at game over so end-of-game achievements can evaluate
  };
}

const game = {
  state: "title",   // title | playing | dying | gameover  ("dying" = the v3.6 P5 death spectacle)
  paused: false,    // true iff a pause-menu screen is open (F8)
  deathT: 0,        // v3.6 P5: seconds left in the "dying" spectacle (DEATH_DURATION → 0 → "gameover")
  shake: 0,         // v3.6 P5: current screen-shake amplitude (px), decayed in updateDeath()
  entry: null,      // v3.6 P6: { initials:[i,i,i], idx } while the initials-entry UI is live on "gameover"
  lastScoreId: null,// v3.6 P6: id of the just-committed HighScores record, for the table highlight
  stats: resetGameStats(), // per-game achievement counters/flags (F9)
  toasts: [],       // active achievement-unlock toasts { name, life } (F9)
  // Pause-menu state machine (F8): screen = null | "root" | "options" | "controls";
  // index = cursor for root/options; row/col = cursor for the controls grid;
  // rebinding = { action, device } while capturing a new binding, else null.
  menu: { screen: null, index: 0, row: 0, col: 0, rebinding: null, scroll: 0 }, // scroll: CS013 P3, Achievements-viewer vertical offset
  ship: new Ship(),
  camera: { x: WORLD_W / 2, y: WORLD_H / 2 }, // world point at the center of the viewport
  debris: [], bullets: [], saucers: [], hunters: [], particles: [],
  garbage: [], chain: [], floaters: [], dock: null,
  powerups: [],                                        // free-floating Powerup pickups (F6)
  powerFx: { rapid: 0, triple: 0, magnet: 0, engine: 0 }, // remaining sec per timed effect (0 = inactive)
  powerBudget: { rapid: 0, triple: 0, magnet: 0 },    // remaining shots/pieces in count mode (P5; Engine is always timed)
  powerBank: { rapid: 0, triple: 0, magnet: 0, engine: 0 },    // CS009 P5: sec of bank-flash left per type (0 = none)
  powerBankAmt: { rapid: 0, triple: 0, magnet: 0, engine: 0 }, // CS009 P5: the "+Ns" badge amount for the current flash
  hudHull: 1,                                          // CS009 P1: eased HUD hull fraction, chases
                                                        // ship.hp/SHIP_MAX_HP so a hit/heal reads as a
                                                        // drain/fill, not a jump. Advanced in update(),
                                                        // NOT drawHUD() — see the update() call site.
  scoopLevel: 0,                                       // PERSISTENT scoop upgrade level 0..SCOOP_MAX_LEVEL (v3.3 P3; NOT a timed effect)
  scoopHits: 0,                                        // running non-lethal-hit tally; every SCOOP_HITS_PER_LEVEL costs a level
  healthTimer: 0,                                      // countdown to the next ambient Health spawn
  cargoMax: CARGO_BASE,                                // runtime tow cap; grows CARGO_BASE→CARGO_CAP_MAX per canisters delivered (B-8)
  cargoFlash: 0,                                       // CS009 P3: >0 for HUD_CAP_FLASH sec after a cap-up —
                                                        // a cap-up SHRINKS the CARGO ring's fraction (same chain,
                                                        // bigger denominator), so without this flash it reads as
                                                        // a bug instead of a promotion. Decayed in update().
  deliveryCount: 0, offloadTimer: 0,
  score: 0, wave: 0,
  nextRepair: REPAIR_MILESTONE,   // next score threshold that repairs the hull (F2)
  saucerTimer: 0,
  hunterTimer: 0,
  beatTimer: 0, beatHigh: false, beatInterval: 1.0,
  waveClearTimer: 0,
  lowHpSiren: false,  // v3.4 P5: edge-detection latch for AudioSys.lowhp — true iff the siren is
                      // currently playing, so update() can fire lowhp(true)/(false) exactly once
                      // per state transition instead of every frame
  // CS010 P9: Dan's OWN low-health latch — answers "has Dan already said 'hull critical' for THIS
  // episode?", a DIFFERENT question from lowHpSiren's "is the tone playing?". It must NOT be torn down
  // by openPause/quitToTitle (which reset lowHpSiren so the rising edge re-fires the SIREN on unpause);
  // otherwise Dan re-announces every single unpause. Cleared ONLY on the genuine falling edge + startGame.
  lowHpVoiced: false,
  // CS010 P9: edge-detect latch for the hull-FULL voice (hp >= max). Starts TRUE (the ship spawns full,
  // so no "brand new ship" line at wave start); flips false when hp drops below max, so a heal back to
  // full — from the Health powerup OR addScore()'s repair milestone — fires the line exactly once.
  hpFullVoice: true,
  // CS010 P9: previous powerActive() state per timed type, for the powerup-EXPIRED voice's falling edge.
  // Keyed through powerActive() (not powerFx) so it correctly covers count modes too.
  powerVoiced: { rapid: false, triple: false, magnet: false, engine: false },
  // CS010 P3: the low-health pulse PHASE ACCUMULATOR. Advanced by 2π·lowhpPulseRate(t)·dt in update()
  // while engaged; read as Math.sin(game.lowHpPhase) by BOTH the critical-hull ring pulse AND the corner
  // glow, so they lock to each other and (via the shared rate helper) to the siren — one alarm. An
  // ACCUMULATOR, not omega·clock, is mandatory: omega is HP-dependent, and omega·clock would SNAP the
  // phase (~30 rad on a 0.5 rad/s rate delta at t=60s) every time HP changes, visibly stuttering the
  // pulse. Reset to 0 on disengage + startGame; FREEZES while paused (update early-returns), which is
  // correct — openPause tears the siren down anyway, matching CS009's hudHull/cargoFlash placement.
  lowHpPhase: 0,
  // CS010 P3: >0 for LOWHP_RELIEF_FLASH sec after low-health CLEARS with the ship alive — the visual
  // relief cue (§5, FLAG-CS010-a): a geometry-only (radius+width) NON-pulsing "exhale" on the hull ring.
  // Armed on the falling edge ONLY IF !ship.dead (dying ALSO drives the low-health state false, so the
  // guard stops a cheerful pop firing at the moment of death). Decayed in update() beside cargoFlash;
  // zeroed at every direct siren teardown (pause/quit/start/death) so no stale exhale survives.
  hpReliefFlash: 0,
  // CS011 P2: the on-screen caption of Dan's current line — the voice channel's VISIBLE echo. text = the
  // line text; dur = its utterance length (from buildUtterance); life = seconds left to display, set to
  // 0.10 + dur + CAPTION_LINGER by showCaption() and decayed in update()'s playing body. drawCaption()
  // renders it while life > 0 (fading over the last CAPTION_FADE s). Overwritten wholesale per line.
  caption: { text: "", life: 0, dur: 0 }
};

function startGame() {
  game.state = "playing";
  game.paused = false;
  game.deathT = 0; game.shake = 0;   // v3.6 P5: a fresh run never carries death-spectacle state over
  game.entry = null; game.lastScoreId = null; // v3.6 P6: nor any stale initials-entry/highlight state
  game.menu = { screen: null, index: 0, row: 0, col: 0, rebinding: null }; // ensure no menu carries in
  game.stats = resetGameStats();  // fresh per-game achievement tracking (F9)
  game.toasts = [];               // clear any lingering unlock toasts
  game.score = 0;
  game.wave = 0;
  game.nextRepair = REPAIR_MILESTONE;
  game.debris = []; game.bullets = []; game.saucers = [];
  game.hunters = []; game.particles = [];
  game.garbage = []; game.chain = []; game.floaters = [];
  game.powerups = [];
  game.powerFx = { rapid: 0, triple: 0, magnet: 0, engine: 0 };
  game.powerBudget = { rapid: 0, triple: 0, magnet: 0 }; // count-mode budgets reset with the run (P5)
  game.powerBank = { rapid: 0, triple: 0, magnet: 0, engine: 0 };    // bank-flash state resets with the run (P5)
  game.powerBankAmt = { rapid: 0, triple: 0, magnet: 0, engine: 0 };
  game.scoopLevel = 0; game.scoopHits = 0;               // persistent scoop upgrade resets each run (v3.3 P3)
  game.healthTimer = rand(POWERUP_HEALTH_GAP[0], POWERUP_HEALTH_GAP[1]);
  game.cargoMax = CARGO_BASE;      // tow cap resets to base each run; grows with deliveries (B-8)
  game.cargoFlash = 0;             // CS009 P3: no cap-up flash carries into a fresh run
  game.deliveryCount = 0; game.offloadTimer = 0;
  game.ship = new Ship();
  game.hudHull = game.ship.hp / SHIP_MAX_HP;   // CS009 P1: no drain animation on a fresh run
  game.camera = { x: game.ship.x, y: game.ship.y };
  game.saucerTimer = rand(SAUCER_GAP_FLOOR_MIN, SAUCER_GAP_FLOOR_MAX); // first saucer waits the wave-1 floor gap (F10)
  game.hunterTimer = rand(14, 22);
  game.lowHpSiren = false; AudioSys.lowhp(false); // fresh run never carries the siren over (v3.4 P5)
  game.lowHpPhase = 0;      // CS010 P3: the pulse accumulator starts a fresh run at 0
  game.hpReliefFlash = 0;   // CS010 P3: no stale relief exhale carries into a fresh run
  // CS010 P9: Dan's latches. lowHpVoiced false (not yet at low HP); hpFullVoice TRUE (spawns full — no
  // "brand new ship" at wave start); powerVoiced all false. reset() clears any in-flight line + cooldown.
  game.lowHpVoiced = false;
  game.hpFullVoice = true;
  game.powerVoiced = { rapid: false, triple: false, magnet: false, engine: false };
  game.caption = { text: "", life: 0, dur: 0 }; // CS011 P2: no stale caption carries into a fresh run
  VoiceSys.reset();
  nextWave();
}

function nextWave() {
  game.wave++;
  VoiceSys.sayLevel(game.wave); // CS011 P4 — announces Level 1 too (VoiceSys.reset() ran just above in startGame)
  // v3.4 P7: intensity recomputed ONLY on wave change, never per-frame — keeps updateMusic()'s
  // per-frame path clean. Runs at wave 1 too (startGame calls nextWave()), so a fresh run starts
  // pinned to difficultyFactor(1) === 0 (foundation layer only) before any track has even loaded.
  MusicSys.setIntensity(difficultyFactor(game.wave));
  game.stats.dmgThisWave = 0; // fresh damage-free window for the new wave (F9 perfect-wave tracking)
  Achievements.lifetime.maxWave = Math.max(Achievements.lifetime.maxWave, game.wave); // Century Club / Master of the Field
  // No Powerups Needed (MAX): best wave reached while still powerup-free this game. Frozen for the
  // rest of the game the moment a powerup is picked (powerupsPicked > 0), so it records the deepest
  // wave the player reached before ever touching a powerup. (FLAG A-1-b — a MAX counter, not a sum.)
  if (game.stats.powerupsPicked === 0)
    Achievements.lifetime.maxWaveNoPowerup = Math.max(Achievements.lifetime.maxWaveNoPowerup, game.wave);
  game.dock = new Dock(); // recycling dock relocates each wave
  // F3 first-pass balance: trimmed from min(4+wave, 11) to offset the ~8x higher garbage
  // volume from guaranteed 3-per-tier drops. (v3.2 P3: garbage no longer decays; density is now
  // held by coalescence + shatter-to-harvest, not a decay timer — see GDD §2.10.1.)
  const count = Math.min(3 + game.wave, 9);
  const speedMul = 1 + (game.wave - 1) * 0.08;
  for (let i = 0; i < count; i++) {
    // spawn in a ring around the ship's current world position so the wave is
    // reachable (min distance keeps it off the ship, max keeps it from being
    // stranded on the far side of the big world)
    const a = rand(0, TAU);
    const d = rand(SPAWN_MIN_DIST, SPAWN_MAX_DIST);
    const p = wrapPos({ x: game.ship.x + Math.cos(a) * d, y: game.ship.y + Math.sin(a) * d });
    game.debris.push(new DebrisSatellite(p.x, p.y, 3, speedMul));
  }
}

function addScore(pts) {
  game.score += pts;
  // Score milestones repair the hull instead of granting an extra life (F2).
  if (game.score >= game.nextRepair) {
    game.nextRepair += REPAIR_MILESTONE;
    if (game.ship.hp < SHIP_MAX_HP) {
      game.ship.hp = Math.min(SHIP_MAX_HP, game.ship.hp + REPAIR_AMOUNT);
    } else {
      game.score += REPAIR_FULL_BONUS; // already at full HP: cash the milestone in as points
    }
    AudioSys.shieldPing();
  }
}

function boom(x, y, size, color) {
  const n = 6 + size * 6;
  for (let i = 0; i < n; i++) game.particles.push(new Particle(x, y, color));
  AudioSys.explosion(size);
}

function destroyDebris(a, awardScore = true) {
  a.dead = true;
  if (awardScore) {
    addScore(DEBRIS_SCORE[a.size]); game.stats.debrisKills++; // Satellite Buster (player kills only)
    // Field Sweeper (lifetime MAX): best Debris destroyed in one game — debrisKills climbs within a run.
    Achievements.lifetime.bestDebrisGame = Math.max(Achievements.lifetime.bestDebrisGame, game.stats.debrisKills);
  }
  boom(a.x, a.y, a.size, COLOR.debris);
  // Every tier's destruction — including the final small-tier kill — emits exactly
  // DEBRIS_GARBAGE canisters (F3), each with an outward kick so they fan out instead
  // of stacking. All are mass 1.0 by the Garbage default.
  for (let i = 0; i < DEBRIS_GARBAGE; i++) {
    const spread = rand(0, TAU), kick = rand(20, 55);
    game.garbage.push(new Garbage(a.x, a.y,
      a.vx * 0.25 + Math.cos(spread) * kick,
      a.vy * 0.25 + Math.sin(spread) * kick));
  }
  // Large -> 3 mediums, medium -> 3 smalls, small -> destroyed (F3: 3-way splits)
  if (a.size > 1) {
    const speedMul = 1 + (game.wave - 1) * 0.08;
    for (let i = 0; i < 3; i++) {
      game.debris.push(new DebrisSatellite(a.x, a.y, a.size - 1, speedMul));
    }
  }
}

// Destroy one Hunter Satellite: score + boom + garbage, then split — or, at the small tier,
// a larger burst of LOW-mass scrap and no children. Parallels destroyDebris (F3); the garbage
// fan-out mirrors that pattern. Called both when shot and when a homer dies on the shield.
function destroyHunter(h, awardScore = true) {
  h.dead = true;
  if (awardScore) {
    addScore(HUNTER_SCORE[h.size]);
    // Achievement stats (F9): every Hunter death (bullet OR shield-kill) is a player kill. Lineage
    // count -> Hunter's Bane (a full 13-member line from one spawn); large cores -> Diamond Cutter;
    // all tiers -> Ghost Protocol (lifetime).
    // v3.6 P5: these counters are now gated on `awardScore` (mirroring destroyDebris, which already
    // gated its debrisKills/bestDebrisGame the same way) so the "dying"-state chain detonations —
    // the ONLY caller that ever passes awardScore=false — move NO score AND NO achievement counters.
    // Both real gameplay callers (player bullet, shield-kill) pass true, so their behaviour is
    // unchanged; before this, awardScore=false would have leaked lifetime hunterKills on every death.
    game.stats.hunterLineageKills++;
    if (game.stats.hunterLineageKills >= ACH_LINEAGE_FULL) game.stats.hunterLineComplete = true;
    if (h.size === 3) game.stats.largeHunterKills++;
    Achievements.lifetime.hunterKills++;
  }
  boom(h.x, h.y, h.size, COLOR.satellite);
  // v3.3 P4 (9b, reverses v3.2 P3's FORK-B/B1): EVERY Hunter drops garbage at its tier counts,
  // regardless of origin. This reopens the 12-in/66-out amplifier a coalesced lineage represents —
  // deliberately: 9a's single-decay is now the governor holding the field, not emission suppression.
  if (h.size === 1) {
    // Final tier: an easy-to-tow bonus pile of low-mass canisters (mass 0.5, paler tint).
    for (let i = 0; i < HUNTER_GARBAGE[h.size]; i++) {
      const spread = rand(0, TAU), kick = rand(30, 70);
      game.garbage.push(new Garbage(h.x, h.y,
        h.vx * 0.25 + Math.cos(spread) * kick,
        h.vy * 0.25 + Math.sin(spread) * kick,
        HUNTER_SMALL_MASS));
    }
  } else {
    // Large/medium: normal-mass canisters (tiered), then a 3-way split into actively-homing children.
    for (let i = 0; i < HUNTER_GARBAGE[h.size]; i++) {
      const spread = rand(0, TAU), kick = rand(20, 55);
      game.garbage.push(new Garbage(h.x, h.y,
        h.vx * 0.25 + Math.cos(spread) * kick,
        h.vy * 0.25 + Math.sin(spread) * kick));
    }
    for (let i = 0; i < 3; i++) {
      const scatterAngle = (i / 3) * TAU + rand(-0.3, 0.3);
      game.hunters.push(new HunterSatellite(h.x, h.y, h.size - 1, scatterAngle));
    }
    // v3.6 P3 (Source 2): the large core — not its medium/small children — always drops one
    // powerup on its own velocity, as if spitting out its cargo along its spawn-time drift.
    if (h.size === 3) dropPowerup(h.x, h.y, h.vx, h.vy);
  }
}

// Destroy a Saucer: score + achievement counters + boom + sound, then always drop one powerup
// on the saucer's own velocity (v3.6 P3, Source 1 — every UFO, large or small). The single choke
// point for both saucer-kill sites (player bullet, shield body contact), which were previously
// copy-pasted.
function destroySaucer(s) {
  s.dead = true;
  addScore(SAUCER_SCORE[s.small ? "small" : "big"]);
  Achievements.lifetime.saucerKills++;                 // Saucer Hunter (F9)
  if (s.small) { game.stats.smallSaucerKills++; Achievements.lifetime.smallSaucerKills++; } // Small Ball (F9) + Sharpshooter (lifetime, P8)
  boom(s.x, s.y, 2, COLOR.saucer);
  AudioSys.saucer(false);
  dropPowerup(s.x, s.y, s.vx, s.vy);
}

// Shatter a garbage clump (v3.2 P2): the tool that reopens what Phase 1 made un-hookable. One
// player bullet on a pieces>1 clump destroys it and emits exactly `pieces` fresh single canisters,
// each carrying an even split of the clump's mass, a full re-armed coalesceDelay (so the burst
// disperses before it can start re-clumping), and an outward kick that inherits a fraction of the
// clump's own drift — same fan-out shape as destroyDebris/destroyHunter. No score: the reward is
// the hookable canisters themselves.
function shatterClump(g) {
  g.dead = true;
  const pieceMass = g.mass / g.pieces;
  for (let i = 0; i < g.pieces; i++) {
    const spread = rand(0, TAU), kick = rand(GARBAGE_SHATTER_KICK[0], GARBAGE_SHATTER_KICK[1]);
    game.garbage.push(new Garbage(g.x, g.y,
      g.vx * 0.25 + Math.cos(spread) * kick,
      g.vy * 0.25 + Math.sin(spread) * kick,
      pieceMass));
  }
  boom(g.x, g.y, 1, COLOR.garbage);
}

// ---------- Powerups (F6) ----------
// Which expiry mode governs a timed effect (v3.0 P5). Rapid + Triple follow shotPowerupMode; Magnet
// follows magnetMode; Engine is always time-based (never player-configurable). Health is instant.
function powerMode(type) {
  if (type === "rapid" || type === "triple") return settings.shotPowerupMode;
  if (type === "magnet") return settings.magnetMode;
  return "time";
}
// v3.4 P4: how long a timed effect lasts in "time" mode, by type. Magnet is the one long effect
// (MAGNET_DURATION, 30 s); the other three share POWERUP_DURATION (15 s). Mirrors powerMode(type).
// THREE call sites: applyPowerup (sets powerFx) and the HUD active-effect bar's DENOMINATOR (reads it).
// Miss the HUD one and the magnet bar renders permanently over-full.
function powerDuration(type) {
  return type === "magnet" ? MAGNET_DURATION : POWERUP_DURATION;
}
// Is a timed effect currently ACTIVE, honouring its expiry mode? In "time" mode it's live while
// seconds remain (game.powerFx); in a count mode while budget remains (game.powerBudget). Every call
// site (fire block, maxBullets, chainMass, magnet pull, HUD) reads through this one predicate so the
// two modes can never diverge.
function powerActive(type) {
  return powerMode(type) === "time" ? game.powerFx[type] > 0 : game.powerBudget[type] > 0;
}

// The Scoop capture BOX (v3.3 P3, spec §8) — an oriented "mouth" on the ship's facing axis. Rotate the
// wrap-aware ship->garbage delta into ship-local space (project onto the facing axis and its normal) and
// test the box: |lateral| <= SCOOP_WIDTH[lvl]/2 AND -SHIP_RADIUS <= forward <= SCOOP_DEPTH[lvl]. At
// scoopLevel 0 the box is empty (width/depth 0), so pickup falls back to exactly the base circle.
function inScoopBox(g) {
  const lvl = game.scoopLevel;
  if (lvl <= 0) return false;
  const s = game.ship;
  const [dx, dy] = shortDelta(s.x, s.y, g.x, g.y); // vector ship -> garbage (wrap-aware)
  const ca = Math.cos(s.angle), sa = Math.sin(s.angle);
  const forward =  dx * ca + dy * sa;  // along the ship's facing axis
  const lateral = -dx * sa + dy * ca;  // perpendicular
  return Math.abs(lateral) <= SCOOP_WIDTH[lvl] / 2 && forward >= -SHIP_RADIUS && forward <= SCOOP_DEPTH[lvl];
}

// Effective player-bullet cap. Triple Shot wins over Rapid Fire when both are active because its
// cap (12) is the higher of the two — the spec's "use the higher cap, don't multiply to 24".
function maxBullets() {
  if (powerActive("triple")) return TRIPLE_MAX_BULLETS; // 12 (also the Rapid+Triple combined cap)
  if (powerActive("rapid"))  return RAPID_MAX_BULLETS;  // 8
  return MAX_BULLETS;                                    // 4
}

// v3.6 P3: unconditionally roll a random weapon/utility powerup and launch it on the given
// vector. No chance gate here — the three emitters (destroySaucer, destroyHunter's large core,
// the recycle hub) each decide WHEN to call this; this only decides WHAT drops. Health is NOT in
// this pool — it spawns ambiently via spawnHealthPowerup.
function dropPowerup(x, y, vx = 0, vy = 0) {
  // weighted roll over POWERUP_DROP_WEIGHTS (favors the shot powerups), NOT a flat pick over
  // POWERUP_DROP_TYPES — the two structures are deliberately separate (Scoop drops but isn't a timed effect).
  let total = 0;
  for (const k in POWERUP_DROP_WEIGHTS) total += POWERUP_DROP_WEIGHTS[k];
  let r = Math.random() * total, type;
  for (const k in POWERUP_DROP_WEIGHTS) { r -= POWERUP_DROP_WEIGHTS[k]; if (r < 0) { type = k; break; } }
  game.powerups.push(new Powerup(x, y, type, vx, vy));
}

// Ambient Health powerup — floats into the field in a reachable ring around the ship, one at a
// time (its decay bounds coexistence), on a saucer-like cadence.
function spawnHealthPowerup() {
  const a = rand(0, TAU), d = rand(POWERUP_HEALTH_MIN_DIST, POWERUP_HEALTH_MAX_DIST);
  const p = wrapPos({ x: game.ship.x + Math.cos(a) * d, y: game.ship.y + Math.sin(a) * d });
  game.powerups.push(new Powerup(p.x, p.y, "health"));
}

// Collect a powerup. Health is instant (repair, capped). The four timed effects BANK — a same-type
// pickup ADDS duration/shots rather than refreshing (v3.6 P4); magnitude never stacks (no double fire
// rate). Different types run independently. A floater confirms the grab.
function applyPowerup(type) {
  if (type === "scoop") {
    // Scoop is a PERSISTENT, non-timed upgrade (v3.3 P3) — it lives on game.scoopLevel, NOT in
    // powerFx/powerBudget. Each pickup adds a level; at the cap it pays a small score bonus instead,
    // mirroring the full-HP Health-milestone pattern. It still counts as a powerup pick (FLAG A-8:
    // this freezes the maxWaveNoPowerup achievement — accepted, it IS a powerup), but it does NOT
    // feed powerUsed[] (that gates "Powered Up", the four timed types only).
    if (game.scoopLevel < SCOOP_MAX_LEVEL) {
      game.scoopLevel++;
      game.floaters.push(new FloatText("SCOOP +1", game.ship.x, game.ship.y - 22, POWERUP_COLOR.scoop));
    } else {
      addScore(SCOOP_MAX_BONUS);
      game.floaters.push(new FloatText("SCOOP MAX", game.ship.x, game.ship.y - 22, POWERUP_COLOR.scoop));
    }
    game.stats.powerupsPicked++;
    AudioSys.powerup();
    VoiceSys.say("collect_scoop"); // CS010 P9: scoop is the early-return branch — hook the line HERE
    return;
  }
  if (type === "health") {
    game.ship.hp = Math.min(SHIP_MAX_HP, game.ship.hp + POWERUP_HEALTH_AMOUNT);
  } else if (powerMode(type) === "time") {
    // CS009 P5: check BEFORE the += — this is what distinguishes a bank (effect already running) from
    // a fresh pickup (it wasn't). A fresh pickup arms no badge.
    if (powerActive(type)) {
      game.powerBank[type] = HUD_BANK_FLASH;
      game.powerBankAmt[type] = powerDuration(type); // FLAG-F: 30 for magnet, 15 for the rest — never a literal
    }
    game.powerFx[type] += powerDuration(type);      // BANKS (v3.6 P4, reverses the old refresh rule) —
                                                      // same-type pickups add duration; magnitude still never stacks
  } else {
    if (powerActive(type)) {
      game.powerBank[type] = HUD_BANK_FLASH;
      game.powerBankAmt[type] = POWERUP_BUDGET[type];
    }
    game.powerBudget[type] += POWERUP_BUDGET[type]; // count mode: banks the shots/pieces budget too (same rule)
  }
  // Achievement stats (F9): any pickup counts for "No Powerups Needed"; Health picks gate "Glass
  // Cannon"; the four drop types feed "Powered Up" (use all four).
  game.stats.powerupsPicked++;
  if (type === "health") game.stats.healthPicked++;
  else game.stats.powerUsed[type] = true;
  game.floaters.push(new FloatText(POWERUP_LABEL[type], game.ship.x, game.ship.y - 22, POWERUP_COLOR[type]));
  AudioSys.powerup();
  // CS010 P9: the four timed types announce their pickup (Health has no collect line — it speaks via the
  // hull-full latch instead). A same-type BANK re-pickup re-fires collect_<type>; the §11e cooldown drops
  // the second line if it lands inside the window (a decided, acceptable behavior — see STATUS.md).
  if (type !== "health") VoiceSys.say("collect_" + type);
}
