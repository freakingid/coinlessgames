function drawControlsMenu() {
  const { x, y } = menuPanel(760, 512, "CONTROLS");   // +42px vs. pre-CS010 to seat the Ship Rotation slider row
  const m = game.menu;
  drawText("ACTION", x + 36, y + 88, 13, COLOR.dim, "left");
  drawText("KEYBOARD", x + 250, y + 88, 13, COLOR.dim, "left");
  drawText("GAMEPAD", x + 490, y + 88, 13, COLOR.dim, "left");
  REBINDABLE.forEach((name, r) => {
    const ry = y + 122 + r * 42;
    const rowSel = m.row === r;
    drawText(bindings[name].label, x + 36, ry, 17, rowSel ? COLOR.text : COLOR.menuIdle, "left");
    const capKb = m.rebinding && m.rebinding.action === name && m.rebinding.device === "key";
    const capGp = m.rebinding && m.rebinding.action === name && m.rebinding.device === "pad";
    drawBindCell(x + 250, ry, keyLabel(bindings[name]), rowSel && m.col === 0, capKb);
    drawBindCell(x + 490, ry, padLabel(bindings[name]), rowSel && m.col === 1, capGp);
  });
  // Ship Rotation slider (§10b): a ◄/► value row below the rebind rows. Row index derived from
  // REBINDABLE.length so it stays in lockstep with menuControls' turnRow (never hardcode it).
  const turnRow = REBINDABLE.length;
  drawTurnScaleRow(x, y + 122 + turnRow * 42, m.row === turnRow);
  const dRow = REBINDABLE.length + 1, bRow = dRow + 1;
  drawText((m.row === dRow ? "▶ " : "   ") + "Return to Defaults", VIEW_W / 2, y + 122 + dRow * 42 + 26, 20, m.row === dRow ? COLOR.text : COLOR.menuIdle);
  drawText((m.row === bRow ? "▶ " : "   ") + "Back", VIEW_W / 2, y + 122 + bRow * 42 + 26, 20, m.row === bRow ? COLOR.text : COLOR.menuIdle);
  drawMenuHint("↑↓ row    ◄► column / rotation    ENTER / A rebind    ESC / B back", VIEW_W / 2, y + 494);
}

// One slider row for the ship-rotation preference on the Controls screen (§10b). Readout is a
// PERCENTAGE (the raw rad/s means nothing to a player). A gold tick marks the 100% default so "home"
// is visible WITHOUT moving the slider; the fill + readout also go gold and gain a "(default)" tag
// when the value sits exactly on 100%. Menu rects are exempt from the HUD no-fills rule — this mirrors
// the volume slider in drawOptionsMenu.
function drawTurnScaleRow(x, ry, sel) {
  drawText("Ship Rotation", x + 36, ry, 17, sel ? COLOR.text : COLOR.menuIdle, "left");
  const bx = x + 250, bw = 200, bh = 12, by = ry - 11;
  const span = SHIP_TURN_SCALE_MAX - SHIP_TURN_SCALE_MIN;
  const frac = (settings.shipTurnScale - SHIP_TURN_SCALE_MIN) / span;
  const atDefault = Math.abs(settings.shipTurnScale - SHIP_TURN_SCALE_DEFAULT) < 1e-6;
  ctx.strokeStyle = sel ? COLOR.shield : COLOR.dim; ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = atDefault ? COLOR.ach : (sel ? COLOR.shield : COLOR.dim);
  ctx.fillRect(bx + 1, by + 1, (bw - 2) * frac, bh - 2);
  const tx = bx + bw * ((SHIP_TURN_SCALE_DEFAULT - SHIP_TURN_SCALE_MIN) / span);  // 100% tick — always drawn
  ctx.strokeStyle = COLOR.ach; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(tx, by - 4); ctx.lineTo(tx, by + bh + 4); ctx.stroke();
  const pct = Math.round(settings.shipTurnScale * 100) + "%";
  drawText(atDefault ? pct + "  (default)" : pct, bx + bw + 30, ry, 16, atDefault ? COLOR.ach : (sel ? COLOR.text : COLOR.menuIdle), "left");
  if (sel) { drawText("◄", bx - 20, ry + 1, 16, COLOR.text); drawText("►", bx + bw + 8, ry + 1, 16, COLOR.text); }
}

// One binding cell on the Controls screen. Highlights when selected; shows "press…" while capturing.
function drawBindCell(cx, cy, text, sel, capturing) {
  if (sel) {
    ctx.strokeStyle = capturing ? COLOR.garbage : COLOR.shield; ctx.lineWidth = 1;
    ctx.strokeRect(cx - 6, cy - 15, 200, 24);
  }
  const label = capturing ? "press…" : (text || "—");
  drawText(label, cx, cy, 15, capturing ? COLOR.garbage : (sel ? COLOR.text : COLOR.menuIdle), "left");
}

// Format the current bindings for display.
function keyLabel(b) {
  return (b.keys && b.keys.length ? b.keys.map(prettyKey).join(" / ") : "—");
}
function prettyKey(k) {
  const map = { "arrowleft": "←", "arrowright": "→", "arrowup": "↑", "arrowdown": "↓", " ": "SPACE", "shift": "SHIFT", "enter": "ENTER", "escape": "ESC" };
  return map[k] || k.toUpperCase();
}
function padLabel(b) {
  const parts = (b.buttons || []).map(i => GP_NAME[i] || ("BTN" + i));
  if (b.axis) parts.push(axisLabel(b.axis));
  return parts.length ? parts.join(" / ") : "—";
}
function axisLabel(a) {
  if (a.index === GP.AXIS_LX) return a.dir < 0 ? "L-Stick ←" : "L-Stick →";
  if (a.index === GP.AXIS_LY) return a.dir < 0 ? "L-Stick ↑" : "L-Stick ↓";
  return "Axis " + a.index;
}

// ---------- Achievements viewer + unlock toasts (F9; 3-column since v3.0 P8; ×1.5 + scroll CS013 P3) ----------
// Read-only list reachable from Options -> Achievements. Three columns: this week's 5 (left) and the
// lifetime set split across two columns (P8 grew it 12 -> 19, too many for one column), each row with
// unlock status + a progress readout. Screen-fixed, drawn by drawMenu. Layout widths/split are a pure
// look-call tunable (colW / xL / xM / xR / the ceil-half split) — see the P8 playtest ask in STATUS.
//
// CS013 P3: geometry hoisted to top-level consts (rather than locals inside drawAchievements) so
// achMaxScroll() — called from menuAchievements(), which has no drawing context — derives the exact
// same numbers drawAchievements() renders with. Panel position is deterministic (VIEW_W/H and the
// panel's own w/h are fixed), so this is safe without re-invoking menuPanel() (which has fill/stroke/
// text side effects and can't be called twice per frame).
const ACH_PANEL_W = 1200, ACH_PANEL_H = 660;
const ACH_PANEL_Y = (VIEW_H - ACH_PANEL_H) / 2;
const ACH_ROW0_Y = ACH_PANEL_Y + 130;                // first row baseline (unchanged from pre-P3)
const ACH_ROW_STEP = 40 * ACH_SCALE;                 // row-to-row baseline spacing (was a bare 40 pre-P3)
const ACH_ROW_CLIP_TOP = ACH_ROW0_Y - 16;             // headroom above row 0, below the column headers (baseline y+108)
const ACH_ROW_CLIP_BOTTOM = ACH_PANEL_Y + 620;        // headroom above the footer (drawn at ACH_PANEL_Y+644)
const ACH_ROW_VISIBLE_H = ACH_ROW_CLIP_BOTTOM - ACH_ROW_CLIP_TOP;

// Derives maxScroll from the ACTUAL row counts (not a hardcoded pixel total), so a future LIFETIME/
// weekly resize keeps working — the "tallest column" is whichever of the weekly or split-lifetime
// columns has more rows (today: 10 lifetime rows per column vs. 5 weekly). Shared by drawAchievements()
// (render + clamp) and menuAchievements() (input clamp) so the two can never disagree about the ceiling.
function achMaxScroll() {
  const half = Math.ceil(Achievements.LIFETIME.length / 2);
  const rowsTall = Math.max(Achievements.activeWeekly().length, half);
  const contentH = (rowsTall - 1) * ACH_ROW_STEP + 22 + 10 * ACH_SCALE; // last row's baseline -> its description's bottom
  return Math.max(0, contentH - ACH_ROW_VISIBLE_H);
}

function drawAchievements() {
  ctx.fillStyle = "rgba(4,10,20,0.88)"; // v3.3 P1: matches drawMenu's raised backdrop dim (look-call)
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  const { x, y } = menuPanel(ACH_PANEL_W, ACH_PANEL_H, "ACHIEVEMENTS");
  drawText("WEEKLY SET " + Achievements.weekKey + " — resets each calendar week", VIEW_W / 2, y + 74, 12 * ACH_SCALE, COLOR.dim);
  const colW = 350, xL = x + 30, xM = x + 430, xR = x + 820, ry0 = ACH_ROW0_Y, step = ACH_ROW_STEP;
  drawText("THIS WEEK",        xL, y + 108, 15 * ACH_SCALE, COLOR.satellite, "left");
  drawText("LIFETIME",         xM, y + 108, 15 * ACH_SCALE, COLOR.satellite, "left");
  drawText("LIFETIME (cont.)", xR, y + 108, 15 * ACH_SCALE, COLOR.satellite, "left");

  // CS013 P3 (§2.3.3): clamp against the same ceiling menuAchievements() uses, then clip the row
  // region so scrolled rows can never spill past the panel or under the header/footer (FLAG-2c:
  // continuous scroll, all three columns move together — no per-row selection to conflict with).
  const maxScroll = achMaxScroll();
  game.menu.scroll = Math.max(0, Math.min(maxScroll, game.menu.scroll));
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, ACH_ROW_CLIP_TOP, ACH_PANEL_W, ACH_ROW_VISIBLE_H);
  ctx.clip(); // not a fill — GDD §3.2's no-fills rule gains no new exception here
  Achievements.activeWeekly().forEach((a, i) => drawAchRow(a, xL, ry0 + i * step - game.menu.scroll, colW));
  const half = Math.ceil(Achievements.LIFETIME.length / 2);   // first half -> middle column, rest -> right
  Achievements.LIFETIME.forEach((a, i) => {
    const cx = i < half ? xM : xR, row = i < half ? i : i - half;
    drawAchRow(a, cx, ry0 + row * step - game.menu.scroll, colW);
  });
  ctx.restore();

  // Scroll affordance (FLAG-2c): shown only while there's anything to scroll; ▲ additionally requires
  // scroll > 0 (nothing above yet at the top) and ▼ additionally requires scroll < maxScroll (nothing
  // below once fully scrolled) — both cues drawn OUTSIDE the clip, like the header/footer chrome.
  if (maxScroll > 0) {
    if (game.menu.scroll > 0)         drawText("▲", VIEW_W / 2, ACH_ROW_CLIP_TOP - 4, 16, COLOR.menuIdle, "center");
    if (game.menu.scroll < maxScroll) drawText("▼", VIEW_W / 2, ACH_ROW_CLIP_BOTTOM + 10, 16, COLOR.menuIdle, "center");
  }

  drawMenuHint("ESC / B / ENTER  return to Options", VIEW_W / 2, y + 644);
}

// Thousands-grouped integer, locale-independent (deterministic across environments/tests).
function fmtCommas(n) { return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

// One achievement row: name + status on the top line, description below.
// Tiered lifetime rows show a tier badge + progress-to-next in the tier's colour (v3.0 P7);
// single-goal rows keep the F9 look — a ✓ when earned (gold) or a cur/goal readout when not.
// CS013 P3: sizes scaled by ACH_SCALE; description offset ry+15 -> ry+22; description and
// locked/incomplete progress lifted dim -> menuIdle for contrast (unlocked stays ach gold, tier tints
// unchanged).
function drawAchRow(ach, x, ry, w) {
  if (ach.tiers) {
    const idx = Achievements.tierIndex(ach);
    const col = idx >= 0 ? TIER_COLOR[idx] : COLOR.text;   // badge/name in the current tier's tint
    drawText(ach.name, x, ry, 15 * ACH_SCALE, col, "left");
    drawText(Achievements.tierStatusText(ach), x + w, ry, 13 * ACH_SCALE, idx >= 0 ? col : COLOR.menuIdle, "right");
    drawText(ach.desc, x, ry + 22, 10 * ACH_SCALE, COLOR.menuIdle, "left");
    return;
  }
  const done = Achievements.isUnlocked(ach);
  drawText(ach.name, x, ry, 15 * ACH_SCALE, done ? COLOR.ach : COLOR.text, "left");
  drawText(done ? "✓" : Achievements.progressText(ach), x + w, ry, 14 * ACH_SCALE, done ? COLOR.ach : COLOR.menuIdle, "right");
  drawText(ach.desc, x, ry + 22, 10 * ACH_SCALE, COLOR.menuIdle, "left");
}

// ---------- High Scores rendering (v3.6 P6) ----------
// Shared top-10 table renderer — used by both the gameover screen (fresh entry highlighted in
// COLOR.ach) and the browsable system-menu "High Scores" screen (highlightId null, nothing lit).
// Crash-free on an empty, partial, or full HighScores.entries: a missing row just shows a bare dim
// rank number instead of a record.
// `scale` (CS010 P5, §8a) multiplies every font size, the row pitch/header offset, AND the column
// x-offsets (bigger glyphs need wider columns). Defaults to 1 (the gameover caller, unchanged: its
// layout is already tight against "PRESS ENTER TO PLAY AGAIN"/the O-hint below it, and the fresh
// entry is already highlighted gold there, so it doesn't need the bigger type to stand out). The
// browsable screen (drawHighScores) passes 1.8 — don't unify the two callers, the gameover table
// has no room to grow without re-flowing that screen (a separate, un-scoped job — see STATUS.md).
function drawScoreTable(cx, topY, highlightId, scale = 1) {
  const colRank = cx - 230 * scale, colInit = cx - 170 * scale, colScore = cx + 10 * scale,
        colWave = cx + 130 * scale, colDeliv = cx + 230 * scale;
  const fontHeader = 13 * scale, fontRow = 13 * scale, rowPitch = 18 * scale, headerOffset = 22 * scale;
  drawText("#", colRank, topY, fontHeader, COLOR.dim, "left");
  drawText("INITIALS", colInit, topY, fontHeader, COLOR.dim, "left");
  drawText("SCORE", colScore, topY, fontHeader, COLOR.dim, "right");
  drawText("LEVEL", colWave, topY, fontHeader, COLOR.dim, "right");
  drawText("DELIVERED", colDeliv, topY, fontHeader, COLOR.dim, "right");
  for (let i = 0; i < SCORES_MAX; i++) {
    const r = HighScores.entries[i], ry = topY + headerOffset + i * rowPitch;
    if (!r) { drawText((i + 1) + ".", colRank, ry, fontRow, COLOR.dim, "left"); continue; }
    const col = r.id === highlightId ? COLOR.ach : COLOR.text;
    drawText((i + 1) + ".", colRank, ry, fontRow, col, "left");
    drawText(r.initials, colInit, ry, fontRow, col, "left");
    drawText(fmtCommas(r.score), colScore, ry, fontRow, col, "right");
    drawText(String(r.wave), colWave, ry, fontRow, col, "right");
    drawText(String(r.delivered), colDeliv, ry, fontRow, col, "right");
  }
}

// Three-slot arcade initials entry, live only while game.entry is set (a top-10-qualifying run at
// the "dying"->"gameover" seam). Deliberately not a menu screen — game.paused stays false, so the
// field keeps rendering behind it like the rest of the (unpaused) gameover screen.
function drawEntrySlots(cy) {
  drawText("NEW HIGH SCORE — ENTER YOUR INITIALS", VIEW_W / 2, cy - 46, 20, COLOR.ach);
  const e = game.entry, slotW = 70, x0 = VIEW_W / 2 - slotW;
  for (let i = 0; i < 3; i++) {
    const sx = x0 + i * slotW, sel = e.idx === i;
    const ch = SCORES_CHARSET[e.initials[i]];
    if (sel) {
      ctx.strokeStyle = COLOR.shield; ctx.lineWidth = 2;
      ctx.strokeRect(sx - 24, cy - 30, 48, 56);
    }
    drawText(ch === " " ? "_" : ch, sx, cy + 14, 40, sel ? COLOR.text : COLOR.dim);
  }
  drawText("↑↓ letter    ←→ move    ENTER confirm", VIEW_W / 2, cy + 60, 12, COLOR.dim);
}

// Browsable top-10 table, nested under Options (CS010 P4 §8b) — reachable from both the system menu
// (title/gameover -> Options -> High Scores) and the pause menu mid-game. Read-only, like
// drawAchievements — reuses drawScoreTable with no highlight.
// CS010 P5 (§8a): rendered at HS_TABLE_SCALE (180%) — this screen, unlike the gameover table, has no
// competing content below it, so the panel grows to fit rather than shrinking the type. Panel/offsets
// below are hand-computed for the 1.8 scale (header 22*1.8=39.6, pitch 18*1.8=32.4, 10 rows -> last
// row baseline at topY+331.2); if HS_TABLE_SCALE ever changes, re-derive topY/footer/panel h by hand.
const HS_TABLE_SCALE = 1.8;
function drawHighScores() {
  const { y } = menuPanel(1000, 560, "HIGH SCORES");
  const topY = y + 120;
  drawScoreTable(VIEW_W / 2, topY, null, HS_TABLE_SCALE);
  drawText("ESC / B / ENTER  return", VIEW_W / 2, y + 497, 12, COLOR.dim);
}

// Non-blocking unlock banners at top-center. Fade in then out; stack downward if several land at once.
function drawToasts() {
  if (!game.toasts.length) return;
  const w = 384, h = 52;
  game.toasts.forEach((t, i) => {
    const fadeOut = Math.min(1, t.life / 0.6);
    const fadeIn = Math.min(1, (ACH_TOAST_TIME - t.life) / 0.25);
    const alpha = Math.max(0, Math.min(fadeOut, fadeIn));
    const bx = (VIEW_W - w) / 2, by = 76 + i * 62;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "rgba(6,14,26,0.9)";
    ctx.fillRect(bx, by, w, h);
    ctx.strokeStyle = COLOR.ach; ctx.lineWidth = 2;
    ctx.shadowColor = COLOR.ach; ctx.shadowBlur = 12;
    ctx.strokeRect(bx, by, w, h);
    ctx.shadowBlur = 0;
    drawText("★ ACHIEVEMENT UNLOCKED", VIEW_W / 2, by + 20, 12, COLOR.ach);
    drawText(t.name, VIEW_W / 2, by + 42, 20, COLOR.text);
    ctx.globalAlpha = 1;
  });
}

// Background stars scattered across the whole world (count scales with world area
// to preserve the original on-screen density). Drawn in screen space, wrap-aware,
// so the field scrolls seamlessly and never shows a tiling repeat or an edge seam.
const STAR_COUNT = Math.round(STAR_DENSITY * (WORLD_W * WORLD_H) / (VIEW_W * VIEW_H));
const stars = [];
for (let i = 0; i < STAR_COUNT; i++) {
  stars.push({ x: Math.random() * WORLD_W, y: Math.random() * WORLD_H, s: rand(1, 1.8), a: rand(STAR_BRIGHT_MIN, STAR_BRIGHT_MAX) });
}

// Near parallax layer — sparse, brighter, tiled in *screen* space (not world-fixed) so it can
// move at a fraction of the camera offset without needing toroidal wrap math (FLAG B-3-a).
const STAR_NEAR_TILE_W = VIEW_W;
const STAR_NEAR_TILE_H = VIEW_H;
const STAR_NEAR_COUNT = Math.round(STAR_NEAR_DENSITY);
const starsNear = [];
for (let i = 0; i < STAR_NEAR_COUNT; i++) {
  starsNear.push({ x: Math.random() * STAR_NEAR_TILE_W, y: Math.random() * STAR_NEAR_TILE_H, s: rand(1.2, 2.2), a: rand(STAR_NEAR_BRIGHT_MIN, STAR_NEAR_BRIGHT_MAX) });
}

function drawStarfield() {
  const cam = game.camera;

  // Far layer: world-fixed, 1.0x camera offset, wrap-aware (unchanged reference layer).
  for (const st of stars) {
    const [dx, dy] = shortDelta(cam.x, cam.y, st.x, st.y);
    if (Math.abs(dx) > VIEW_W / 2 || Math.abs(dy) > VIEW_H / 2) continue;
    ctx.fillStyle = `rgba(120, 160, 210, ${st.a})`;
    ctx.fillRect(dx + VIEW_W / 2, dy + VIEW_H / 2, st.s, st.s);
  }

  // Near layer: screen-space tiled at a fraction of the camera offset — reads as closer/faster
  // parallax without being world-fixed, so no seam math is needed (FLAG B-3-a).
  const px = ((cam.x * STAR_PARALLAX_FACTOR) % STAR_NEAR_TILE_W + STAR_NEAR_TILE_W) % STAR_NEAR_TILE_W;
  const py = ((cam.y * STAR_PARALLAX_FACTOR) % STAR_NEAR_TILE_H + STAR_NEAR_TILE_H) % STAR_NEAR_TILE_H;
  for (let ty = -1; ty <= 1; ty++) {
    for (let tx = -1; tx <= 1; tx++) {
      const ox = tx * STAR_NEAR_TILE_W - px;
      const oy = ty * STAR_NEAR_TILE_H - py;
      if (ox > VIEW_W || ox < -STAR_NEAR_TILE_W || oy > VIEW_H || oy < -STAR_NEAR_TILE_H) continue;
      for (const st of starsNear) {
        const sx = st.x + ox, sy = st.y + oy;
        if (sx < -4 || sx > VIEW_W + 4 || sy < -4 || sy > VIEW_H + 4) continue;
        ctx.fillStyle = `rgba(160, 195, 235, ${st.a})`;
        ctx.fillRect(sx, sy, st.s, st.s);
      }
    }
  }
}

// Is a world-space entity within the viewport (plus a margin)? Wrap-aware.
function onScreen(e, margin = CULL_MARGIN) {
  const [dx, dy] = shortDelta(game.camera.x, game.camera.y, e.x, e.y);
  const r = e.radius || 0;
  return Math.abs(dx) <= VIEW_W / 2 + margin + r && Math.abs(dy) <= VIEW_H / 2 + margin + r;
}

// Cull, then draw a world entity at its nearest wrapped image relative to the camera.
// Called inside the camera transform, so world coords map straight to the screen.
function drawEntity(e) {
  if (!onScreen(e)) return;
  const cam = game.camera;
  const ox = wrapOffset(e.x, cam.x, WORLD_W);
  const oy = wrapOffset(e.y, cam.y, WORLD_H);
  if (ox || oy) { ctx.save(); ctx.translate(ox, oy); e.draw(); ctx.restore(); }
  else e.draw();
}

// v3.6 P5: the expanding shockwave ring of the death spectacle — a stroked arc (no fill, stays inside
// GDD §3.2's vector-glow rule), centred on the death point, fading and thinning as it grows. Drawn in
// world space (inside the camera transform) so it stays pinned to the death location as bodies drift.
function drawShockwave() {
  const r = (DEATH_DURATION - game.deathT) * DEATH_SHOCKWAVE_SPEED;
  if (r <= 0) return;
  const frac = Math.max(0, game.deathT / DEATH_DURATION); // 1 at the instant of death -> 0 at handoff
  ctx.globalAlpha = frac;
  ctx.beginPath();
  ctx.arc(game.ship.x, game.ship.y, r, 0, TAU);
  glowStroke(COLOR.ship, DEATH_SHOCKWAVE_WIDTH * frac + 0.5, 16);
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.clearRect(0, 0, VIEW_W, VIEW_H);
  drawStarfield();

  if (game.state === "title") {
    drawText("ORBITAL", VIEW_W/2, VIEW_H/2 - 120, 64);
    drawText("O V E R H A U L", VIEW_W/2, VIEW_H/2 - 60, 32, COLOR.satellite);
    drawText("ROTATE: ←→ / A D      THRUST: ↑ / W", VIEW_W/2, VIEW_H/2 + 30, 20, COLOR.dim);
    drawText("FIRE: SPACE      SHIELD: SHIFT      PAUSE: ESC", VIEW_W/2, VIEW_H/2 + 62, 20, COLOR.dim);
    drawText("BEWARE THE HUNTER SATELLITE", VIEW_W/2, VIEW_H/2 + 120, 18, COLOR.satellite);
    if (Math.floor(performance.now() / 600) % 2 === 0)
      drawText("PRESS ENTER TO START", VIEW_W/2, VIEW_H/2 + 180, 26);
    drawText("OPTIONS / ACHIEVEMENTS: O    (controller: B)", VIEW_W/2, VIEW_H/2 + 220, 14, COLOR.ach);
    // CS010 P0 — build stamp, lower-right corner. Not a design element: small, dim, out of the way.
    drawText("v" + GAME_VERSION, VIEW_W - VERSION_STAMP_INSET_X, VIEW_H - VERSION_STAMP_INSET_Y,
              12, COLOR.dim, "right");
    // decorative drifting debris lives in screen space (its own tiny wrapped field)
    titleDebris.forEach(a => {
      a.update(1/60);
      if (a.x < -60) a.x += VIEW_W + 120;
      if (a.x > VIEW_W + 60) a.x -= VIEW_W + 120;
      if (a.y < -60) a.y += VIEW_H + 120;
      if (a.y > VIEW_H + 60) a.y -= VIEW_H + 120;
      a.draw();
    });
    if (game.paused) drawMenu();  // the menu (Options + its sub-screens) overlays the title (v3.0 P4; CS012 P4)
    drawToasts();                 // keep unlock banners on top even on the title
    return;
  }

  // --- World space: translate so the camera (the ship) sits at screen center ---
  // v3.6 P5: a decaying screen-shake offset is added during the death spectacle. game.shake is 0 in
  // normal play (only set at killShip, decayed in updateDeath), so this is a byte-identical translate
  // then. Jitter uses Math.random (a pure visual — never the game RNG).
  const shX = game.shake ? (Math.random() * 2 - 1) * game.shake : 0;
  const shY = game.shake ? (Math.random() * 2 - 1) * game.shake : 0;
  ctx.save();
  ctx.translate(VIEW_W/2 - game.camera.x + shX, VIEW_H/2 - game.camera.y + shY);
  if (game.dock) drawEntity(game.dock);
  game.particles.forEach(drawEntity);
  game.garbage.forEach(drawEntity);
  drawChain();
  game.debris.forEach(drawEntity);
  game.hunters.forEach(drawEntity);
  game.saucers.forEach(drawEntity);
  game.powerups.forEach(drawEntity);   // above hazards so pickups stay readable (F6)
  game.bullets.forEach(drawEntity);
  game.ship.draw();                 // always at the camera center
  game.floaters.forEach(drawEntity);
  if (game.state === "dying") drawShockwave();  // v3.6 P5: expanding ring from the death point (world space)
  ctx.restore();

  // v3.6 P5: white flash over the world on the first frames of death — drawn AFTER the world (in
  // screen space), under the HUD so score/etc. stay legible. Decays from DEATH_FLASH_ALPHA to 0 over
  // DEATH_FLASH_TIME.
  if (game.state === "dying") {
    const flash = Math.max(0, (game.deathT - (DEATH_DURATION - DEATH_FLASH_TIME)) / DEATH_FLASH_TIME);
    if (flash > 0) {
      ctx.globalAlpha = flash * DEATH_FLASH_ALPHA;
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, VIEW_W, VIEW_H);
      ctx.globalAlpha = 1;
    }
  }

  // --- HUD (screen space, drawn after restoring the untranslated context) ---
  // Capture tools (P/O/H — see the block comment above the Capture object) toggle visibility
  // of this call only; the game keeps simulating/updating regardless of hudVisible.
  if (Capture.hudVisible) drawHUD();
  drawCaption(); // CS011 P2: sibling of drawHUD (NOT inside it) — captions show regardless of the H toggle

  if (game.state === "gameover") {
    drawText("GAME OVER", VIEW_W/2, VIEW_H/2 - 20, 56);
    drawText("FINAL SCORE  " + game.score, VIEW_W/2, VIEW_H/2 + 36, 26);
    // v3.6 P6: a qualifying run shows the 3-slot initials entry first; once committed (or immediately,
    // for a non-qualifying run) the top-10 table takes over, fresh entry highlighted.
    if (game.entry) {
      drawEntrySlots(VIEW_H/2 + 110);
    } else {
      drawScoreTable(VIEW_W/2, VIEW_H/2 + 60, game.lastScoreId);
      if (Math.floor(performance.now() / 600) % 2 === 0)
        drawText("PRESS ENTER TO PLAY AGAIN", VIEW_W/2, VIEW_H/2 + 280, 22);
      // CS013 P1: gameover now opens a root (Play Again/Options/Quit to Title), not Options directly —
      // the hint reads "MENU" here, distinct from the title's still-direct-to-Options "OPTIONS /
      // ACHIEVEMENTS" copy at L5559 (unchanged, do not conflate the two).
      drawText("MENU: O    (controller: B)", VIEW_W/2, VIEW_H/2 + 312, 14, COLOR.ach);
    }
  }

  // Drawn after the gameover text so the system menu overlays it (v3.0 P4); for a mid-game pause the
  // gameover block is skipped, so this still sits above the HUD as before (F8).
  if (game.paused) drawMenu(); // pause modal / system menu / options / controls

  drawToasts(); // achievement-unlock banners, on top of everything (F9)
}

// The persistent in-play overlay — score, hull HP, level, cargo/targets readouts, active-powerup
// bars, scoop pips, the dock/low-health chevrons, and the shield bar. Deliberately excludes menus,
// achievement toasts, and the game-over text, which stay in draw() so Capture's H toggle (see the
// block comment above the Capture object) only ever hides the always-on overlay, never anything
// modal or transient.
function drawHUD() {
  // CS010 P3 — low-health CORNER GLOW (§5, FORK-3 = FILL; a NAMED GDD §3.2 fills-exception, Paul signed
  // off). A peripheral-vision alarm: four radial-gradient corner fills in the low-health red. It engages
  // on the EXACT SAME predicate as the siren (game.lowHpSiren) and pulses IN PHASE with the critical-hull
  // ring and the siren — all read game.lowHpPhase, one instrument. It NEVER reads a Web Audio LFO value:
  // the phase is a game-side accumulator, so the glow renders even with audio unavailable (ctx null, no
  // user gesture yet). WHY A FILL, not a glowStroke arc: a corner-of-the-eye alarm is low-frequency,
  // large-area and EDGELESS by definition — that is what makes it readable without competing for focus.
  // A glowStroke arc is a LINE (high-frequency, small-area) that would read as a THIRD red HUD element
  // beside the two red rings — the very noise this phase exists to remove — and it is more expensive
  // (glowStroke is shadowBlur, the renderer's hot spot; four blurred arcs would burn it in the busiest
  // frames). Drawn FIRST so the HUD readouts paint crisply over it. Lives in drawHUD() so Capture's H key
  // hides it and P exports a clean frame. Intensity scales with t (BRIGHTER near death) AND the shared
  // pulse — never merely faster. Alpha rides the gradient stop, so this block NEVER touches globalAlpha
  // (it can't leak). Two corners (top-right rings, bottom-left powerup rows) are occupied; the radius is
  // sized to FRAME rather than fight — a PLAYTEST KNOB (STATUS.md).
  if (game.lowHpSiren) {
    const gt = clamp01(1 - game.ship.hp / LOW_HP_THRESHOLD);            // HP urgency, the same t the siren uses
    const gpulse = 0.6 + 0.4 * Math.sin(game.lowHpPhase);              // shared phase → locked to the hull ring + siren
    const peak = (LOWHP_GLOW_ALPHA_MIN + (LOWHP_GLOW_ALPHA_MAX - LOWHP_GLOW_ALPHA_MIN) * gt) * gpulse;
    const R = LOWHP_GLOW_RADIUS;
    for (const c of [[0, 0], [VIEW_W, 0], [0, VIEW_H], [VIEW_W, VIEW_H]]) {
      const grad = ctx.createRadialGradient(c[0], c[1], 0, c[0], c[1], R);
      grad.addColorStop(0, `rgba(${LOWHP_GLOW_RGB},${peak})`);
      grad.addColorStop(1, `rgba(${LOWHP_GLOW_RGB},0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(Math.max(0, c[0] - R), Math.max(0, c[1] - R), R, R);
    }
  }
  drawText(String(game.score).padStart(6, "0"), 30, 46, 30, COLOR.text, "left");
  // v3.3 P1 (spec §7): "LEVEL" is the player-facing label for game.wave — moved from the dim,
  // easy-to-miss top-right corner into the left column, lit like the other HUD readouts. game.wave /
  // nextWave() / difficultyFactor() / every achievement keying off game.wave are UNCHANGED — this is
  // a display label only ("level" is player-facing vocabulary, "wave" stays the code term).
  drawText("LEVEL " + game.wave, 30, 62, 22, COLOR.text, "left");

  // CS009 P2: the hull + shield fill bars are gone from the left column — they are now the HULL ring in
  // the top-right corner (drawn below). Left column top-to-bottom is now Score, Level, Cargo, Powerups.

  // HULL ring (top-right). FORK-1 A: one "ship status" element, two concentric arcs (hull outer,
  // shield inner) around a ship glyph. Everything strokes through drawRingArc/glowStroke — no fills.
  // STATE is read from the TRUE game.ship.hp so the color flips the instant a hit lands; the hull ARC
  // reads the eased game.hudHull so the fill drains/fills ~0.35s behind, reading as a drain, not a jump.
  // Precedence MAX > Critical > Normal (mutually exclusive). The shield arc is NEVER state-colored —
  // it is a separate resource and must not get swept into a hull warning.
  const hpMax = game.ship.hp >= SHIP_MAX_HP;                 // full hull → a Health pickup is wasted (FLAG-E)
  const hpCrit = game.ship.hp <= LOW_HP_THRESHOLD;           // same threshold as the siren + low-HP chevron
  const hullColor = hpMax ? COLOR.ach : (hpCrit ? COLOR.lowhp : COLOR.hp);
  // full-circle track, no glow (drawn direct, not via drawRingArc — that helper is arc-only).
  ctx.beginPath();
  ctx.arc(HUD_HULL_CX, HUD_RING_CY, HUD_RING_R, 0, TAU);
  ctx.strokeStyle = COLOR.dim; ctx.lineWidth = HUD_RING_TRACK_W; ctx.stroke();
  // shield arc: concentric, inside the hull ring, thinner, own color, NOT eased (energy is already
  // continuous) and NOT pulsed — drawn at full alpha before the pulse is applied below.
  drawRingArc(HUD_HULL_CX, HUD_RING_CY, HUD_RING_R - HUD_SHIELD_R_GAP,
    game.ship.energy, COLOR.shield, HUD_RING_TRACK_W + 1);
  // hull arc + ship glyph pulse together, only when Critical. CS010 P3: the pulse now reads the SHARED
  // game.lowHpPhase accumulator (rate = lowhpPulseRate(t), advanced in update()), so the hull ring, the
  // corner glow and the audio siren are ONE alarm at ONE HP-ramped rate. This REVERSES CS009's deliberate
  // flat-rate choice (Paul signed off): CS009 kept the visual flat because the siren already ramped, but
  // two red pulses beating in and out of phase is the noise §5 exists to remove. HUD_PULSE_HZ still drives
  // the NON-HP pulses (cargo-gold, powerup low-timer); only elements keyed on LOW_HP_THRESHOLD read the
  // ramped rate. While paused the phase freezes, so this shows a static alpha — correct (see update()).
  if (hpCrit && !hpMax) {
    ctx.globalAlpha = 0.6 + 0.4 * Math.sin(game.lowHpPhase);
  }
  // CS010 P3: relief EXHALE — a geometry-only (radius + width) NON-pulsing pop on the hull VALUE arc when
  // low-health just cleared with the ship alive, decaying to normal over LOWHP_RELIEF_FLASH. The alarm WAS
  // the pulse; the relief is its absence plus one clean exhale. Color is deliberately UNTOUCHED: hpCrit is
  // already false here, so hullColor is back to COLOR.hp (and the hpMax gold case still wins) — geometry
  // composes with that precedence chain for free, adds no new color semantics, and never touches
  // globalAlpha (so it can't leak). Idioms reused verbatim: HUD_BANK_POP's fractional-radius pop and the
  // cargo cap-up's +2 width bump. The dim track stays at HUD_RING_R, so the arc visibly swells past it and
  // settles back.
  const reliefK = game.hpReliefFlash > 0 ? game.hpReliefFlash / LOWHP_RELIEF_FLASH : 0;
  const hullArcR = HUD_RING_R * (1 + HUD_BANK_POP * reliefK);
  const hullArcW = HUD_RING_W + 2 * reliefK;
  drawRingArc(HUD_HULL_CX, HUD_RING_CY, hullArcR, clamp01(game.hudHull), hullColor, hullArcW);
  drawPoly(HUD_SHIP_GLYPH, HUD_HULL_CX, HUD_RING_CY, -Math.PI / 2, hullColor);
  ctx.globalAlpha = 1;   // ALWAYS restore — a leaked alpha would tint the rest of the frame
  drawText("HULL", HUD_HULL_CX, HUD_RING_LABEL_Y, 13, COLOR.dim, "center");

  // CARGO ring (top-right, beside HULL). FORK-2 A: game.cargoMax is NOT a constant — it grows
  // CARGO_BASE->CARGO_CAP_MAX at runtime (+1 per CARGO_GROW_PER delivered), so the fraction and the
  // "/N" label both read it live every frame; never cache it, never substitute a literal.
  const cargoFull = game.chain.length >= game.cargoMax;
  // Full-cap or a fresh cap-up both mean gold — same idiom as the HULL ring's MAX state: gold means
  // exactly one thing across the whole HUD, "this resource is at its cap; more is wasted."
  const cargoGold = cargoFull || game.cargoFlash > 0;
  const cargoColor = cargoGold ? COLOR.ach : COLOR.text;
  const cargoRingW = game.cargoFlash > 0 ? HUD_RING_W + 2 : HUD_RING_W;
  ctx.beginPath();
  ctx.arc(HUD_CARGO_CX, HUD_RING_CY, HUD_RING_R, 0, TAU);
  ctx.strokeStyle = COLOR.dim; ctx.lineWidth = HUD_RING_TRACK_W; ctx.stroke();
  if (cargoGold) {
    ctx.globalAlpha = 0.6 + 0.4 * Math.sin(performance.now() / 1000 * TAU * HUD_PULSE_HZ);
  }
  drawRingArc(HUD_CARGO_CX, HUD_RING_CY, HUD_RING_R, clamp01(game.chain.length / game.cargoMax),
    cargoColor, cargoRingW);
  drawText(String(game.chain.length), HUD_CARGO_CX, HUD_RING_CY - 4, 20,
    game.chain.length ? COLOR.text : COLOR.dim, "center");
  drawText("/" + game.cargoMax, HUD_CARGO_CX, HUD_RING_CY + 14, 11, COLOR.dim, "center");
  ctx.globalAlpha = 1;   // ALWAYS restore — a leaked alpha would tint the rest of the frame
  drawText("CARGO", HUD_CARGO_CX, HUD_RING_LABEL_Y, 13, COLOR.dim, "center");

  // CS009 P4: active-powerup ROWS (F6, spec §5) — each effect is a ring + glyph + label + number,
  // matching the HULL/CARGO ring idiom. Health is instant so it never appears here; Scoop is
  // persistent (its own segmented-ring row below). Rows are iterated in the stable POWERUP_DROP_TYPES
  // order — that order is load-bearing (do not inline it), so a type's row never moves.
  //
  // CS012 P2: rows are ALWAYS shown at a FIXED y (row i sits at HUD_FX_BASE_Y - (i+1)*HUD_FX_ROW_H,
  // i = index in POWERUP_DROP_TYPES) — activating/expiring a powerup no longer moves any other row,
  // because nothing is compacted anymore (the old `slot` cursor + `!powerActive(t) continue` skip are
  // gone). An inactive row is a muted track: dim glyph/label/number, no value arc, no low pulse, no
  // bank pop. Row index 0 (y = HUD_FX_BASE_Y) is RESERVED for the SCOOP segmented ring below; the four
  // timed rows float above it, i = 0..3.
  for (let i = 0; i < POWERUP_DROP_TYPES.length; i++) {
    const t = POWERUP_DROP_TYPES[i];
    const y = HUD_FX_BASE_Y - (i + 1) * HUD_FX_ROW_H;
    const active = powerActive(t);
    // v3.0 P5 dual data source: time mode expires on a clock (powerFx sec), count mode on a budget
    // (powerBudget shots/pieces) chosen per-type from player settings — powerMode(t) is the switch.
    const counted = powerMode(t) !== "time";
    // TRAP 3 / FORK-5: count mode has no denominator, so it has no value arc — only the dim track (so
    // the row's SHAPE is identical across modes), the glyph, and the raw budget number. A low-timer
    // warning is a deadline; a budget of 2 shots is not (FLAG-E), so count mode never state-colors.
    let color = active ? POWERUP_COLOR[t] : COLOR.dim;
    const low = active && !counted && game.powerFx[t] <= HUD_FX_LOW;   // time mode only, active only
    if (low) color = COLOR.lowhp;                            // ring + label + seconds all shift + pulse
    // dim full-circle track, always drawn (no glow, drawn direct — drawRingArc is arc-only), so every
    // row reads as the same object whether it's an arc-bearing timer, a countless budget, or inactive.
    ctx.beginPath();
    ctx.arc(40, y, HUD_FX_RING_R, 0, TAU);
    ctx.strokeStyle = COLOR.dim; ctx.lineWidth = HUD_RING_TRACK_W; ctx.stroke();
    if (active) {
      // low-timer pulse: reuse Phase 2's exact idiom + HUD_PULSE_HZ. Wraps the value arc, glyph, and
      // text; restored to 1 immediately after so it can't leak into the next row or the rest of the frame.
      if (low) ctx.globalAlpha = 0.6 + 0.4 * Math.sin(performance.now() / 1000 * TAU * HUD_PULSE_HZ);
      if (!counted) {
        // TRAP 1: the denominator DIFFERS by type — powerDuration(t) is 30 for magnet, 15 for the rest.
        // Call the function; never POWERUP_DURATION directly, or the magnet ring renders permanently full.
        const frac = game.powerFx[t] / powerDuration(t);
        // TRAP 2 / FORK-3 A: banking makes powerFx exceed the denominator (a double-banked Rapid = 30s /
        // 15s = 2.0). Main arc = clamp01(frac); if frac > 1, a second, thinner arc at HUD_FX_RING_R + 4
        // shows the overcharge (clamp01(frac - 1)) — a full ring with a halo, so the surplus stays legible
        // instead of pinning the ring at 100% for 15 straight seconds (which reads as broken).
        drawRingArc(40, y, HUD_FX_RING_R, clamp01(frac), color, 3);
        if (frac > 1) drawRingArc(40, y, HUD_FX_RING_R + 4, clamp01(frac - 1), color, 2);
      }
    }
    // glyph dead center of the ring — the shipped double-chevron/fan/horseshoe/bell set (L2411), already
    // the field-pickup icons; the brief's chevron/diamond are superseded. Same call the shipped HUD made.
    drawPowerupGlyph(t, 40, y, HUD_FX_GLYPH_R, color);
    // label + number to the right of the ring. In count mode the number is the raw budget (no "s"); in
    // time mode it's Math.ceil(powerFx) + "s" — CEIL, not round, so a ring reading "1s" hasn't expired.
    // Inactive rows leave powerFx/powerBudget at their idle 0, so this collapses to "0s"/"0" unchanged —
    // no special-casing needed.
    const num = counted ? String(game.powerBudget[t]) : Math.ceil(game.powerFx[t]) + "s";
    drawText(POWERUP_LABEL[t], 64, y - 4, 13, color, "left");
    drawText(num, 64, y + 14, 16, color, "left");
    ctx.globalAlpha = 1;   // ALWAYS restore — a leaked alpha would tint the next row / rest of the frame

    // CS009 P5: bank feedback — a same-type pickup while already active pops the ring 25% and settling,
    // plus a fading "+Ns" badge to the right of the number, over HUD_BANK_FLASH sec.
    if (active && game.powerBank[t] > 0) {
      const k = game.powerBank[t] / HUD_BANK_FLASH; // 1 -> 0
      ctx.beginPath();
      ctx.arc(40, y, HUD_FX_RING_R * (1 + HUD_BANK_POP * k), 0, TAU);
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
      ctx.globalAlpha = k;
      drawText("+" + game.powerBankAmt[t] + (counted ? "" : "s"), 104, y + 14, 16, COLOR.ach, "left");
      ctx.globalAlpha = 1;   // ALWAYS restore
    }
  }
  // SCOOP segmented ring (CS012 P2) — a PERSISTENT upgrade, NOT a timed effect, so it's deliberately
  // drawn OUTSIDE the POWERUP_DROP_TYPES loop above (game.scoopLevel is not in powerFx/powerBudget and
  // never expires on a clock). Row index 0 (y = HUD_FX_BASE_Y), the stable floor of the bottom-left
  // stack — the persistent upgrade anchors the bottom, the four timed rows (i = 0..3, above) float
  // above it. ALWAYS drawn, even at level 0 (dim track, 0 lit segments) — matches the timed rows'
  // always-shown-muted-when-idle treatment; segment count derives from SCOOP_MAX_LEVEL, never hardcoded.
  // STROKE ONLY — the old pip row's fill dot is gone (GDD §3.2 no-fills exception list update).
  {
    const scoopY = HUD_FX_BASE_Y;
    drawRingSegments(40, scoopY, HUD_FX_RING_R, SCOOP_MAX_LEVEL, game.scoopLevel,
      POWERUP_COLOR.scoop, COLOR.dim);
    drawText("SCOOP", 64, scoopY - 4, 13, POWERUP_COLOR.scoop, "left");
    drawText(String(game.scoopLevel), 64, scoopY + 14, 16, POWERUP_COLOR.scoop, "left");
  }
  // when hauling, a chevron orbiting screen-center points toward the (maybe off-screen) dock
  if (game.chain.length && game.dock && !game.ship.dead) {
    const a = angleTo(game.ship, game.dock);
    drawPoly([[7, 0], [-4, -4], [-4, 4]],
      VIEW_W/2 + Math.cos(a) * 42, VIEW_H/2 + Math.sin(a) * 42, a, COLOR.dock);
  }
  // v3.4 P5: low-health directional pointer — a second chevron, same shape, at a wider orbit (58 vs
  // the dock's 42) so both can show at once without overlapping. Points at the NEAREST live health
  // powerup (wrap-aware nearest-scan, not find-first — correct even if a second ever coexists).
  // Drawn only in the low-health state AND when a health powerup actually exists on the field;
  // hidden otherwise, per FLAG-8a (no force-spawn, so the pointer can legitimately have nothing to
  // point at for up to POWERUP_HEALTH_GAP's 26s).
  if (game.state === "playing" && !game.ship.dead && game.ship.hp <= LOW_HP_THRESHOLD) {
    let nearest = null, bestD = Infinity;
    for (const p of game.powerups) {
      if (p.dead || p.type !== "health") continue;
      const d = dist2(game.ship, p);
      if (d < bestD) { bestD = d; nearest = p; }
    }
    if (nearest) {
      const a = angleTo(game.ship, nearest);
      drawPoly([[7, 0], [-4, -4], [-4, 4]],
        VIEW_W/2 + Math.cos(a) * 58, VIEW_H/2 + Math.sin(a) * 58, a, COLOR.lowhp);
    }
  }
}

// title screen decoration
const titleDebris = [];
for (let i = 0; i < 5; i++) {
  const a = new DebrisSatellite(rand(0, VIEW_W), rand(0, VIEW_H), 3);
  a.vx *= 0.5; a.vy *= 0.5;
  titleDebris.push(a);
}

// Load persisted achievements + compute this week's active weekly slice, once at startup (F9).
Achievements.init();

// ---------- Main loop ----------
// ---------- Capture tools (screenshots + slow-mo) ----------
// SHIPPED, PLAYER-FACING FEATURE — not debug scaffolding. Do not strip this on a refactor pass.
// Keys: P = export the current frame as a PNG (composited onto black; honors hudVisible, so a
// hidden HUD stays hidden in the export). O = cycle time scale 1x -> 0.5x -> 0.25x -> 1x (slow-mo).
// H = toggle the HUD overlay on/off (purely visual — draw()-gated via drawHUD()/hudVisible; the
// game keeps simulating normally either way).
//
// Two integration points in loop() (below) are LOAD-BEARING and must be preserved if loop() or
// draw() is ever restructured:
//   1. `dt` is multiplied by `Capture.timeScale` — this is what makes O's slow-mo work.
//   2. `Capture.afterDraw()` is called immediately after `draw()` — this is what lets P capture a
//      complete, already-composited frame (including whatever hudVisible state is currently active).
// Active only during live play, so these can never collide with menu navigation
// or with control rebinding (both of which only happen while paused/in a menu).
const Capture = {
  timeScale: 1,
  _shot: false,
  _rates: [1, 0.5, 0.25],
  _rateIdx: 0,
  hudVisible: true,

  active() {
    return game.state === "playing" && !game.paused;
  },

  // v3.6 P5 (FLAG-I): P (screenshot) is ALSO allowed during the "dying" death spectacle — plausibly
  // the single frame most worth capturing. O (slow-mo) and H (HUD toggle) deliberately stay
  // live-play only: slow-mo would stretch the fixed death window and the HUD toggle is pointless mid-death.
  canShoot() {
    return this.active() || game.state === "dying";
  },

  cycleSlowMo() {
    this._rateIdx = (this._rateIdx + 1) % this._rates.length;
    this.timeScale = this._rates[this._rateIdx];
  },

  toggleHud() { this.hudVisible = !this.hudVisible; },

  requestShot() { this._shot = true; },

  // Called after draw(), so the canvas holds a complete, composited frame.
  afterDraw() {
    if (!this._shot) return;
    this._shot = false;

    // Composite onto solid black. If the canvas has an alpha channel, a raw
    // toBlob() would export glowing lines over transparency, which reads as
    // broken in most image viewers.
    const off = document.createElement("canvas");
    off.width = canvas.width;
    off.height = canvas.height;
    const octx = off.getContext("2d");
    octx.fillStyle = "#000";
    octx.fillRect(0, 0, off.width, off.height);
    octx.drawImage(canvas, 0, 0);

    off.toBlob(blob => {
      const ts = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `orbital-overhaul-${ts}.png`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }, "image/png");
  },
};

window.addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  // P works during live play AND the death spectacle (v3.6 P5, FLAG-I); O/H stay live-play only.
  if (k === "p" && Capture.canShoot()) { Capture.requestShot(); e.preventDefault(); return; }
  if (!Capture.active()) return;
  if (k === "o") { Capture.cycleSlowMo(); e.preventDefault(); }
  else if (k === "h") { Capture.toggleHud(); e.preventDefault(); }
});

let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000) * Capture.timeScale;
  last = now;
  pollGamepad();        // refresh the first-gamepad snapshot once per frame, before anything reads it
  handleGamepadMenu();  // edge-triggered controller menu/system actions (Start/A/B)
  update(dt);
  updateToasts(dt);     // age out achievement-unlock toasts (independent of pause/state) (F9)
  updateMusic();        // v3.4 P6: drive the music state/duck off game.state + menu, then run the scheduler
  draw();
  Capture.afterDraw();
  requestAnimationFrame(loop);
}

// v3.4 P6: one place drives the whole music system per frame. State maps game.state -> track ("title"
// on the title screen, the selected gameplay track while playing, silence at game over); ducking maps
// menuActive() -> 50%. All three MusicSys calls are ctx-guarded no-ops until the first user gesture.
// v3.4 P7: "playing" now routes to the player's SELECTED gameplay track (settings.musicTrack), not a
// generic "play" bucket. This makes a mid-game track switch (Options, pause menu) fall straight out
// of setState()'s existing crossfade — the state string just changes to a different track name.
// CS010 P7: the High Scores screen is a MENU (game.paused), so game.state alone can't name it —
// consult the active menu screen first. Reading game.menu here is in-idiom (the function already
// reads the settings module global). Switching in/out is then a normal setState() crossfade — no
// new track-switch path. Every OTHER combination is byte-identical to the pre-P7 mapping.
function musicStateFor(s) {
  if (game.paused && game.menu.screen === "highscores") return "highscore";
  return s === "playing" ? settings.musicTrack : s === "title" ? "title" : "off";
}
function updateMusic() {
  MusicSys.setState(musicStateFor(game.state));
  // CS010 P7: menu ducking (50%) exists to make room for gameplay audio under an overlaid menu. The
  // High Scores screen has its OWN full-level track and nothing beneath it, so exempt it — otherwise
  // a track that plays only while a menu is open would be permanently ducked. setDuck is idempotent.
  MusicSys.setDuck(menuActive() && game.menu.screen !== "highscores");
  MusicSys.update();
}

// Age achievement toasts. Runs in the main loop (not update) so they animate/expire across every
// state — during play, at game over, and while paused — not just while the sim is running (F9).
function updateToasts(dt) {
  if (!game.toasts.length) return;
  for (const t of game.toasts) t.life -= dt;
  game.toasts = game.toasts.filter(t => t.life > 0);
}
requestAnimationFrame(loop);
</script>
