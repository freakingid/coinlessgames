backend:
  name: git-gateway
  branch: main
media_folder: "coinlessgames/public/uploads"
public_folder: "/uploads"
publish_mode: simple
collections:
  - name: "blog"
    label: "Devlog Posts"
    folder: "coinlessgames/src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Summary", name: "summary", widget: "text", required: false, hint: "One or two sentences, shown in the devlog list." }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, hint: "Hide this post from the live site until it's ready." }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "games"
    label: "Games"
    folder: "coinlessgames/src/content/games"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Series", name: "series", widget: "string", required: false, hint: "e.g. Atomic Dustbin Dan" }
      - { label: "Sort Order", name: "order", widget: "number", default: 0, hint: "Lower numbers appear first on the games index." }
      - { label: "Tagline", name: "tagline", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Status", name: "status", widget: "string", required: false, hint: "e.g. Playable in browser, In Development" }
      - { label: "Play URL", name: "playUrl", widget: "string", required: false, hint: "e.g. /play/orbital-overhaul/" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, hint: "Hide this game from the live site until it's ready." }
      - { label: "Log Signature", name: "logSignature", widget: "string", required: false, hint: "Who signs the in-world log entry, e.g. Dan" }
      - { label: "Log Entry", name: "logEntry", widget: "text", required: false, hint: "Dan's in-world log, shown in the terminal/CRT block on the game page." }
      - { label: "Body", name: "body", widget: "markdown", hint: "Publisher's note — plain-voice description below Dan's log." }
