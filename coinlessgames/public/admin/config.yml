backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: simple

collections:
  - name: "blog"
    label: "Devlog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Summary", name: "summary", widget: "text", required: false, hint: "One or two sentences, shown in the devlog list." }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, hint: "Hide this post from the live site until it's ready." }
      - { label: "Body", name: "body", widget: "markdown" }
